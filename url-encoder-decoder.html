<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>URL Encoder / Decoder | ZHR Tools</title>

<link rel="icon" href="/favicon.png" type="image/png">
<link rel="stylesheet" href="layout.css">

<script src="https://unpkg.com/lucide@latest"></script>

<style>

body{
font-family:'Segoe UI',sans-serif;

margin:0;
}

/* TITLE */

.page-title{
text-align:center;
font-size:30px;
color:#001d4c;
margin-top:50px;
font-weight:700;
}

/* CONTAINER */

.container{
max-width:900px;
margin:auto;
padding:20px;
}

/* CARD */

.card{
background:#f8f9fb;
padding:30px;
border-radius:10px;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
display:flex;
flex-direction:column;
gap:15px;
}

/* TEXTAREA */

textarea{
width:100%;
min-height:150px;
padding:14px 16px;
border-radius:8px;
border:1px solid #ccc;
font-size:15px;
resize:vertical;
box-sizing:border-box;
}

/* BUTTON GROUP */

.button-group{
display:flex;
gap:10px;
flex-wrap:wrap;
}

button{
background:#001d4c;
color:white;
border:none;
padding:12px;
border-radius:6px;
cursor:pointer;
flex:1;
}

button:hover{
opacity:0.9;
}

/* OUTPUT */

.output{
background:white;
padding:15px;
border-radius:8px;
border-left:5px solid #001d4c;
word-break:break-all;
}

/* COPY BTN */

.copy-btn{
margin-top:10px;
}

/* MOBILE */

@media(max-width:768px){
.button-group{
flex-direction:column;
}
}

</style>

</head>

<body>

<div id="header"></div>
<div id="sidebar-container"></div>

<h1 class="page-title">URL Encoder / Decoder</h1>

<div class="container">

<div class="card">

<label><b>Enter URL / Text</b></label>
<textarea id="inputText" placeholder="Enter URL or text here..."></textarea>

<div class="button-group">
<button onclick="encodeURL()">Encode URL</button>
<button onclick="decodeURL()">Decode URL</button>
<button onclick="clearText()">Clear</button>
</div>

<label><b>Result</b></label>
<div class="output" id="outputText">Output will appear here...</div>

<button class="copy-btn" onclick="copyOutput()">Copy Result</button>

</div>

</div>

<script>

/* ENCODE */

function encodeURL(){
let input=document.getElementById("inputText").value;

if(!input){
alert("Please enter text");
return;
}

let result=encodeURIComponent(input);

document.getElementById("outputText").innerText=result;
}

/* DECODE */

function decodeURL(){
let input=document.getElementById("inputText").value;

if(!input){
alert("Please enter encoded text");
return;
}

try{
let result=decodeURIComponent(input);
document.getElementById("outputText").innerText=result;
}catch{
document.getElementById("outputText").innerText="Invalid encoded URL";
}
}

/* CLEAR */

function clearText(){
document.getElementById("inputText").value="";
document.getElementById("outputText").innerText="Output will appear here...";
}

/* COPY */

function copyOutput(){
let text=document.getElementById("outputText").innerText;

navigator.clipboard.writeText(text);

alert("Copied to clipboard");
}

</script>

<script src="layout.js"></script>

</body>
</html>
