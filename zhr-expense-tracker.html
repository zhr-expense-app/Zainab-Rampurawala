//////////////////////////////////////////////////
// CHECK PERMISSION
//////////////////////////////////////////////////

function checkPermission(action){

  if(action === "delete" && currentUserRole !== "admin"){
    showToast("You are not authorized to delete ❌","error");
    return false;
  }

  if(action === "write" && !["admin","user"].includes(currentUserRole)){
    showToast("You are not authorized to add/modify ❌","error");
    return false;
  }

  if(action === "admin" && currentUserRole !== "admin"){
    showToast("Admin access only ❌","error");
    return false;
  }

  return true;
}
	
//////////////////////////////////////////////////
// LOAD USER
//////////////////////////////////////////////////
	
async function loadUserRole(){

  let user = auth.currentUser;

  if(!user) return;

  let doc = await db.collection("users").doc(user.email).get();

  if(doc.exists){
    currentUserRole = doc.data().role;
  }else{
    currentUserRole = "viewer"; // safety fallback
  }

  console.log("User Role:", currentUserRole); // for testing

}
		
//////////////////////////////////////////////////////////
// AUTO FORMAT AMOUNTS (INDIAN + DECIMAL + RIGHT ALIGN)
//////////////////////////////////////////////////////////

function formatAllAmounts(){

document.querySelectorAll("td").forEach((cell,index)=>{

let column = cell.cellIndex;

let value = cell.innerText.replace(/,/g,"").trim();

/* Skip Serial Number column */
if(column === 0) return;

if(value === "0"){
cell.innerText = "-";
cell.style.textAlign = "right";
return;
}

if(!isNaN(value) && value !== ""){

let formatted = Number(value).toLocaleString("en-IN",{
minimumFractionDigits:2,
maximumFractionDigits:2
});

if(cell.querySelector("b")){
cell.querySelector("b").innerText = formatted;
}else{
cell.innerText = formatted;
}

cell.style.textAlign = "right";

}

});

}

//////////////////////////////////////////////////
// Summary Calculation Engine (NEW LEDGER SYSTEM)
//////////////////////////////////////////////////

function calculateSummary(fromDate,toDate,expenseTitle,balanceTitle){

//////////////////////////////////////////////////
// 🧾 TABLE 1 → CASH & BANK (CLOSING AS ON TO DATE)
//////////////////////////////////////////////////

let balances = {};

// ✅ Initialize ONLY Cash & Bank ledgers
ledgerList
  .filter(l => l.group === "Cash & Bank")
  .forEach(l => {

    let value = Number(l.openingBalance || 0);

    if(l.openingType === "credit"){
      value = -value;
    }

    balances[l.id] = value;   // 🔥 CHANGED (name → id)
  });

// ✅ Apply ALL transactions till TO date
transactionsCache.forEach(t => {

  if(t.date > toDate) return;

  let amount = Number(t.amount);

  let debitKey = t.debitLedgerId || t.debitLedger;   // 🔥 NEW
  let creditKey = t.creditLedgerId || t.creditLedger; // 🔥 NEW

  if(debitKey && balances.hasOwnProperty(debitKey)){
    balances[debitKey] += amount;
  }

  if(creditKey && balances.hasOwnProperty(creditKey)){
    balances[creditKey] -= amount;
  }

});

// ✅ Prepare Table 1
let totalBalance = 0;
let rows1 = "";

Object.keys(balances).forEach(key => {

  let value = balances[key];
  totalBalance += value;

  let ledger = ledgerList.find(l => l.id === key);
  let name = ledger ? ledger.name : key;  // 🔥 NEW

  rows1 += `
  <tr>
    <td>${name}</td>
    <td>${value}</td>
  </tr>
  `;
});

document.getElementById("closingSummary").innerHTML = `
<div class="summary-title">${balanceTitle}</div>
<table>
  <tr><th>Ledger</th><th>Balance</th></tr>
  ${rows1}
  <tr>
    <td><b>Total</b></td>
    <td><b>${totalBalance}</b></td>
  </tr>
</table>
`;

//////////////////////////////////////////////////
// 📊 TABLE 2 → PERIOD MOVEMENT (ALL GROUPS)
//////////////////////////////////////////////////

let movement = {};

// ✅ Allowed groups
let allowedGroups = [
  "Expense",
  "Asset",
  "Liability",
  "Drawings"
];

// ✅ Map ledger id → group
let ledgerMap = {};
ledgerList.forEach(l=>{
  ledgerMap[l.id] = l.group;   // 🔥 CHANGED
});

// ✅ Process ONLY transactions within period
transactionsCache.forEach(t => {

  if(t.date < fromDate || t.date > toDate) return;

  let amount = Number(t.amount);

  let debitKey = t.debitLedgerId || t.debitLedger;   // 🔥 NEW
  let creditKey = t.creditLedgerId || t.creditLedger; // 🔥 NEW

  // 🔹 Debit side
  if(debitKey){

    let group = ledgerMap[debitKey];

    if(allowedGroups.includes(group)){

      if(!movement[debitKey]){
        movement[debitKey] = 0;
      }

      movement[debitKey] += amount;
    }
  }

  // 🔹 Credit side
  if(creditKey){

    let group = ledgerMap[creditKey];

    if(allowedGroups.includes(group)){

      if(!movement[creditKey]){
        movement[creditKey] = 0;
      }

      movement[creditKey] -= amount;
    }
  }

});

// ✅ Remove zero / no activity
let rows2 = "";
let totalMovement = 0;

Object.keys(movement).forEach(key => {

  let value = movement[key];

  if(value === 0) return;

  totalMovement += value;

  let ledger = ledgerList.find(l => l.id === key);
  let name = ledger ? ledger.name : key;  // 🔥 NEW

  rows2 += `
  <tr>
    <td>${name}</td>
    <td>${Math.abs(value)}</td>
  </tr>
  `;
});

// ✅ Render Table 2
document.getElementById("expenseSummary").innerHTML = `
<div class="summary-title">${expenseTitle}</div>
<div class="summary-table-wrapper">
<table>
  <tr><th>Ledger</th><th>Amount</th></tr>
  ${rows2}
  <tr>
    <td><b>Total</b></td>
    <td><b>${Math.abs(totalMovement)}</b></td>
  </tr>
</table>
`;

//////////////////////////////////////////////////
// 📅 TABLE 3 (UNCHANGED CALL)
//////////////////////////////////////////////////

renderPersonalMonthlySummary();

//////////////////////////////////////////////////
// 📊 CHARTS (KEEP SAFE FOR NOW)
//////////////////////////////////////////////////

renderPersonalExpenseChart();
renderLedgerPieChart(fromDate,toDate);

//////////////////////////////////////////////////
// FINAL FORMATTING
//////////////////////////////////////////////////

formatAllAmounts();
lucide.createIcons();

}

function getLedgerBalance(ledgerId){

  let balances = {};

  // Opening balances
  ledgerList.forEach(l=>{
    let value = Number(l.openingBalance || 0);

    if(l.openingType === "credit"){
      value = -value;
    }

    balances[l.id] = value;
  });

  // Apply all transactions
  transactionsCache.forEach(t=>{

    let amount = Number(t.amount);

    // ✅ USE ID FIRST, FALLBACK TO NAME
    let debitKey = t.debitLedgerId || t.debitLedger;
    let creditKey = t.creditLedgerId || t.creditLedger;

    if(debitKey){
      balances[debitKey] = (balances[debitKey] || 0) + amount;
    }

    if(creditKey){
      balances[creditKey] = (balances[creditKey] || 0) - amount;
    }

  });

  return balances[ledgerId] || 0;
}

	

//////////////////////////////////////////////////
// Ledger Pie Chart (Expense)
//////////////////////////////////////////////////

function renderLedgerPieChart(fromDate,toDate){

  let ledgerMap = {};
  let ledgerNameMap = {};

  ledgerList.forEach(l=>{
    ledgerMap[l.id] = l.group;
    ledgerNameMap[l.id] = l.name;
  });

  let allowedGroups = ["Expense"];

  let totals = {};

  //////////////////////////////////////////////////
  // CALCULATE MOVEMENT
  //////////////////////////////////////////////////

  transactionsCache.forEach(t => {

    if(t.date < fromDate || t.date > toDate) return;

    let amount = Number(t.amount);

    let debitKey = t.debitLedgerId || t.debitLedger;
    let creditKey = t.creditLedgerId || t.creditLedger;

    // Debit
    if(debitKey){
      let group = ledgerMap[debitKey];

      if(allowedGroups.includes(group)){
        if(!totals[debitKey]) totals[debitKey] = 0;
        totals[debitKey] += amount;
      }
    }

    // Credit
    if(creditKey){
      let group = ledgerMap[creditKey];

      if(allowedGroups.includes(group)){
        if(!totals[creditKey]) totals[creditKey] = 0;
        totals[creditKey] -= amount;
      }
    }

  });

  //////////////////////////////////////////////////
  // PREPARE DATA
  //////////////////////////////////////////////////

  let labels = [];
  let data = [];

  Object.keys(totals).forEach(id => {

    let value = totals[id];

    if(value === 0) return;

    labels.push(ledgerNameMap[id] || id);
    data.push(Math.abs(value));
  });

  //////////////////////////////////////////////////
  // COLORS
  //////////////////////////////////////////////////

  let colors = labels.map((_,i)=>{
    let hue = (i * 360 / labels.length);
    return `hsl(${hue},70%,60%)`;
  });

  //////////////////////////////////////////////////
  // RENDER
  //////////////////////////////////////////////////

  const ctx = document.getElementById("expensePieChart");

  if(window.expenseChart){
    window.expenseChart.destroy();
  }

  window.expenseChart = new Chart(ctx, {
    type: "pie",
    data: {
      labels: labels,
      datasets: [{
        data: data,
        backgroundColor: colors
      }]
    },
    options: {
      responsive: true,
      plugins:{
        legend:{ position:"bottom" },
        tooltip:{
          callbacks:{
            label: function(context){
              let total = context.dataset.data.reduce((a,b)=>a+b,0);
              let value = context.raw;
              let percent = ((value/total)*100).toFixed(1);
              return `${context.label}: ${value} (${percent}%)`;
            }
          }
        }
      }
    }
  });

}

  });

function renderPersonalMonthlySummary(){

  let currentYear = new Date().getFullYear();

  let months = [
    "Jan","Feb","Mar","Apr","May","Jun",
    "Jul","Aug","Sep","Oct","Nov","Dec"
  ];

  let monthly = new Array(12).fill(0);

  //////////////////////////////////////////////////
  // LEDGER MAP
  //////////////////////////////////////////////////

  let ledgerMap = {};
  ledgerList.forEach(l=>{
    ledgerMap[l.id] = l.group;
  });

  //////////////////////////////////////////////////
  // PROCESS TRANSACTIONS
  //////////////////////////////////////////////////

  transactionsCache.forEach(t => {

    let d = new Date(t.date);
    if(d.getFullYear() !== currentYear) return;

    let amount = Number(t.amount);
    let monthIndex = d.getMonth();

    let debitKey = t.debitLedgerId || t.debitLedger;
    let creditKey = t.creditLedgerId || t.creditLedger;

    // Debit
    if(debitKey){
      let group = ledgerMap[debitKey];
      if(group === "Expense"){
        monthly[monthIndex] += amount;
      }
    }

    // Credit
    if(creditKey){
      let group = ledgerMap[creditKey];
      if(group === "Expense"){
        monthly[monthIndex] -= amount;
      }
    }

  });

  //////////////////////////////////////////////////
  // BUILD TABLE
  //////////////////////////////////////////////////

  let html = `
<div class="summary-table-wrapper">
<table>
<tr>
  <th>Month</th>
  <th>FY ${currentYear}</th>
</tr>
`;

  months.forEach((m,i)=>{

    let val = monthly[i] === 0 ? "-" : " " + Math.abs(monthly[i]);

    html += `
    <tr>
      <td>${m} ${currentYear}</td>
      <td>${val}</td>
    </tr>`;
  });

  html += "</table></div>";

  document.getElementById("personalMonthlySummary").innerHTML = html;

}

//////////////////////////////////////////////////
// GET NEXT TRANSACTION NUMBER
//////////////////////////////////////////////////

async function getNextTransactionNumber(type){

  let docRef = db.collection("counters").doc("transactions");

  return db.runTransaction(async (transaction) => {

    let doc = await transaction.get(docRef);

    let data;

    if(!doc.exists){

      data = {
        receipt: 0,
        payment: 0,
        journal: 0
      };

      data[type] = 1;

      transaction.set(docRef, data); // ✅ SET for first time

    }else{

      data = doc.data();

      data[type] = (data[type] || 0) + 1;

      transaction.update(docRef, data); // ✅ UPDATE only if exists
    }

    let prefix = {
      receipt: "R",
      payment: "P",
      journal: "J"
    };

    let number = data[type].toString().padStart(4,"0");

    return `${prefix[type]}-${number}`;

  });

}

//////////////////////////////////////////////////

//////////////////////////////////////////////////

async function saveReceipt(){

  if(!checkPermission("write")) return;

  let date = document.getElementById("date").value;
  let debitLedger = document.getElementById("debitLedger").value;   // Cash / Bank
  let creditLedger = document.getElementById("creditLedger").value; // Capital / Income / Liability
  let narration = document.getElementById("narration").value.trim();
  let amount = Number(document.getElementById("amount").value);


if(ledgerList.length === 0){
  showToast("System loading... please wait ⏳","error");
  return;
}	

  if(!date){
    showToast("Please select Date ❌","error");
    return;
  }

  if (!debitLedger || !creditLedger || !narration || !amount) {
    showToast("All fields are mandatory","error");
    return;
  }

  if (debitLedger === creditLedger) {
    showToast("Debit and Credit cannot be same ❌","error");
    return;
  }

  if (amount <= 0) {
    showToast("Amount must be greater than 0","error");
    return;
  }

  try{

    showLoader();

    let txnNumber = await getNextTransactionNumber("receipt");

    // ✅ GET LEDGER NAMES FROM ID
    let debitLedgerObj = ledgerList.find(l => l.id === debitLedger);
    let creditLedgerObj = ledgerList.find(l => l.id === creditLedger);

    await db.collection("transactions").add({
      transactionNumber: txnNumber,
      type: "receipt",

      // ✅ NEW SYSTEM (ID)
      debitLedgerId: debitLedger,
      creditLedgerId: creditLedger,

      // ✅ OLD SYSTEM (NAME - for backward compatibility)
      debitLedger: debitLedgerObj ? debitLedgerObj.name : debitLedger,
      creditLedger: creditLedgerObj ? creditLedgerObj.name : creditLedger,

      date: date,
      narration: narration,
      amount: amount
    });

    hideLoader();
    showToast("Receipt Saved ✅");
    closePopup();

  }catch(e){

    hideLoader();
    console.error(e);
    showToast("Error saving receipt ❌","error");

  }
}

    .filter(t=>{

//////////////////////////////////////////////////
// ✅ GET BALANCE EXCLUDING CURRENT TRANSACTION (FIXED - ID BASED)
//////////////////////////////////////////////////


function getBalanceExcludingTransaction(ledgerId, transactionId){

  let balances = {};

  // Opening balances
  ledgerList.forEach(l=>{
    let val = Number(l.openingBalance || 0);
    if(l.openingType === "credit") val = -val;
    balances[l.id] = val;
  });

  // Transactions excluding current edit transaction
  transactionsCache.forEach(t=>{

    if(t.id === transactionId) return;

    let amount = Number(t.amount);

    let debitKey = t.debitLedgerId || getLedgerIdByName(t.debitLedger);
    let creditKey = t.creditLedgerId || getLedgerIdByName(t.creditLedger);

    if(debitKey){
      balances[debitKey] = (balances[debitKey] || 0) + amount;
    }

    if(creditKey){
      balances[creditKey] = (balances[creditKey] || 0) - amount;
    }

  });

  return balances[ledgerId] || 0;
}

function getLedgerIdByName(name){
  let l = ledgerList.find(x => x.name === name);
  return l ? l.id : null;
}

//////////////////////////////////////////////////

//////////////////////////////////////////////////

function formatDateLocal(date){
  let d = new Date(date);
  let month = String(d.getMonth()+1).padStart(2,"0");
  let day = String(d.getDate()).padStart(2,"0");
  return `${d.getFullYear()}-${month}-${day}`;
}


//////////////////////////////////////////////////
// DATE RANGE VALIDATION (GLOBAL)
//////////////////////////////////////////////////

function validateDateRange(fromDate, toDate){

  if(!fromDate || !toDate){
    showToast("Please select both From Date and To Date","error");
    return false;
  }

  if(fromDate > toDate){
    showToast("From Date cannot be after To Date ❌","error");
    return false;
  }

  return true;
}

//////////////////////////////////////////////////
// CURRENCY WORDS + FUNCTION
//////////////////////////////////////////////////
	
const currencyWords = {
  INR: { main: "Rupees", sub: "Paise" },
  AED: { main: "Dirhams", sub: "Fils" },
  USD: { main: "Dollars", sub: "Cents" },
  GBP: { main: "Pounds", sub: "Pence" },
  EUR: { main: "Euros", sub: "Cents" },
  SAR: { main: "Riyals", sub: "Halalas" },
  QAR: { main: "Riyals", sub: "Dirhams" },
  KWD: { main: "Dinars", sub: "Fils" },
  OMR: { main: "Rials", sub: "Baisa" },
  BHD: { main: "Dinars", sub: "Fils" },
  CAD: { main: "Dollars", sub: "Cents" },
  AUD: { main: "Dollars", sub: "Cents" },
  SGD: { main: "Dollars", sub: "Cents" }
};

function numberToWords(num){
  // simple version (can upgrade later)
  const a = ["","One","Two","Three","Four","Five","Six","Seven","Eight","Nine","Ten","Eleven","Twelve","Thirteen","Fourteen","Fifteen","Sixteen","Seventeen","Eighteen","Nineteen"];
  const b = ["","","Twenty","Thirty","Forty","Fifty","Sixty","Seventy","Eighty","Ninety"];

  if(num < 20) return a[num];
  if(num < 100) return b[Math.floor(num/10)] + " " + a[num%10];
  if(num < 1000) return a[Math.floor(num/100)] + " Hundred " + numberToWords(num%100);
  if(num < 1000000) return numberToWords(Math.floor(num/1000)) + " Thousand " + numberToWords(num%1000);
if(num === 0) return "Zero";
	
  return num;
}

function convertAmountToWords(amount, currency){
  let [intPart, decPart] = amount.toFixed(2).split(".");
  let unit = currencyWords[currency];

  let main = numberToWords(parseInt(intPart));
  let sub = numberToWords(parseInt(decPart));

  if(decPart === "00"){
    return `${main} ${unit.main} Only`;
  }

  return `${main} ${unit.main} and ${sub} ${unit.sub} Only`;
	  }

//////////////////////////////////////////////////
// GENERATE INVOICE AUTO NUMBER
//////////////////////////////////////////////////	

async function generateInvoiceNumber(){

  const counterRef = db.collection("counters").doc("invoiceCounter");

  return db.runTransaction(async (transaction) => {

    const doc = await transaction.get(counterRef);

    let lastNumber = 0;

    if(doc.exists){
      lastNumber = doc.data().lastNumber;
    }

    let nextNumber = lastNumber + 1;

    // UPDATE COUNTER
    if(doc.exists){
  transaction.update(counterRef, {
    lastNumber: nextNumber
  });
} else {
  transaction.set(counterRef, {
    lastNumber: nextNumber
  });
}

    return "ZHR-" + String(nextNumber).padStart(4, '0');

  });

}

function getDueDate(invoiceDate){

  let d = new Date(invoiceDate);
  d.setDate(d.getDate() + 30);

  let y = d.getFullYear();
  let m = String(d.getMonth()+1).padStart(2,"0");
  let day = String(d.getDate()).padStart(2,"0");

  return `${y}-${m}-${day}`;
}

//////////////////////////////////////////////////
// STATUS CALCULATOR
//////////////////////////////////////////////////

function getInvoiceStatus(total,paid){

  total = Number(total || 0);
  paid  = Number(paid || 0);

  if(paid <= 0) return "unpaid";

  if(paid > 0 && paid < total)
    return "partial";

  if(paid >= total)
    return "paid";

  return "unpaid";
}

// No extra button needed

//////////////////////////////////////////////////
// REPLACE FULL saveReceivedPayment(id)
//////////////////////////////////////////////////

async function saveReceivedPayment(id) {

  try {

    let enteredAmount = Number(
      document.getElementById("payAmount").value
    );

    let payDate = document.getElementById("payDate").value;
    let mode    = document.getElementById("payMode").value;
    let note    = document.getElementById("payNote").value;

    if (isNaN(enteredAmount) || enteredAmount < 0) {
      showToast("Enter valid amount", "error");
      return;
    }

    let ref = db.collection("invoices").doc(id);
    let doc = await ref.get();

    let d = doc.data();

    let total = Number(d.total || 0);

    //////////////////////////////////////////////////
    // SAME FIELD NOW = FINAL PAID AMOUNT
    // NOT ADDITIONAL PAYMENT
    //////////////////////////////////////////////////

    let newPaid = enteredAmount;

    if (newPaid > total) {
      showToast("Paid cannot exceed total", "error");
      return;
    }

    let newBalance = total - newPaid;

    //////////////////////////////////////////////////
    // STATUS AUTO LOGIC
    //////////////////////////////////////////////////

    let newStatus = "unpaid";

    if (newPaid === 0) {
      newStatus = "unpaid";
    }
    else if (newPaid < total) {
      newStatus = "partial";
    }
    else if (newPaid === total) {
      newStatus = "paid";
    }

    //////////////////////////////////////////////////
    // SAVE HISTORY (OPTIONAL LOG)
    //////////////////////////////////////////////////

    let history = d.paymentHistory || [];

    history.push({
      correctedPaidAmount: newPaid,
      date: payDate,
      mode: mode,
      note: note,
      updatedAt: new Date().toISOString()
    });

    //////////////////////////////////////////////////
    // UPDATE FIRESTORE
    //////////////////////////////////////////////////

    await ref.update({

      paidAmount: newPaid,
      balanceAmount: newBalance,
      status: newStatus,
      paymentHistory: history,

      updatedAt:
      firebase.firestore.FieldValue.serverTimestamp()

    });

    closePopup();

    showToast("Payment Updated ✅");

    refreshInvoiceReport();

  }
  catch (e) {

    console.error(e);

    showToast("Update failed ❌", "error");

  }

}

        d.invoiceNo || "",
        d.invoiceDate || "",
        d.dueDate || "",
        d.status || "",
        d.currency || "",

        total,
        paid,
        balance,

        d.supplier?.name || "",
        d.supplier?.address || "",
        d.supplier?.gst || "",
        d.supplier?.contact || "",
        d.supplier?.website || "",

        d.recipient?.name || "",
        d.recipient?.address || "",
        d.recipient?.trn || "",
        d.recipient?.contact || "",
        d.recipient?.placeOfSupply || "",

        services,
        d.amountWords || "",

        d.lastSharedAt
          ? d.lastSharedAt.toDate().toLocaleString()
          : "",

        d.lastSharedNumber || ""

      ]);

      row.eachCell((cell, col) => {

        cell.border = {
          top:    { style: "thin" },
          left:   { style: "thin" },
          right:  { style: "thin" },
          bottom: { style: "thin" }
        };

        cell.alignment = {
          vertical: "top",
          wrapText: true
        };

        if ([7,8,9].includes(col)) {
          cell.numFmt = '#,##0.00';
          cell.alignment.horizontal = "right";
        } else {
          cell.alignment.horizontal = "left";
        }

      });

    });

    //////////////////////////////////////////////////
    // TOTAL ROW
    //////////////////////////////////////////////////

    let totalRow = ws.addRow([

      "",
      "",
      "",
      "",
      "",
      "TOTAL",

      grandTotal,
      totalPaid,
      totalBalance

    ]);

    totalRow.eachCell((cell, col) => {

      cell.font = { bold: true };

      cell.border = {
        top:    { style: "thin" },
        left:   { style: "thin" },
        right:  { style: "thin" },
        bottom: { style: "thin" }
      };

      if ([7,8,9].includes(col)) {
        cell.numFmt = '#,##0.00';
        cell.alignment = { horizontal: "right" };
      } else {
        cell.alignment = { horizontal: "left" };
      }

    });

    //////////////////////////////////////////////////
    // DOWNLOAD
    //////////////////////////////////////////////////

    const buffer = await wb.xlsx.writeBuffer();

    saveAs(
      new Blob([buffer]),
      `Invoice_Report_${new Date().toISOString().slice(0,10)}.xlsx`
    );

    hideLoader();

    showToast("Invoice Report Exported 📊");

  }
  catch (e) {

    console.error(e);

    hideLoader();

    showToast("Export failed ❌", "error");

  }

}

//////////////////////////////////////////////////
// RENDER TRIAL BALANCE
//////////////////////////////////////////////////

function renderTrialBalance(){

  let fromDate = sessionStorage.getItem("currentFromDate");
  let toDate   = sessionStorage.getItem("currentToDate");

  //////////////////////////////////////////////////
  // GROUP ORDER
  //////////////////////////////////////////////////

  let groupOrder = [
    "Capital",
    "Drawings",
    "Liability",
    "Asset",
    "Cash & Bank",
    "Income",
    "Expense"
  ];

  //////////////////////////////////////////////////
  // MAP BALANCES
  //////////////////////////////////////////////////

  let rows = [];

  let totalDebit = 0;
  let totalCredit = 0;

  //////////////////////////////////////////////////
  // EACH LEDGER
  //////////////////////////////////////////////////

  groupOrder.forEach(groupName=>{

    let groupLedgers = ledgerList.filter(l => l.group === groupName);

    groupLedgers.forEach(ledger=>{

      let balance = 0;

      //////////////////////////////////////////////
      // BALANCE SHEET GROUPS
      //////////////////////////////////////////////

      if(
        ["Capital","Drawings","Liability","Asset","Cash & Bank"]
        .includes(groupName)
      ){

        balance = Number(ledger.openingBalance || 0);

        if(ledger.openingType === "credit"){
          balance = -balance;
        }

        transactionsCache.forEach(t=>{

          if(t.date > toDate) return;

          let amount = Number(t.amount);

          let debitKey  = t.debitLedgerId  || t.debitLedger;
          let creditKey = t.creditLedgerId || t.creditLedger;

          if(debitKey === ledger.id) balance += amount;
          if(creditKey === ledger.id) balance -= amount;

        });

      }

      //////////////////////////////////////////////
      // P&L GROUPS
      //////////////////////////////////////////////

      else if(groupName === "Income" || groupName === "Expense"){

        balance = 0;

        transactionsCache.forEach(t=>{

          if(t.date < fromDate || t.date > toDate) return;

          let amount = Number(t.amount);

          let debitKey  = t.debitLedgerId  || t.debitLedger;
          let creditKey = t.creditLedgerId || t.creditLedger;

          if(debitKey === ledger.id) balance += amount;
          if(creditKey === ledger.id) balance -= amount;

        });

      }

      //////////////////////////////////////////////
      // SKIP ZERO
      //////////////////////////////////////////////

      if(balance === 0) return;

      let debit = "";
      let credit = "";

      if(balance > 0){
        debit = balance;
        totalDebit += balance;
      }else{
        credit = Math.abs(balance);
        totalCredit += Math.abs(balance);
      }

      rows.push(`
        <tr>
          <td>${ledger.name}</td>
          <td>${groupName}</td>
          <td>${debit}</td>
          <td>${credit}</td>
        </tr>
      `);

    });

  });


  //////////////////////////////////////////////////
// PROFIT & LOSS FINAL ROW (CORRECTED)
//////////////////////////////////////////////////

let pnlLedger = ledgerList.find(l => l.group === "Profit & Loss");

let pnlBalance = 0;

if(pnlLedger){

  pnlBalance = Number(pnlLedger.openingBalance || 0);

  // credit = profit reserve
  if(pnlLedger.openingType === "credit"){
    pnlBalance = -pnlBalance;
  }

}

//////////////////////////////////////////////////
// ADD NET RESULT FROM OPENING DATE TILL BEFORE FROM
//////////////////////////////////////////////////

transactionsCache.forEach(t=>{

  if(t.date >= fromDate) return;

  let amount = Number(t.amount);

  let debitKey  = t.debitLedgerId  || t.debitLedger;
  let creditKey = t.creditLedgerId || t.creditLedger;

  let debitLedger  = ledgerList.find(x => x.id === debitKey);
  let creditLedger = ledgerList.find(x => x.id === creditKey);

  // Expense debit = reduces profit
  if(debitLedger && debitLedger.group === "Expense"){
    pnlBalance += amount;
  }

  // Expense credit = increases profit
  if(creditLedger && creditLedger.group === "Expense"){
    pnlBalance -= amount;
  }

  // Income credit = increases profit
  if(creditLedger && creditLedger.group === "Income"){
    pnlBalance -= amount;
  }

  // Income debit = reduces profit
  if(debitLedger && debitLedger.group === "Income"){
    pnlBalance += amount;
  }

});

let pnlDebit = "";
let pnlCredit = "";

if(pnlBalance > 0){
  pnlDebit = pnlBalance;
  totalDebit += pnlBalance;
}
else if(pnlBalance < 0){
  pnlCredit = Math.abs(pnlBalance);
  totalCredit += Math.abs(pnlBalance);
}

rows.push(`
<tr>
  <td>${pnlLedger ? pnlLedger.name : "Profit & Loss"}</td>
  <td>Profit & Loss</td>
  <td>${pnlDebit}</td>
  <td>${pnlCredit}</td>
</tr>
`);


  //////////////////////////////////////////////////
  // FINAL HTML
  //////////////////////////////////////////////////

  let html = `

    <h3>Trial Balance</h3>
    <p>From ${fromDate} To ${toDate}</p>

    <table class="report-table trial-balance-table">

      <tr>
        <th>Particulars</th>
        <th>Group</th>
        <th>Debit</th>
        <th>Credit</th>
      </tr>

      ${rows.join("")}

      <tr>
        <td colspan="2"><b>Total</b></td>
        <td><b>${totalDebit}</b></td>
        <td><b>${totalCredit}</b></td>
      </tr>

    </table>
  `;

  document.getElementById("reportOutput").innerHTML = html;
formatAllAmounts();
return html;
}

//////////////////////////////////////////////////
// RENDER PROFIT & LOSS ACCOUNT
// (USE AFTER renderTrialBalance())
//////////////////////////////////////////////////

function renderProfitLoss(){

  let fromDate = sessionStorage.getItem("currentFromDate");
  let toDate   = sessionStorage.getItem("currentToDate");

  //////////////////////////////////////////////////
  // COLLECT EXPENSE + INCOME LEDGERS
  //////////////////////////////////////////////////

  let expenseRows = [];
  let incomeRows  = [];

  let totalExpense = 0;
  let totalIncome  = 0;

  //////////////////////////////////////////////////
  // EXPENSE GROUP (PERIOD ONLY)
  //////////////////////////////////////////////////

  ledgerList
    .filter(l => l.group === "Expense")
    .forEach(ledger=>{

      let balance = 0;

      transactionsCache.forEach(t=>{

        if(t.date < fromDate || t.date > toDate) return;

        let amount = Number(t.amount);

        let debitKey  = t.debitLedgerId  || t.debitLedger;
        let creditKey = t.creditLedgerId || t.creditLedger;

        if(debitKey === ledger.id)  balance += amount;
        if(creditKey === ledger.id) balance -= amount;

      });

      let value = Math.abs(balance);

      if(value === 0) return;

      totalExpense += value;

      expenseRows.push({
        name: ledger.name,
        amount: value
      });

    });

  //////////////////////////////////////////////////
  // INCOME GROUP (PERIOD ONLY)
  //////////////////////////////////////////////////

  ledgerList
    .filter(l => l.group === "Income")
    .forEach(ledger=>{

      let balance = 0;

      transactionsCache.forEach(t=>{

        if(t.date < fromDate || t.date > toDate) return;

        let amount = Number(t.amount);

        let debitKey  = t.debitLedgerId  || t.debitLedger;
        let creditKey = t.creditLedgerId || t.creditLedger;

        if(debitKey === ledger.id)  balance += amount;
        if(creditKey === ledger.id) balance -= amount;

      });

      let value = Math.abs(balance);

      if(value === 0) return;

      totalIncome += value;

      incomeRows.push({
        name: ledger.name,
        amount: value
      });

    });

  //////////////////////////////////////////////////
  // NET RESULT
  //////////////////////////////////////////////////

  let netProfit = 0;
  let netLoss   = 0;

  if(totalIncome > totalExpense){
    netProfit = totalIncome - totalExpense;
  }
  else if(totalExpense > totalIncome){
    netLoss = totalExpense - totalIncome;
  }

  //////////////////////////////////////////////////
  // MAX ROWS
  //////////////////////////////////////////////////

  let leftCount  = expenseRows.length + (netProfit ? 1 : 0);
  let rightCount = incomeRows.length + (netLoss ? 1 : 0);

  let maxRows = Math.max(leftCount,rightCount);

  //////////////////////////////////////////////////
  // BUILD HTML
  //////////////////////////////////////////////////

  let html = `

    <h3 style="text-align:center;">Profit & Loss Account</h3>
    <p style="text-align:center;">From ${fromDate} To ${toDate}</p>

    <table class="report-table financial-table">

      <tr>
        <th>Particulars</th>
        <th>Amount</th>
        <th>Particulars</th>
        <th>Amount</th>
      </tr>
  `;

  for(let i=0;i<maxRows;i++){

    let leftName = "";
    let leftAmt  = "";

    let rightName = "";
    let rightAmt  = "";

    ////////////////////////////////////////////////
    // LEFT SIDE = EXPENSE
    ////////////////////////////////////////////////

    if(i < expenseRows.length){

      leftName = expenseRows[i].name;
      leftAmt  = expenseRows[i].amount;

    }else if(i === expenseRows.length && netProfit){

      leftName = "<b>Net Profit</b>";
      leftAmt  = `<b>${netProfit}</b>`;
    }

    ////////////////////////////////////////////////
    // RIGHT SIDE = INCOME
    ////////////////////////////////////////////////

    if(i < incomeRows.length){

      rightName = incomeRows[i].name;
      rightAmt  = incomeRows[i].amount;

    }else if(i === incomeRows.length && netLoss){

      rightName = "<b>Net Loss</b>";
      rightAmt  = `<b>${netLoss}</b>`;
    }

    html += `
      <tr>
        <td style="text-align:left;">${leftName}</td>
        <td>${leftAmt}</td>
        <td style="text-align:left;">${rightName}</td>
        <td>${rightAmt}</td>
      </tr>
    `;
  }

  //////////////////////////////////////////////////
  // TOTAL ROW
  //////////////////////////////////////////////////

  let grandTotal = Math.max(totalExpense,totalIncome);

  html += `
      <tr>
        <td><b>Total</b></td>
        <td><b>${grandTotal}</b></td>
        <td><b>Total</b></td>
        <td><b>${grandTotal}</b></td>
      </tr>

    </table>
  `;

  //////////////////////////////////////////////////
  // APPEND BELOW TRIAL BALANCE
  //////////////////////////////////////////////////

  document.getElementById("reportOutput").innerHTML = html;
formatAllAmounts();
return html;
}

//////////////////////////////////////////////////
// RENDER BALANCE SHEET
//////////////////////////////////////////////////

function renderBalanceSheet(){

  let fromDate = sessionStorage.getItem("currentFromDate");
  let toDate   = sessionStorage.getItem("currentToDate");

  //////////////////////////////////////////////////
  // HELPERS
  //////////////////////////////////////////////////

  function getClosingBalance(ledger){

    let bal = Number(ledger.openingBalance || 0);

    if(ledger.openingType === "credit"){
      bal = -bal;
    }

    transactionsCache.forEach(t=>{

      if(t.date > toDate) return;

      let amount = Number(t.amount);

      let debitKey  = t.debitLedgerId  || t.debitLedger;
      let creditKey = t.creditLedgerId || t.creditLedger;

      if(debitKey === ledger.id) bal += amount;
      if(creditKey === ledger.id) bal -= amount;

    });

    return bal;
  }


  function getPeriodProfitLoss(){

    let income = 0;
    let expense = 0;

    transactionsCache.forEach(t=>{

      if(t.date < fromDate || t.date > toDate) return;

      let amount = Number(t.amount);

      let debitKey  = t.debitLedgerId  || t.debitLedger;
      let creditKey = t.creditLedgerId || t.creditLedger;

      let debitLedger  = ledgerList.find(x=>x.id===debitKey);
      let creditLedger = ledgerList.find(x=>x.id===creditKey);

      if(debitLedger && debitLedger.group === "Expense"){
        expense += amount;
      }

      if(creditLedger && creditLedger.group === "Expense"){
        expense -= amount;
      }

      if(creditLedger && creditLedger.group === "Income"){
        income += amount;
      }

      if(debitLedger && debitLedger.group === "Income"){
        income -= amount;
      }

    });

    return income - expense; // profit + / loss -
  }



  //////////////////////////////////////////////////
  // LEFT SIDE (CAPITAL + LIABILITY)
  //////////////////////////////////////////////////

  let leftRows = "";

  let leftTotal = 0;

  //////////////////////////////////////////////////
  // CAPITAL
  //////////////////////////////////////////////////

  leftRows += `
    <tr>
      <th colspan="2" style="text-align:left;">Capital</th>
    </tr>
  `;

  let capitalTotal = 0;

  ledgerList
    .filter(l => l.group === "Capital")
    .forEach(l=>{

      let bal = getClosingBalance(l);

      if(bal === 0) return;

      let amt = Math.abs(bal);

      capitalTotal += amt;

      leftRows += `
        <tr>
          <td>${l.name}</td>
          <td>${amt}</td>
        </tr>
      `;
    });


  //////////////////////////////////////////////////
  // OPENING P&L
  //////////////////////////////////////////////////

  let pnlLedger = ledgerList.find(l => l.group === "Profit & Loss");

  let openingPL = 0;

  if(pnlLedger){

    openingPL = Number(pnlLedger.openingBalance || 0);

    if(pnlLedger.openingType === "credit"){
      openingPL = -openingPL;
    }

    transactionsCache.forEach(t=>{

      if(t.date >= fromDate) return;

      let amount = Number(t.amount);

      let debitKey  = t.debitLedgerId  || t.debitLedger;
      let creditKey = t.creditLedgerId || t.creditLedger;

      let debitLedger  = ledgerList.find(x=>x.id===debitKey);
      let creditLedger = ledgerList.find(x=>x.id===creditKey);

      if(debitLedger && debitLedger.group === "Expense"){
        openingPL += amount;
      }

      if(creditLedger && creditLedger.group === "Expense"){
        openingPL -= amount;
      }

      if(creditLedger && creditLedger.group === "Income"){
        openingPL -= amount;
      }

      if(debitLedger && debitLedger.group === "Income"){
        openingPL += amount;
      }

    });

  }

  if(openingPL !== 0){

    let amt = Math.abs(openingPL);

    capitalTotal += amt;

    leftRows += `
      <tr>
        <td>Add: Opening P&L</td>
        <td>${amt}</td>
      </tr>
    `;
  }



  //////////////////////////////////////////////////
  // CURRENT PROFIT / LOSS
  //////////////////////////////////////////////////

  let currentPL = getPeriodProfitLoss();

  if(currentPL > 0){

    capitalTotal += currentPL;

    leftRows += `
      <tr>
        <td>Add: Current Profit</td>
        <td>${currentPL}</td>
      </tr>
    `;
  }

  if(currentPL < 0){

    capitalTotal -= Math.abs(currentPL);

    leftRows += `
      <tr>
        <td>Less: Current Loss</td>
        <td>${Math.abs(currentPL)}</td>
      </tr>
    `;
  }



  //////////////////////////////////////////////////
  // DRAWINGS
  //////////////////////////////////////////////////

  let drawings = 0;

  ledgerList
    .filter(l => l.group === "Drawings")
    .forEach(l=>{
      drawings += Math.abs(getClosingBalance(l));
    });

  if(drawings !== 0){

    capitalTotal -= drawings;

    leftRows += `
      <tr>
        <td>Less: Drawings</td>
        <td>${drawings}</td>
      </tr>
    `;
  }



  //////////////////////////////////////////////////
  // CLOSING CAPITAL
  //////////////////////////////////////////////////

  leftRows += `
    <tr>
      <td><b>Closing Capital</b></td>
      <td><b>${capitalTotal}</b></td>
    </tr>
  `;

  leftTotal += capitalTotal;



  //////////////////////////////////////////////////
  // LIABILITIES
  //////////////////////////////////////////////////

  leftRows += `
    <tr>
      <th colspan="2" style="text-align:left;">Liabilities</th>
    </tr>
  `;

  ledgerList
    .filter(l => l.group === "Liability")
    .forEach(l=>{

      let bal = getClosingBalance(l);

      if(bal >= 0) return;

      let amt = Math.abs(bal);

      leftTotal += amt;

      leftRows += `
        <tr>
          <td>${l.name}</td>
          <td>${amt}</td>
        </tr>
      `;
    });



  //////////////////////////////////////////////////
  // RIGHT SIDE (ASSET + CASH & BANK)
  //////////////////////////////////////////////////

  let rightRows = "";

  let rightTotal = 0;



  //////////////////////////////////////////////////
  // ASSETS
  //////////////////////////////////////////////////

  rightRows += `
    <tr>
      <th colspan="2" style="text-align:left;">Assets</th>
    </tr>
  `;

  ledgerList
    .filter(l => l.group === "Asset")
    .forEach(l=>{

      let bal = getClosingBalance(l);

      if(bal <= 0) return;

      rightTotal += bal;

      rightRows += `
        <tr>
          <td>${l.name}</td>
          <td>${bal}</td>
        </tr>
      `;
    });



  //////////////////////////////////////////////////
  // CASH & BANK
  //////////////////////////////////////////////////

  rightRows += `
    <tr>
      <th colspan="2" style="text-align:left;">Cash & Bank</th>
    </tr>
  `;

  ledgerList
    .filter(l => l.group === "Cash & Bank")
    .forEach(l=>{

      let bal = getClosingBalance(l);

      if(bal <= 0) return;

      rightTotal += bal;

      rightRows += `
        <tr>
          <td>${l.name}</td>
          <td>${bal}</td>
        </tr>
      `;
    });



  //////////////////////////////////////////////////
  // EQUALIZE ROW HEIGHTS
  //////////////////////////////////////////////////

  let leftCount  = (leftRows.match(/<tr>/g) || []).length;
  let rightCount = (rightRows.match(/<tr>/g) || []).length;

  while(leftCount < rightCount){
    leftRows += `<tr><td>&nbsp;</td><td></td></tr>`;
    leftCount++;
  }

  while(rightCount < leftCount){
    rightRows += `<tr><td>&nbsp;</td><td></td></tr>`;
    rightCount++;
  }



  //////////////////////////////////////////////////
  // BUILD FINAL TABLE
  //////////////////////////////////////////////////

  let leftArr  = leftRows.split("</tr>");
  let rightArr = rightRows.split("</tr>");

  let bodyRows = "";

  for(let i=0;i<leftArr.length-1;i++){

    bodyRows += `
      <tr>
        ${leftArr[i].replace("<tr>","")}
        ${rightArr[i].replace("<tr>","")}

    `;
  }



  //////////////////////////////////////////////////
  // HTML
  //////////////////////////////////////////////////

  let html = `

    <h3 style="text-align:center;">Balance Sheet</h3>
    <p style="text-align:center;">As on ${toDate}</p>

    <table class="report-table balance-sheet-table">

      <tr>

        <td><b>${leftTotal}</b></td>
        <td><b>Total</b></td>
        <td><b>${rightTotal}</b></td>
      </tr>

    </table>

  `;

  document.getElementById("reportOutput").innerHTML = html;
formatAllAmounts();
return html;
}

//////////////////////////////////////////////////

async function exportFinancialStatement(){

  try{

    showLoader();

    let reportType = sessionStorage.getItem("currentReport");
    let fromDate   = sessionStorage.getItem("currentFromDate");
    let toDate     = sessionStorage.getItem("currentToDate");

    const workbook = new ExcelJS.Workbook();

    workbook.creator = "ZHR Accounting";
    workbook.created = new Date();

    const sheet = workbook.addWorksheet("Report");

    //////////////////////////////////////////////////
    // COLUMN WIDTHS
    //////////////////////////////////////////////////

    sheet.columns = [
      {width:32},
      {width:18},
      {width:32},
      {width:18}
    ];

    let rowNo = 1;

    //////////////////////////////////////////////////
    // REPORT TYPE
    //////////////////////////////////////////////////

    if(reportType === "trialBalance"){

      rowNo = exportTrialBalanceExcelV2(
        sheet,rowNo,fromDate,toDate
      );
    }

    else if(reportType === "profitLoss"){

      rowNo = exportProfitLossExcelV2(
        sheet,rowNo,fromDate,toDate
      );
    }

    else if(reportType === "balanceSheet"){

      rowNo = exportBalanceSheetExcelV2(
        sheet,rowNo,fromDate,toDate
      );
    }

    else{

      rowNo = exportTrialBalanceExcelV2(
        sheet,rowNo,fromDate,toDate
      );

      rowNo += 3;

      rowNo = exportProfitLossExcelV2(
        sheet,rowNo,fromDate,toDate
      );

      rowNo += 3;

      rowNo = exportBalanceSheetExcelV2(
        sheet,rowNo,fromDate,toDate
      );

      reportType = "financialStatement";
    }

    //////////////////////////////////////////////////
    // FILE NAME
    //////////////////////////////////////////////////

    let fileName = "Report.xlsx";

    if(reportType === "trialBalance"){
      fileName =
      `Trial_Balance_${fromDate}_to_${toDate}.xlsx`;
    }

    if(reportType === "profitLoss"){
      fileName =
      `Profit_Loss_${fromDate}_to_${toDate}.xlsx`;
    }

    if(reportType === "balanceSheet"){
      fileName =
      `Balance_Sheet_As_on_${toDate}.xlsx`;
    }

    if(reportType === "financialStatement"){
      fileName =
      `Financial_Statement_${fromDate}_to_${toDate}.xlsx`;
    }

    //////////////////////////////////////////////////
    // DOWNLOAD
    //////////////////////////////////////////////////

    const buffer =
      await workbook.xlsx.writeBuffer();

    saveAs(new Blob([buffer]),fileName);

    hideLoader();

    showToast("Report Exported 📊");

  }catch(e){

    console.error(e);

    hideLoader();

    showToast("Export failed ❌","error");
  }
}

function fsTitle(sheet,rowNo,title){

  sheet.mergeCells(`A${rowNo}:D${rowNo}`);

  let cell = sheet.getCell(`A${rowNo}`);

  cell.value = title;

  cell.font = {
    bold:true,
    size:16
  };

  cell.alignment = {
    horizontal:"center"
  };
}

function fsSubTitle(sheet,rowNo,text){

  sheet.mergeCells(`A${rowNo}:D${rowNo}`);

  let cell = sheet.getCell(`A${rowNo}`);

  cell.value = text;

  cell.alignment = {
    horizontal:"center"
  };
}

function fsHeader(row){

  row.eachCell(cell=>{

    cell.font = {
      bold:true,
      color:{argb:"FFFFFFFF"}
    };

    cell.fill = {
      type:"pattern",
      pattern:"solid",
      fgColor:{argb:"FF001D4C"}
    };

    cell.alignment = {
      horizontal:"center"
    };

    cell.border = {
      top:{style:"thin"},
      left:{style:"thin"},
      right:{style:"thin"},
      bottom:{style:"thin"}
    };

  });
}

function fsRow(row){

  row.eachCell((cell,col)=>{

    cell.border = {
      top:{style:"thin"},
      left:{style:"thin"},
      right:{style:"thin"},
      bottom:{style:"thin"}
    };

    if(col === 1 || col === 3){
      cell.alignment = {
        horizontal:"left"
      };
    }

    if(col === 2 || col === 4){
      cell.alignment = {
        horizontal:"right"
      };

      cell.numFmt = '#,##0.00';
    }

  });
}

  
      
 //////////////////////////////////////////////////
// FINAL EXPORT V2 - PART 2
// TRIAL BALANCE EXPORT
// Paste below Part 1
//////////////////////////////////////////////////

function exportTrialBalanceExcelV2(
  sheet,rowNo,fromDate,toDate
){

  //////////////////////////////////////////////////
  // TITLE
  //////////////////////////////////////////////////

  fsTitle(
    sheet,
    rowNo,
    "Trial Balance"
  );

  rowNo++;

  fsSubTitle(
    sheet,
    rowNo,
    `From ${fromDate} To ${toDate}`
  );

  rowNo += 2;

  //////////////////////////////////////////////////
  // HEADER
  //////////////////////////////////////////////////

  let head = sheet.addRow([
    "Particulars",
    "Group",
    "Debit",
    "Credit"
  ]);

  fsHeader(head);

  rowNo++;

  //////////////////////////////////////////////////
  // GROUP ORDER
  //////////////////////////////////////////////////

  let groupOrder = [
    "Capital",
    "Drawings",
    "Liability",
    "Asset",
    "Cash & Bank",
    "Income",
    "Expense"
  ];

  let totalDebit  = 0;
  let totalCredit = 0;

  //////////////////////////////////////////////////
  // LEDGER LOOP
  //////////////////////////////////////////////////

  groupOrder.forEach(groupName=>{

    let ledgers =
      ledgerList.filter(
        l => l.group === groupName
      );

    ledgers.forEach(ledger=>{

      let balance = 0;

      //////////////////////////////////////////////
      // BS GROUPS
      //////////////////////////////////////////////

      if(
        [
          "Capital",
          "Drawings",
          "Liability",
          "Asset",
          "Cash & Bank"
        ].includes(groupName)
      ){

        balance =
          Number(
            ledger.openingBalance || 0
          );

        if(
          ledger.openingType ===
          "credit"
        ){
          balance = -balance;
        }

        transactionsCache.forEach(t=>{

          if(t.date > toDate)
            return;

          let amount =
            Number(t.amount);

          let debitKey =
            t.debitLedgerId ||
            t.debitLedger;

          let creditKey =
            t.creditLedgerId ||
            t.creditLedger;

          if(
            debitKey === ledger.id
          ){
            balance += amount;
          }

          if(
            creditKey === ledger.id
          ){
            balance -= amount;
          }

        });
      }

      //////////////////////////////////////////////
      // P&L GROUPS
      //////////////////////////////////////////////

      else{

        transactionsCache.forEach(t=>{

          if(
            t.date < fromDate ||
            t.date > toDate
          ) return;

          let amount =
            Number(t.amount);

          let debitKey =
            t.debitLedgerId ||
            t.debitLedger;

          let creditKey =
            t.creditLedgerId ||
            t.creditLedger;

          if(
            debitKey === ledger.id
          ){
            balance += amount;
          }

          if(
            creditKey === ledger.id
          ){
            balance -= amount;
          }

        });
      }

      if(balance === 0)
        return;

      let debit  = "";
      let credit = "";

      if(balance > 0){

        debit = balance;
        totalDebit += balance;

      }else{

        credit =
          Math.abs(balance);

        totalCredit +=
          Math.abs(balance);
      }

      let row =
        sheet.addRow([
          ledger.name,
          groupName,
          debit,
          credit
        ]);

      fsRow(row);

      row.getCell(2).alignment = {
        horizontal:"left"
      };

      row.getCell(3).numFmt =
      '#,##0.00';

      row.getCell(4).numFmt =
      '#,##0.00';

      rowNo++;

    });

  });

  //////////////////////////////////////////////////
  // OPENING P&L ROW
  //////////////////////////////////////////////////

  let pnlLedger =
    ledgerList.find(
      l => l.group ===
      "Profit & Loss"
    );

  let pnlBalance = 0;

  if(pnlLedger){

    pnlBalance =
      Number(
        pnlLedger
        .openingBalance || 0
      );

    if(
      pnlLedger.openingType
      === "credit"
    ){
      pnlBalance = -pnlBalance;
    }
  }

  transactionsCache.forEach(t=>{

    if(t.date >= fromDate)
      return;

    let amount =
      Number(t.amount);

    let debitKey =
      t.debitLedgerId ||
      t.debitLedger;

    let creditKey =
      t.creditLedgerId ||
      t.creditLedger;

    let debitLedger =
      ledgerList.find(
        x => x.id===debitKey
      );

    let creditLedger =
      ledgerList.find(
        x => x.id===creditKey
      );

    if(
      debitLedger &&
      debitLedger.group ===
      "Expense"
    ) pnlBalance += amount;

    if(
      creditLedger &&
      creditLedger.group ===
      "Expense"
    ) pnlBalance -= amount;

    if(
      creditLedger &&
      creditLedger.group ===
      "Income"
    ) pnlBalance -= amount;

    if(
      debitLedger &&
      debitLedger.group ===
      "Income"
    ) pnlBalance += amount;

  });

  if(pnlBalance !== 0){

    let debit  = "";
    let credit = "";

    if(pnlBalance > 0){

      debit = pnlBalance;
      totalDebit += pnlBalance;

    }else{

      credit =
      Math.abs(pnlBalance);

      totalCredit +=
      Math.abs(pnlBalance);
    }

    let row =
      sheet.addRow([
        pnlLedger
        ? pnlLedger.name
        : "Profit & Loss",

        "Profit & Loss",

        debit,
        credit
      ]);

    fsRow(row);

    rowNo++;
  }

  //////////////////////////////////////////////////
  // TOTAL
  //////////////////////////////////////////////////

  let totalRow =
    sheet.addRow([
      "Total",
      "",
      totalDebit,
      totalCredit
    ]);

  totalRow.font = {
    bold:true
  };

  fsRow(totalRow);

  rowNo++;

  return rowNo;
	}

function exportProfitLossExcelV2(
  sheet,rowNo,fromDate,toDate
){

  //////////////////////////////////////////////////
  // TITLE
  //////////////////////////////////////////////////

  fsTitle(
    sheet,
    rowNo,
    "Profit & Loss Account"
  );

  rowNo++;

  fsSubTitle(
    sheet,
    rowNo,
    `From ${fromDate} To ${toDate}`
  );

  rowNo += 2;

  //////////////////////////////////////////////////
  // HEADER
  //////////////////////////////////////////////////

  let head = sheet.addRow([
    "Particulars",
    "Amount",
    "Particulars",
    "Amount"
  ]);

  fsHeader(head);

  rowNo++;

  //////////////////////////////////////////////////
  // EXPENSES
  //////////////////////////////////////////////////

  let expenseRows = [];
  let incomeRows  = [];

  let totalExpense = 0;
  let totalIncome  = 0;

  ledgerList
  .filter(l => l.group === "Expense")
  .forEach(ledger=>{

    let bal = 0;

    transactionsCache.forEach(t=>{

      if(
        t.date < fromDate ||
        t.date > toDate
      ) return;

      let amt =
      Number(t.amount);

      let d =
      t.debitLedgerId ||
      t.debitLedger;

      let c =
      t.creditLedgerId ||
      t.creditLedger;

      if(d === ledger.id)
        bal += amt;

      if(c === ledger.id)
        bal -= amt;

    });

    let value =
    Math.abs(bal);

    if(value === 0)
      return;

    totalExpense += value;

    expenseRows.push({
      name:ledger.name,
      amount:value
    });

  });

  //////////////////////////////////////////////////
  // INCOME
  //////////////////////////////////////////////////

  ledgerList
  .filter(l => l.group === "Income")
  .forEach(ledger=>{

    let bal = 0;

    transactionsCache.forEach(t=>{

      if(
        t.date < fromDate ||
        t.date > toDate
      ) return;

      let amt =
      Number(t.amount);

      let d =
      t.debitLedgerId ||
      t.debitLedger;

      let c =
      t.creditLedgerId ||
      t.creditLedger;

      if(d === ledger.id)
        bal += amt;

      if(c === ledger.id)
        bal -= amt;

    });

    let value =
    Math.abs(bal);

    if(value === 0)
      return;

    totalIncome += value;

    incomeRows.push({
      name:ledger.name,
      amount:value
    });

  });

  //////////////////////////////////////////////////
  // PROFIT / LOSS
  //////////////////////////////////////////////////

  let netProfit = 0;
  let netLoss   = 0;

  if(totalIncome > totalExpense){
    netProfit =
    totalIncome - totalExpense;
  }

  if(totalExpense > totalIncome){
    netLoss =
    totalExpense - totalIncome;
  }

  let leftCount =
    expenseRows.length +
    (netProfit ? 1 : 0);

  let rightCount =
    incomeRows.length +
    (netLoss ? 1 : 0);

  let maxRows =
    Math.max(
      leftCount,
      rightCount
    );

  //////////////////////////////////////////////////
  // BODY
  //////////////////////////////////////////////////

  for(let i=0;i<maxRows;i++){

    let leftName = "";
    let leftAmt  = "";

    let rightName = "";
    let rightAmt  = "";

    if(i < expenseRows.length){

      leftName =
      expenseRows[i].name;

      leftAmt =
      expenseRows[i].amount;

    }else if(
      i === expenseRows.length &&
      netProfit
    ){

      leftName =
      "Net Profit";

      leftAmt =
      netProfit;
    }

    if(i < incomeRows.length){

      rightName =
      incomeRows[i].name;

      rightAmt =
      incomeRows[i].amount;

    }else if(
      i === incomeRows.length &&
      netLoss
    ){

      rightName =
      "Net Loss";

      rightAmt =
      netLoss;
    }

    let row =
    sheet.addRow([
      leftName,
      leftAmt,
      rightName,
      rightAmt
    ]);

    fsRow(row);

    rowNo++;
  }

  //////////////////////////////////////////////////
  // TOTAL
  //////////////////////////////////////////////////

  let grandTotal =
  Math.max(
    totalExpense,
    totalIncome
  );

  let totalRow =
  sheet.addRow([
    "Total",
    grandTotal,
    "Total",
    grandTotal
  ]);

  totalRow.font = {
    bold:true
  };

  fsRow(totalRow);

  rowNo++;

  return rowNo;
	  }


  //////////////////////////////////////////////////
  // BALAMCE SHEET EXPORT
  //////////////////////////////////////////////////

function exportBalanceSheetExcelV2(sheet,rowNo,fromDate,toDate){

  //////////////////////////////////////////////////
  // TITLE
  //////////////////////////////////////////////////

  fsTitle(sheet,rowNo,"Balance Sheet");
  rowNo++;

  fsSubTitle(sheet,rowNo,`As on ${toDate}`);
  rowNo += 2;

  //////////////////////////////////////////////////
  // HEADER
  //////////////////////////////////////////////////

  let head = sheet.addRow([
    "Particulars","Amount",
    "Particulars","Amount"
  ]);

  fsHeader(head);
  rowNo++;

  //////////////////////////////////////////////////
  // HELPERS
  //////////////////////////////////////////////////

  function getClosingBalance(ledger){

    let bal = Number(ledger.openingBalance || 0);

    if(ledger.openingType === "credit"){
      bal = -bal;
    }

    transactionsCache.forEach(t=>{

      if(t.date > toDate) return;

      let amt = Number(t.amount);

      let d = t.debitLedgerId || t.debitLedger;
      let c = t.creditLedgerId || t.creditLedger;

      if(d === ledger.id) bal += amt;
      if(c === ledger.id) bal -= amt;

    });

    return bal;
  }

  function getOpeningPL(){

    let pnlLedger = ledgerList.find(
      l => l.group === "Profit & Loss"
    );

    let pnl = 0;

    if(pnlLedger){

      pnl = Number(pnlLedger.openingBalance || 0);

      if(pnlLedger.openingType === "credit"){
        pnl = -pnl;
      }

    }

    transactionsCache.forEach(t=>{

      if(t.date >= fromDate) return;

      let amt = Number(t.amount);

      let d = t.debitLedgerId || t.debitLedger;
      let c = t.creditLedgerId || t.creditLedger;

      let dl = ledgerList.find(x=>x.id===d);
      let cl = ledgerList.find(x=>x.id===c);

      if(dl && dl.group==="Expense") pnl += amt;
      if(cl && cl.group==="Expense") pnl -= amt;

      if(cl && cl.group==="Income") pnl -= amt;
      if(dl && dl.group==="Income") pnl += amt;

    });

    return pnl;
  }

  function getCurrentPL(){

    let income = 0;
    let expense = 0;

    transactionsCache.forEach(t=>{

      if(t.date < fromDate || t.date > toDate) return;

      let amt = Number(t.amount);

      let d = t.debitLedgerId || t.debitLedger;
      let c = t.creditLedgerId || t.creditLedger;

      let dl = ledgerList.find(x=>x.id===d);
      let cl = ledgerList.find(x=>x.id===c);

      if(dl && dl.group==="Expense") expense += amt;
      if(cl && cl.group==="Expense") expense -= amt;

      if(cl && cl.group==="Income") income += amt;
      if(dl && dl.group==="Income") income -= amt;

    });

    return income - expense;
  }

  //////////////////////////////////////////////////
  // BUILD LEFT (CAPITAL + LIABILITY)
  //////////////////////////////////////////////////

  let left = [];
  let leftTotal = 0;

  ////////////////////// CAPITAL ////////////////////

  left.push(["Capital",""]);

  let capitalTotal = 0;

  ledgerList
  .filter(l=>l.group==="Capital")
  .forEach(l=>{

    let bal = Math.abs(getClosingBalance(l));

    if(!bal) return;

    capitalTotal += bal;

    left.push([l.name,bal]);
  });

  ////////////////// OPENING P&L ////////////////////

  let openingPL = getOpeningPL();

  if(openingPL !== 0){

    capitalTotal += Math.abs(openingPL);

    left.push([
      "Add: Opening P&L",
      Math.abs(openingPL)
    ]);
  }

  ////////////////// CURRENT P&L ////////////////////

  let currentPL = getCurrentPL();

  if(currentPL > 0){

    capitalTotal += currentPL;

    left.push([
      "Add: Current Profit",
      currentPL
    ]);
  }

  if(currentPL < 0){

    capitalTotal -= Math.abs(currentPL);

    left.push([
      "Less: Current Loss",
      Math.abs(currentPL)
    ]);
  }

  ////////////////// DRAWINGS ////////////////////

  let drawings = 0;

  ledgerList
  .filter(l=>l.group==="Drawings")
  .forEach(l=>{
    drawings += Math.abs(getClosingBalance(l));
  });

  if(drawings){

    capitalTotal -= drawings;

    left.push([
      "Less: Drawings",
      drawings
    ]);
  }

  ////////////////// CLOSING ////////////////////

  left.push([
    "Closing Capital",
    capitalTotal
  ]);

  leftTotal += capitalTotal;

  ////////////////// LIABILITY ////////////////////

  left.push(["Liabilities",""]);

  ledgerList
  .filter(l=>l.group==="Liability")
  .forEach(l=>{

    let bal = getClosingBalance(l);

    if(bal >= 0) return;

    bal = Math.abs(bal);

    leftTotal += bal;

    left.push([l.name,bal]);
  });

  //////////////////////////////////////////////////
  // BUILD RIGHT (ASSETS + CASH)
  //////////////////////////////////////////////////

  let right = [];
  let rightTotal = 0;

  right.push(["Assets",""]);

  ledgerList
  .filter(l=>l.group==="Asset")
  .forEach(l=>{

    let bal = getClosingBalance(l);

    if(bal <= 0) return;

    rightTotal += bal;

    right.push([l.name,bal]);
  });

  right.push(["Cash & Bank",""]);

  ledgerList
  .filter(l=>l.group==="Cash & Bank")
  .forEach(l=>{

    let bal = getClosingBalance(l);

    if(bal <= 0) return;

    rightTotal += bal;

    right.push([l.name,bal]);
  });

  //////////////////////////////////////////////////
  // ALIGN ROWS
  //////////////////////////////////////////////////

  let maxRows = Math.max(left.length,right.length);

  while(left.length < maxRows) left.push(["",""]);
  while(right.length < maxRows) right.push(["",""]);

  //////////////////////////////////////////////////
  // WRITE TO EXCEL
  //////////////////////////////////////////////////

  for(let i=0;i<maxRows;i++){

    let row = sheet.addRow([
      left[i][0],
      left[i][1],
      right[i][0],
      right[i][1]
    ]);

    fsRow(row);

    // headings bold only
    if(
      left[i][1] === "" ||
      right[i][1] === ""
    ){
      row.font = {bold:true};
    }

    rowNo++;
  }

  //////////////////////////////////////////////////
  // TOTAL
  //////////////////////////////////////////////////

  let totalRow = sheet.addRow([
    "Total",leftTotal,
    "Total",rightTotal
  ]);

  totalRow.font = {bold:true};

  fsRow(totalRow);

  rowNo++;

  return rowNo;
}
