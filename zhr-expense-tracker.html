<script>

let currentReport = null;
let currentReportCategory = null;

let accountsList = [];
let activeAccounts = []; 		 	
let currentUserRole = "viewer";
	let ledgerList = [];

//////////////////////////////////////////////////
// CHECK PERMISSION
//////////////////////////////////////////////////

function checkPermission(action){

  if(action === "delete" && currentUserRole !== "admin"){
    showToast("You are not authorized to delete ❌","error");
    return false;
  }

  if(action === "write" && !["admin","user"].includes(currentUserRole)){
    showToast("You are not authorized to add/modify ❌","error");
    return false;
  }

  if(action === "admin" && currentUserRole !== "admin"){
    showToast("Admin access only ❌","error");
    return false;
  }

  return true;
}


	
//////////////////////////////////////////////////
// LOAD USER
//////////////////////////////////////////////////
	
async function loadUserRole(){

  let user = auth.currentUser;

  if(!user) return;

  let doc = await db.collection("users").doc(user.email).get();

  if(doc.exists){
    currentUserRole = doc.data().role;
  }else{
    currentUserRole = "viewer"; // safety fallback
  }

  console.log("User Role:", currentUserRole); // for testing

}
	

//////////////////////////////////////////////////
// LOAD ACCOUNTS FROM FIREBASE 	
//////////////////////////////////////////////////

function loadAccounts() {

  db.collection("accounts").onSnapshot(snapshot => {

    accountsList = [];
    activeAccounts = [];

    if (snapshot.empty) {
      console.log("❌ No accounts found in Firebase");
      return;
    }

    snapshot.forEach(doc => {

      let data = doc.data();

      console.log("Account Doc:", data);

      if (data.name) {
        accountsList.push(data.name);
      }

      if (data.active !== false && data.name) {
        activeAccounts.push(data.name);
      }

    });

    console.log("✅ Accounts Loaded:", accountsList);

    // ✅ ONLY PLACE where dashboard should run
    setTimeout(() => {
      refreshDashboardUI();
    }, 100);

  });

}	

//////////////////////////////////////////////////
// MANAGE ACCOUNTS
//////////////////////////////////////////////////

function manageAccounts(){

  if(!checkPermission("admin")) return;

  showAccountManager();
}
	


//////////////////////////////////////////////////
// ACCOUNT MANAGER UI
//////////////////////////////////////////////////	

function showAccountManager(){

let html = `<h3>Manage Accounts</h3>`;

accountsList.forEach(acc=>{

let isActive = activeAccounts.includes(acc);

html += `
<div style="display:flex;justify-content:space-between;margin-bottom:10px;">
  <span>${acc}</span>

  <button onclick="toggleAccount('${acc}', ${isActive})">
    ${isActive ? "Deactivate" : "Activate"}
  </button>
</div>
`;

});

html += `
<hr>

<label>Add New Account</label>
<input type="text" id="newAccount" placeholder="Enter account name">

<button onclick="addAccount()">Add Account</button>
`;

openPopup(html);

}
	

//////////////////////////////////////////////////
// ADD ACCOUNT FUNCTION
//////////////////////////////////////////////////

async function addAccount(){

	if(!checkPermission("admin")) return;

let name = document.getElementById("newAccount").value.trim();

if(!name){
  showToast("Enter account name","error");
  return;
}

showLoader();

await db.collection("accounts").add({
  name: name,
  active: true
});

hideLoader();
showToast("Account Added ✅");

closePopup();
}	


//////////////////////////////////////////////////////////
// ACTIVATE / DEACTIVATE
//////////////////////////////////////////////////////////

	
async function toggleAccount(name, isActive){

	if(!checkPermission("admin")) return;

showLoader();

let snapshot = await db.collection("accounts")
.where("name","==",name).get();

let updates = [];

snapshot.forEach(doc=>{
  updates.push(
    db.collection("accounts").doc(doc.id).update({
      active: !isActive
    })
  );
});

await Promise.all(updates);

hideLoader();
showToast("Account Updated ✅");

showAccountManager();
}
	
	
	
//////////////////////////////////////////////////////////
// AUTO FORMAT AMOUNTS (INDIAN + DECIMAL + RIGHT ALIGN)
//////////////////////////////////////////////////////////

function formatAllAmounts(){

document.querySelectorAll("td").forEach((cell,index)=>{

let column = cell.cellIndex;

let value = cell.innerText.replace(/,/g,"").trim();

/* Skip Serial Number column */
if(column === 0) return;

if(value === "0"){
cell.innerText = "-";
cell.style.textAlign = "right";
return;
}

if(!isNaN(value) && value !== ""){

let formatted = Number(value).toLocaleString("en-IN",{
minimumFractionDigits:2,
maximumFractionDigits:2
});

if(cell.querySelector("b")){
cell.querySelector("b").innerText = formatted;
}else{
cell.innerText = formatted;
}

cell.style.textAlign = "right";

}

});

}

  ];

  showLoader();

  let email = document.getElementById("username").value;
  let password = document.getElementById("password").value;

  try{

	  // ✅ CLEAR OLD SESSION (IMPORTANT)
    sessionStorage.clear();

//////////////////////////////////////////////////
// Summary Calculation Engine (NEW LEDGER SYSTEM)
//////////////////////////////////////////////////

function calculateSummary(fromDate,toDate,expenseTitle,balanceTitle){

//////////////////////////////////////////////////
// 🧾 TABLE 1 → CASH & BANK (CLOSING AS ON TO DATE)
//////////////////////////////////////////////////

let balances = {};

// ✅ Initialize ONLY Cash & Bank ledgers
ledgerList
  .filter(l => l.group === "Cash & Bank")
  .forEach(l => {

    let value = Number(l.openingBalance || 0);

    if(l.openingType === "credit"){
      value = -value;
    }

    balances[l.id] = value;   // 🔥 CHANGED (name → id)
  });

// ✅ Apply ALL transactions till TO date
transactionsCache.forEach(t => {

  if(t.date > toDate) return;

  let amount = Number(t.amount);

  let debitKey = t.debitLedgerId || t.debitLedger;   // 🔥 NEW
  let creditKey = t.creditLedgerId || t.creditLedger; // 🔥 NEW

  if(debitKey && balances.hasOwnProperty(debitKey)){
    balances[debitKey] += amount;
  }

  if(creditKey && balances.hasOwnProperty(creditKey)){
    balances[creditKey] -= amount;
  }

});

// ✅ Prepare Table 1
let totalBalance = 0;
let rows1 = "";

Object.keys(balances).forEach(key => {

  let value = balances[key];
  totalBalance += value;

  let ledger = ledgerList.find(l => l.id === key);
  let name = ledger ? ledger.name : key;  // 🔥 NEW

  rows1 += `
  <tr>
    <td>${name}</td>
    <td>${value}</td>
  </tr>
  `;
});

document.getElementById("closingSummary").innerHTML = `
<div class="summary-title">${balanceTitle}</div>
<table>
  <tr><th>Ledger</th><th>Balance</th></tr>
  ${rows1}
  <tr>
    <td><b>Total</b></td>
    <td><b>${totalBalance}</b></td>
  </tr>
</table>
`;

//////////////////////////////////////////////////
// 📊 TABLE 2 → PERIOD MOVEMENT (ALL GROUPS)
//////////////////////////////////////////////////

let movement = {};

// ✅ Allowed groups
let allowedGroups = [
  "Expense",
  "Asset",
  "Liability",
  "Drawings"
];

// ✅ Map ledger id → group
let ledgerMap = {};
ledgerList.forEach(l=>{
  ledgerMap[l.id] = l.group;   // 🔥 CHANGED
});

// ✅ Process ONLY transactions within period
transactionsCache.forEach(t => {

  if(t.date < fromDate || t.date > toDate) return;

  let amount = Number(t.amount);

  let debitKey = t.debitLedgerId || t.debitLedger;   // 🔥 NEW
  let creditKey = t.creditLedgerId || t.creditLedger; // 🔥 NEW

  // 🔹 Debit side
  if(debitKey){

    let group = ledgerMap[debitKey];

    if(allowedGroups.includes(group)){

      if(!movement[debitKey]){
        movement[debitKey] = 0;
      }

      movement[debitKey] += amount;
    }
  }

  // 🔹 Credit side
  if(creditKey){

    let group = ledgerMap[creditKey];

    if(allowedGroups.includes(group)){

      if(!movement[creditKey]){
        movement[creditKey] = 0;
      }

      movement[creditKey] -= amount;
    }
  }

});

// ✅ Remove zero / no activity
let rows2 = "";
let totalMovement = 0;

Object.keys(movement).forEach(key => {

  let value = movement[key];

  if(value === 0) return;

  totalMovement += value;

  let ledger = ledgerList.find(l => l.id === key);
  let name = ledger ? ledger.name : key;  // 🔥 NEW

  rows2 += `
  <tr>
    <td>${name}</td>
    <td>${Math.abs(value)}</td>
  </tr>
  `;
});

// ✅ Render Table 2
document.getElementById("expenseSummary").innerHTML = `
<div class="summary-title">${expenseTitle}</div>
<div class="summary-table-wrapper">
<table>
  <tr><th>Ledger</th><th>Amount</th></tr>
  ${rows2}
  <tr>
    <td><b>Total</b></td>
    <td><b>${Math.abs(totalMovement)}</b></td>
  </tr>
</table>
`;

//////////////////////////////////////////////////
// 📅 TABLE 3 (UNCHANGED CALL)
//////////////////////////////////////////////////

renderPersonalMonthlySummary();

//////////////////////////////////////////////////
// 📊 CHARTS (KEEP SAFE FOR NOW)
//////////////////////////////////////////////////

renderPersonalExpenseChart();
renderLedgerPieChart(fromDate,toDate);

//////////////////////////////////////////////////
// FINAL FORMATTING
//////////////////////////////////////////////////

formatAllAmounts();
lucide.createIcons();

}

function getLedgerBalance(ledgerId){

    let value = Number(l.openingBalance || 0);

    if(l.openingType === "credit"){
      value = -value;
    }

    balances[l.id] = value; // ✅ CHANGED (name → id)
  });

  // Apply all transactions
  transactionsCache.forEach(t=>{

    let amount = Number(t.amount);

    if(t.debitLedger){
      balances[t.debitLedger] = (balances[t.debitLedger] || 0) + amount;
    }

//////////////////////////////////////////////////
// Ledger Pie Chart (Expense)
//////////////////////////////////////////////////

function renderLedgerPieChart(fromDate,toDate){

  let ledgerMap = {};
  let ledgerNameMap = {};

  ledgerList.forEach(l=>{
    ledgerMap[l.id] = l.group;
    ledgerNameMap[l.id] = l.name;
  });

  let allowedGroups = ["Expense"];

  let totals = {};

  //////////////////////////////////////////////////
  // CALCULATE MOVEMENT
  //////////////////////////////////////////////////

  transactionsCache.forEach(t => {

    if(t.date < fromDate || t.date > toDate) return;

    let amount = Number(t.amount);

    let debitKey = t.debitLedgerId || t.debitLedger;
    let creditKey = t.creditLedgerId || t.creditLedger;

    // Debit
    if(debitKey){
      let group = ledgerMap[debitKey];

      if(allowedGroups.includes(group)){
        if(!totals[debitKey]) totals[debitKey] = 0;
        totals[debitKey] += amount;
      }
    }

    // Credit
    if(creditKey){
      let group = ledgerMap[creditKey];

      if(allowedGroups.includes(group)){
        if(!totals[creditKey]) totals[creditKey] = 0;
        totals[creditKey] -= amount;
      }
    }

  });

  //////////////////////////////////////////////////
  // PREPARE DATA
  //////////////////////////////////////////////////

  let labels = [];
  let data = [];

  Object.keys(totals).forEach(id => {

    let value = totals[id];

    if(value === 0) return;

    labels.push(ledgerNameMap[id] || id);
    data.push(Math.abs(value));
  });

  //////////////////////////////////////////////////
  // COLORS
  //////////////////////////////////////////////////

  let colors = labels.map((_,i)=>{
    let hue = (i * 360 / labels.length);
    return `hsl(${hue},70%,60%)`;
  });

  //////////////////////////////////////////////////
  // RENDER
  //////////////////////////////////////////////////

  const ctx = document.getElementById("expensePieChart");

  if(window.expenseChart){
    window.expenseChart.destroy();
  }

  window.expenseChart = new Chart(ctx, {
    type: "pie",
    data: {
      labels: labels,
      datasets: [{
        data: data,
        backgroundColor: colors
      }]
    },
    options: {
      responsive: true,
      plugins:{
        legend:{ position:"bottom" },
        tooltip:{
          callbacks:{
            label: function(context){
              let total = context.dataset.data.reduce((a,b)=>a+b,0);
              let value = context.raw;
              let percent = ((value/total)*100).toFixed(1);
              return `${context.label}: ${value} (${percent}%)`;
            }
          }
        }
      }
    }
  });

}

//////////////////////////////////////////////////
// GET NEXT TRANSACTION NUMBER
//////////////////////////////////////////////////

async function getNextTransactionNumber(type){

  let docRef = db.collection("counters").doc("transactions");

  return db.runTransaction(async (transaction) => {

    let doc = await transaction.get(docRef);

    let data;

    if(!doc.exists){

      data = {
        receipt: 0,
        payment: 0,
        journal: 0
      };

      data[type] = 1;

      transaction.set(docRef, data); // ✅ SET for first time

    }else{

      data = doc.data();

      data[type] = (data[type] || 0) + 1;

      transaction.update(docRef, data); // ✅ UPDATE only if exists
    }

    let prefix = {
      receipt: "R",
      payment: "P",
      journal: "J"
    };

    let number = data[type].toString().padStart(4,"0");

    return `${prefix[type]}-${number}`;

  });

}

async function saveReceipt(){

  if(!checkPermission("write")) return;

  let date = document.getElementById("date").value;
  let debitLedger = document.getElementById("debitLedger").value;   // Cash / Bank
  let creditLedger = document.getElementById("creditLedger").value; // Capital / Income / Liability
  let narration = document.getElementById("narration").value.trim();
  let amount = Number(document.getElementById("amount").value);


if(ledgerList.length === 0){
  showToast("System loading... please wait ⏳","error");
  return;
}	

  if(!date){
    showToast("Please select Date ❌","error");
    return;
  }

  if (!debitLedger || !creditLedger || !narration || !amount) {
    showToast("All fields are mandatory","error");
    return;
  }

  if (debitLedger === creditLedger) {
    showToast("Debit and Credit cannot be same ❌","error");
    return;

  if (amount <= 0) {

  try{

    let txnNumber = await getNextTransactionNumber("receipt");

    await db.collection("transactions").add({

      // ✅ OLD SYSTEM (NAME - for backward compatibility)

  }catch(e){

    hideLoader();
    console.error(e);

//////////////////////////////////////////////////
// GET BALANCE EXCLUDING CURRENT TRANSACTION
//////////////////////////////////////////////////

function getBalanceExcludingTransaction(ledgerName, transactionId){

  let balances = {};

  ledgerList.forEach(l=>{
    let value = Number(l.openingBalance || 0);

    if(l.openingType === "credit"){
      value = -value;
    }

    balances[l.name] = value;
  });

  transactionsCache.forEach(t=>{

    if(t.id === transactionId) return;

    let amount = Number(t.amount);

    if(t.debitLedger){
      balances[t.debitLedger] = (balances[t.debitLedger] || 0) + amount;
    }

    if(t.creditLedger){
      balances[t.creditLedger] = (balances[t.creditLedger] || 0) - amount;
    }

  });

  return balances[ledgerName] || 0;
}

runningBalance -= Number(t.amount);
}

}

.filter(t=>t.date>=fromDate && t.date<=toDate)

type="Inflow";
category = t.category || "";
amount=Number(t.amount);
runningBalance+=amount;

}

if(t.type==="payment" && t.account===name){

type="Outflow";
category=t.category;
amount=Number(t.amount);
runningBalance-=amount;

}

if(t.type==="contra"){

if(t.from===name){
type="Contra";
amount=Number(t.amount);
runningBalance-=amount;
}

if(t.to===name){
type="Contra";
amount=Number(t.amount);
runningBalance+=amount;
}

}

if(type!==""){

let row = sheet.addRow([
serial,
t.date,
type,
category,
t.narration,
amount,
runningBalance
]);

row.getCell(7).alignment = { horizontal: "right" };

row.getCell(6).font={color:{argb:"FFFF0000"}};
}

if(type==="Contra"){
row.getCell(6).font={color:{argb:"FF000000"}};
}

serial++;

}

});

sheet.addRow(["","","","","Closing Balance","",runningBalance]);

}

function showToast(message, type="success"){

//////////////////////////////////////////////////
// DATE LOCAL
//////////////////////////////////////////////////

function formatDateLocal(date){
  let d = new Date(date);
  let month = String(d.getMonth()+1).padStart(2,"0");
  let day = String(d.getDate()).padStart(2,"0");
  return `${d.getFullYear()}-${month}-${day}`;
}


//////////////////////////////////////////////////
// DATE RANGE VALIDATION (GLOBAL)
//////////////////////////////////////////////////

function validateDateRange(fromDate, toDate){

  if(!fromDate || !toDate){
    showToast("Please select both From Date and To Date","error");
    return false;
  }

  if(fromDate > toDate){
    showToast("From Date cannot be after To Date ❌","error");
    return false;
  }

  return true;
}

//////////////////////////////////////////////////

function showTrialBalance(){

openPopup(`

<label>To Date</label>
<input type="date" id="tbTo">

<button onclick="runTrialBalance()">Run</button>

//////////////////////////////////////////////////
// RUN TRIALBALANCE
//////////////////////////////////////////////////

function runTrialBalance(){

let fromDate = document.getElementById("tbFrom").value;
let toDate = document.getElementById("tbTo").value;

if(!validateDateRange(fromDate,toDate)) return;

closePopup();

//////////////////////////////////////////////////
// LEDGER STRUCTURE
//////////////////////////////////////////////////

let ledger = {
  Cash:0,
  Bank:0,

  Personal:0,
  Home:0,
  "Office Reimbursement":0,
  "Qardan Given":0,

  Capital:0,
  Income:0,
  "Qardan Taken":0
};


	
//////////////////////////////////////////////////
// OPENING BALANCE
//////////////////////////////////////////////////

// Cash/Bank
accountsList.forEach(acc=>{
  ledger[acc] = Number(openingBalances[acc] || 0);
});

// Balance Sheet Items
let bsItems = [
  "Capital",
  "Home",
  "Qardan Given",
  "Qardan Taken",
  "Office Reimbursement"
];

bsItems.forEach(item=>{
  ledger[item] = Number(openingBalances[item] || 0);
});

//////////////////////////////////////////////////
// PROCESS TRANSACTIONS (CORRECT LOGIC)
//////////////////////////////////////////////////

transactionsCache.forEach(t=>{

// ❌ skip only beyond To Date
if(t.date > toDate) return;

//////////////////////////////////////////////////
// RECEIPTS
//////////////////////////////////////////////////

if(t.type === "receipt"){

// ✅ ALWAYS update account (BS)
ledger[t.account] += Number(t.amount);

// ensure category exists
if(!ledger[t.category]) ledger[t.category] = 0;

// ✅ CAPITAL / LIABILITY → FULL
if(
  t.category === "Capital" ||
  t.category === "Qardan Taken"
){
  ledger[t.category] -= Number(t.amount);
}

// ✅ INCOME → ONLY PERIOD
else if(t.category === "Income"){
  if(t.date >= fromDate){
    ledger[t.category] -= Number(t.amount);
  }
}

}

//////////////////////////////////////////////////
// PAYMENTS
//////////////////////////////////////////////////

if(t.type === "payment"){

// ✅ ALWAYS update account
ledger[t.account] -= Number(t.amount);

// ensure category exists
if(!ledger[t.category]) ledger[t.category] = 0;

// ✅ BALANCE SHEET → FULL
if(
  t.category === "Home" ||
  t.category === "Qardan Given" ||
  t.category === "Office Reimbursement"
){
  ledger[t.category] += Number(t.amount);
}

// ✅ PERSONAL EXPENSE → PERIOD ONLY
else if(t.category === "Personal"){
  if(t.date >= fromDate){
    ledger[t.category] += Number(t.amount);
  }
}

}

});

//////////////////////////////////////////////////
// RETAINED EARNINGS (BEFORE FROM DATE)
//////////////////////////////////////////////////

let retained = 0;

transactionsCache.forEach(t=>{

if(t.date >= fromDate) return;

// Income increases profit
if(t.type === "receipt" && t.category === "Income"){
  retained += Number(t.amount);
}

// Personal expense reduces profit
if(t.type === "payment" && t.category === "Personal"){
  retained -= Number(t.amount);
}

});

// ✅ Add to ledger only if exists
if(retained !== 0){
  ledger["Retained Earnings"] = -retained;
}

	
//////////////////////////////////////////////////
// PREPARE TB
//////////////////////////////////////////////////

let rows = `
<h3>Trial Balance (${fromDate} to ${toDate})</h3>
<table class="report-table">
<tr>
<th>Ledger</th>
<th>Debit</th>
<th>Credit</th>
</tr>
`;

let totalDr = 0;
let totalCr = 0;

Object.keys(ledger).forEach(name=>{

let value = ledger[name];

if(value === 0) return;

// ✅ ONLY DISPLAY CHANGE
let displayName = (name === "Home") ? "Drawings" : name;

let dr = "";
let cr = "";

if(value > 0){
  dr = value;
  totalDr += value;
}else{
  cr = Math.abs(value);
  totalCr += Math.abs(value);
}

rows += `
<tr>
<td>${displayName}</td>
<td>${dr}</td>
<td>${cr}</td>
</tr>
`;

});

//////////////////////////////////////////////////
// TOTAL
//////////////////////////////////////////////////

rows += `
<tr>
<td><b>Total</b></td>
<td><b>${totalDr}</b></td>
<td><b>${totalCr}</b></td>
</tr>
`;

rows += `</table>`;

document.getElementById("reportOutput").innerHTML = rows;

formatAllAmounts();

}

//////////////////////////////////////////////////

	
function loadLedgers(callback){

  db.collection("ledgers").onSnapshot(snapshot=>{

    ledgerList = [];

    snapshot.forEach(doc=>{
      ledgerList.push({id:doc.id, ...doc.data()});
    });

    console.log("Ledger Loaded:", ledgerList);

    

    if(callback && ledgerList.length > 0){
      callback();
    }

  }, error => {
    console.error("Ledger Load Error:", error);
    showToast("Error loading ledgers ❌","error");
  });

}

//////////////////////////////////////////////////
// AUTO SET LEDGER NATURE
//////////////////////////////////////////////////

function autoSetNature(){

  let group = document.getElementById("ledgerGroup").value;

  let nature = "debit";

  if(
  group === "Liability" || 
  group === "Capital" || 
  group === "Income" ||
  group === "Profit & Loss"   // ✅ ADD THIS
){
  nature = "credit";
}

  // ✅ ADD THIS (Drawings always debit)
  if(group === "Drawings"){
    nature = "debit";
  }

  document.getElementById("ledgerNature").value = nature;

  //////////////////////////////////////////////////
  // ✅ DISABLE OPENING FOR INCOME / EXPENSE
  //////////////////////////////////////////////////

  if(group === "Income" || group === "Expense"){
    document.getElementById("openingBalance").value = 0;
    document.getElementById("openingBalance").disabled = true;
    document.getElementById("openingType").disabled = true;
  }else{
    document.getElementById("openingBalance").disabled = false;
    document.getElementById("openingType").disabled = false;
  }

}

	
//////////////////////////////////////////////////
// ADD LEDGER
//////////////////////////////////////////////////

async function addLedger(){

  if(!checkPermission("admin")) return;

  let name = document.getElementById("ledgerName").value.trim();
  let group = document.getElementById("ledgerGroup").value;
  let nature = document.getElementById("ledgerNature").value;
  let openingBalance = Number(document.getElementById("openingBalance").value) || 0;
  let openingType = document.getElementById("openingType").value;
  let openingDate = document.getElementById("openingDate").value;

  // ✅ ENSURE DRAWINGS ALWAYS DEBIT (safety)
  if(group === "Drawings"){
    nature = "debit";
    openingType = "debit";
  }

if(group === "Profit & Loss"){
  nature = "credit";
  openingType = "credit";
}
	
  if(!name){
    showToast("Enter ledger name","error");
    return;
  }

  try{

    showLoader();

    await db.collection("ledgers").add({
      name,
      group,
      nature,
      openingBalance,
      openingType,
      openingDate,
      active:true
    });

    hideLoader();
    showToast("Ledger Added ✅");

    // ✅ reload list properly
    loadLedgers(()=>{
      showLedgerManager();
    });

  }catch(e){

    hideLoader();
    console.error(e);
    showToast("Error saving ledger ❌","error");

  }
}

//////////////////////////////////////////////////
// UPDATE LEDGER
//////////////////////////////////////////////////
	
async function updateLedger(id){

  if(!checkPermission("admin")) return;

  let name = document.getElementById("ledgerName").value.trim();
  let group = document.getElementById("ledgerGroup").value;
  let nature = document.getElementById("ledgerNature").value;
  let openingBalance = Number(document.getElementById("openingBalance").value) || 0;
  let openingType = document.getElementById("openingType").value;
  let openingDate = document.getElementById("openingDate").value;

  // ✅ ENSURE DRAWINGS ALWAYS DEBIT
  if(group === "Drawings"){
    nature = "debit";
    openingType = "debit";
  }

if(group === "Profit & Loss"){
  nature = "credit";
  openingType = "credit";
}
	
  if(!name){
    showToast("Enter ledger name","error");
    return;
  }

  try{

    showLoader();

    await db.collection("ledgers").doc(id).update({
      name,
      group,
      nature,
      openingBalance,
      openingType,
      openingDate
    });

    hideLoader();
    showToast("Ledger Updated ✏️");

    loadLedgers(()=>{
      showLedgerManager(); // ✅ auto refresh popup
    });

  }catch(e){

    hideLoader();
    console.error(e);
    showToast("Update failed ❌","error");

  }
}

//////////////////////////////////////////////////
// DELETE LEDGER
//////////////////////////////////////////////////
	
async function deleteLedger(id){

  if(!checkPermission("admin")) return;

  let password = document.getElementById("adminPassword").value;

  let user = auth.currentUser;

  try{

    showLoader();

    // 🔐 Re-authenticate (VERY IMPORTANT)
    let credential = firebase.auth.EmailAuthProvider.credential(
      user.email,
      password
    );

    await user.reauthenticateWithCredential(credential);

    // ✅ Now delete
    await db.collection("ledgers").doc(id).delete();

    hideLoader();
    showToast("Ledger Deleted 🗑️");

    loadLedgers(()=>{
      showLedgerManager(); // auto refresh
    });

  }catch(e){

    hideLoader();
    console.error(e);
    showToast("Wrong password or delete failed ❌","error");

  }
}
