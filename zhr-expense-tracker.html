//////////////////////////////////////////////////
// LOAD ACCOUNTS FROM FIREBASE 	
//////////////////////////////////////////////////

function loadAccounts() {

  db.collection("accounts").onSnapshot(snapshot => {

    accountsList = [];
    activeAccounts = [];

    if (snapshot.empty) {
      console.log("❌ No accounts found in Firebase");
      return;
    }

    snapshot.forEach(doc => {

      let data = doc.data();

      console.log("Account Doc:", data);

      if (data.name) {
        accountsList.push(data.name);
      }

      if (data.active !== false && data.name) {
        activeAccounts.push(data.name);
      }

    });

    console.log("✅ Accounts Loaded:", accountsList);

    // ✅ ONLY PLACE where dashboard should run
    setTimeout(() => {
      calculateDashboard();
    }, 100);

  });

}

// MANAGE ACCOUNTS
//////////////////////////////////////////////////

openPopup(`

//////////////////////////////////////////////////

function verifyAccountAdmin(){

if(
  document.getElementById("adminId").value !== ADMIN_ID ||
  document.getElementById("adminPass").value !== ADMIN_PASS
){
  alert("Invalid Admin");
  return;
}

showAccountManager();

}


//////////////////////////////////////////////////
// ACCOUNT MANAGER UI
//////////////////////////////////////////////////	

function showAccountManager(){

let html = `<h3>Manage Accounts</h3>`;

accountsList.forEach(acc=>{

let isActive = activeAccounts.includes(acc);

html += `
<div style="display:flex;justify-content:space-between;margin-bottom:10px;">
  <span>${acc}</span>

  <button onclick="toggleAccount('${acc}', ${isActive})">
    ${isActive ? "Deactivate" : "Activate"}
  </button>
</div>
`;

});

html += `
<hr>

<label>Add New Account</label>
<input type="text" id="newAccount" placeholder="Enter account name">

<button onclick="addAccount()">Add Account</button>
`;

openPopup(html);

}
	

//////////////////////////////////////////////////
// ADD ACCOUNT FUNCTION
//////////////////////////////////////////////////

async function addAccount(){

let name = document.getElementById("newAccount").value.trim();

if(!name){
  alert("Enter account name");
  return;
}

await db.collection("accounts").add({
  name: name,
  active: true
});

closePopup();

}	


//////////////////////////////////////////////////////////
// ACTIVATE / DEACTIVATE
//////////////////////////////////////////////////////////

	
async function toggleAccount(name, isActive){

  let snapshot = await db.collection("accounts")
  .where("name","==",name).get();

  let updates = [];

  snapshot.forEach(doc=>{
    updates.push(
      db.collection("accounts").doc(doc.id).update({
        active: !isActive
      })
    );
  });

  await Promise.all(updates);

  // ✅ Refresh popup instantly
  showAccountManager();

}
	
	
	
//////////////////////////////////////////////////////////
// AUTO FORMAT AMOUNTS (INDIAN + DECIMAL + RIGHT ALIGN)
//////////////////////////////////////////////////////////

function formatAllAmounts(){

document.querySelectorAll("td").forEach((cell,index)=>{

let column = cell.cellIndex;

let value = cell.innerText.replace(/,/g,"").trim();

/* Skip Serial Number column */
if(column === 0) return;

if(value === "0"){
cell.innerText = "-";
cell.style.textAlign = "right";
return;
}

if(!isNaN(value) && value !== ""){

let formatted = Number(value).toLocaleString("en-IN",{
minimumFractionDigits:2,
maximumFractionDigits:2
});

if(cell.querySelector("b")){
cell.querySelector("b").innerText = formatted;
}else{
cell.innerText = formatted;
}

cell.style.textAlign = "right";

}

});

}

//////////////////////////////////////////////////
// LOAD DATA
//////////////////////////////////////////////////


function loadTransactions() {
  db.collection("transactions")
    .onSnapshot(snapshot => {

      transactionsCache = [];

      snapshot.forEach(doc => {
        transactionsCache.push({ id: doc.id, ...doc.data() });
      });

      // ✅ ALWAYS refresh dashboard
      calculateDashboard();

      // ✅ Refresh current summary (Current Month / Last Month etc.)
      let activeSummary = sessionStorage.getItem("activeSummary");

      if (activeSummary === "currentMonth") showCurrentMonth();
      else if (activeSummary === "lastMonth") showLastMonth();
      else if (activeSummary === "fullYear") showFullYear();
      else if (activeSummary === "customSummary") {
        let fromDate = sessionStorage.getItem("summaryFromDate");
        let toDate = sessionStorage.getItem("summaryToDate");

        let balanceTitle = `Balance as on ${toDate}`;
        let expenseTitle = `From ${fromDate} till ${toDate}`;

        calculateSummary(fromDate, toDate, expenseTitle, balanceTitle);
      }

      // ✅ Refresh current report (THIS IS YOUR MAIN REQUIREMENT)
      let currentReport = sessionStorage.getItem("currentReport");

      if (currentReport === "receipts") {
        refreshReceiptsReport();
      }

      if (currentReport === "payments") {
        refreshPaymentReport();
      }

      if (currentReport === "contra") {
        refreshContraReport();
      }

    });
}

//////////////////////////////////////////////////
// Summary Calculation Engine
//////////////////////////////////////////////////

function calculateSummary(fromDate,toDate,expenseTitle,balanceTitle){

  let balances = {};

accountsList.forEach(acc=>{
  balances[acc] = Number(openingBalances[acc] || 0);
});

  let expenses = {
    Personal:0,
    Home:0,
    "Office Reimbursement":0,
  	"Qardan Given":0
  };



  transactionsCache.forEach(t=>{

    // Closing Balance calculation (till TO date)
    if(t.date <= toDate){

      if (t.type === "receipt" || t.type === "inflow")
        balances[t.account] += Number(t.amount);

      if (t.type === "payment" || t.type === "outflow")
        balances[t.account] -= Number(t.amount);

      if (t.type === "contra"){
        balances[t.from] -= Number(t.amount);
        balances[t.to] += Number(t.amount);
      }
    }

    // Expense summary (within selected range)
    if(t.date >= fromDate && t.date <= toDate){

      if (t.type === "payment" || t.type === "outflow"){
        expenses[t.category] += Number(t.amount);
      }

    }

  });

let totalBalance = 0;

accountsList.forEach(acc=>{
  totalBalance += balances[acc];
});

let totalExpense = 
  expenses.Personal + 
  expenses.Home + 
  expenses["Office Reimbursement"] +
  expenses["Qardan Given"];

let rows = "";

accountsList.forEach(acc => {

  let isActive = activeAccounts.includes(acc);

let dot = isActive
  ? '<span style="color:green;font-size:18px;">●</span>'
  : '<span style="color:red;font-size:18px;">●</span>';

rows += `
<tr>
  <td>${dot} ${acc}</td>
  <td>${balances[acc] || 0}</td>
</tr>
`;

});
	
  document.getElementById("closingSummary").innerHTML = `

<div class="summary-title">${balanceTitle}</div>
    <table>
      <tr><th>Account</th><th>Balance</th></tr>
      ${rows}
<tr><td><b>Total</b></td><td><b> ${totalBalance}</b></td></tr>
    </table>
  `;

  document.getElementById("expenseSummary").innerHTML = `
 <div class="summary-title">${expenseTitle}</div>
    <table>
      <tr><th>Category</th><th>Total</th></tr>
      <tr><td>Personal</td><td> ${expenses.Personal}</td></tr>
      <tr><td>Home</td><td> ${expenses.Home}</td></tr>
      <tr><td>Office Reimbursement</td><td> ${expenses["Office Reimbursement"]}</td></tr>
	  <tr><td>Qardan Given</td><td> ${expenses["Qardan Given"]}</td></tr>
<tr><td><b>Total</b></td><td><b> ${totalExpense}</b></td></tr>
    </table>
  `;

renderExpenseChart(
  expenses.Personal,
  expenses.Home,
  expenses["Office Reimbursement"],
  expenses["Qardan Given"]
);

renderPersonalMonthlySummary();

renderPersonalExpenseChart();

formatAllAmounts();
	
lucide.createIcons();
	
}

//////////////////////////////////////////////////
// GET BALANCE EXCLUDING CURRENT TRANSACTION
//////////////////////////////////////////////////

function getBalanceExcludingTransaction(account, transactionId) {

  let balances = {};

accountsList.forEach(acc=>{
  balances[acc] = Number(openingBalances[acc] || 0);
});

  transactionsCache.forEach(t => {

    if (t.id === transactionId) return;

    if (t.type === "receipt" || t.type === "inflow")
      balances[t.account] += Number(t.amount);

    if (t.type === "payment" || t.type === "outflow")
      balances[t.account] -= Number(t.amount);

    if (t.type === "contra") {
      balances[t.from] -= Number(t.amount);
      balances[t.to] += Number(t.amount);
    }

  });

  return balances[account];
}

//////////////////////////////////////////////////
// FUNCTION TO CREATE ACCOUNT STATEMENT
//////////////////////////////////////////////////

function createAccountSheet(name){

let sheet = workbook.addWorksheet(name);

sheet.addRow(["Serial No","Date","Type","Category","Particular","Amount","Balance"]);

//////////////////////////////////////////////////
// CALCULATE OPENING BALANCE AS ON FROM DATE
//////////////////////////////////////////////////

let runningBalance = Number(openingBalances[name] || 0);

transactionsCache.forEach(t=>{

if(t.date < fromDate){

if(t.type === "receipt" && t.account === name){
runningBalance += Number(t.amount);
}

if(t.type === "payment" && t.account === name){
runningBalance -= Number(t.amount);
}

if(t.type === "contra"){

if(t.from === name){
runningBalance -= Number(t.amount);
}

if(t.to === name){
runningBalance += Number(t.amount);
}

}

}

});

sheet.addRow(["","", "", "", "Opening Balance","",runningBalance]);

let serial = 1;

transactionsCache
.filter(t=>t.date>=fromDate && t.date<=toDate)
.sort((a,b)=> new Date(a.date) - new Date(b.date))
.forEach(t=>{

let type="";
let category="";
let amount=0;

if(t.type==="receipt" && t.account===name){

type="Inflow";
amount=Number(t.amount);
runningBalance+=amount;

}

if(t.type==="payment" && t.account===name){

type="Outflow";
category=t.category;
amount=Number(t.amount);
runningBalance-=amount;

}

if(t.type==="contra"){

if(t.from===name){
type="Contra";
amount=Number(t.amount);
runningBalance-=amount;
}

if(t.to===name){
type="Contra";
amount=Number(t.amount);
runningBalance+=amount;
}

}

if(type!==""){

let row = sheet.addRow([
serial,
t.date,
type,
category,
t.narration,
amount,
runningBalance
]);

// Format Amount & Balance Columns

row.getCell(6).numFmt = '#,##0.00';
row.getCell(7).numFmt = '#,##0.00';

row.getCell(6).alignment = { horizontal: "right" };
row.getCell(7).alignment = { horizontal: "right" };

//////////////////////////////////////////////////
// COLOR TEXT
//////////////////////////////////////////////////

if(type==="Inflow"){
row.getCell(6).font={color:{argb:"FF008000"}};
}

if(type==="Outflow"){
row.getCell(6).font={color:{argb:"FFFF0000"}};
}

if(type==="Contra"){
row.getCell(6).font={color:{argb:"FF000000"}};
}

serial++;

}

});

sheet.addRow(["","","","","Closing Balance","",runningBalance]);

}

//////////////////////////////////////////////////
// CREATE SHEETS FOR ALL ACCOUNTS
//////////////////////////////////////////////////

accountsList.forEach(acc=>{
  createAccountSheet(acc);
});

//////////////////////////////////////////////////
// EXPORT FILE
//////////////////////////////////////////////////

let fileName = `Mini_Statement_${fromDate}_to_${toDate}.xlsx`;

const buffer = await workbook.xlsx.writeBuffer();

saveAs(new Blob([buffer]),fileName);

}

let inactivityTimer;

function resetInactivityTimer() {

  clearTimeout(inactivityTimer);

  inactivityTimer = setTimeout(() => {
    
    alert("Session expired due to inactivity");
    logout();

  }, 2 * 60 * 1000); // 2 minutes
	
}	

//////////////////////////////////////////////////
// START INACTIVITY TRACKING
//////////////////////////////////////////////////

function startInactivityTracking() {

  ["click","mousemove","keydown","scroll","touchstart"].forEach(event => {
    document.addEventListener(event, resetInactivityTimer);
  });

  resetInactivityTimer(); // start timer immediately

}

function stopInactivityTracking() {
  ["click","mousemove","keydown","scroll","touchstart"].forEach(event => {
    document.removeEventListener(event, resetInactivityTimer);
  });
}	
	

//////////////////////////////////////////////////
// BUTTON SOUND EFFECT
//////////////////////////////////////////////////
	
document.addEventListener("click", function(e){

  if(e.target.closest("button")){

    let sound = document.getElementById("clickSound");

    if(sound){

      sound.pause();
      sound.currentTime = 0;

      let playPromise = sound.play();

      if(playPromise !== undefined){
        playPromise.catch(() => {
          // 🔇 Ignore autoplay error (mobile restriction)
        });
      }

    }

  }

});

//////////////////////////////////////////////////
// SOUND
//////////////////////////////////////////////////

document.addEventListener("touchstart", function initSound(){

  let sound = document.getElementById("clickSound");

  if(sound){
    sound.play().then(()=>{
      sound.pause();
      sound.currentTime = 0;
    }).catch(()=>{});
  }

  document.removeEventListener("touchstart", initSound);

});
