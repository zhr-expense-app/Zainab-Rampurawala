<script>

let currentReport = null;
let currentReportCategory = null;
let currentFromDate = null;
let currentToDate = null;
let expenseChart = null;
let personalExpenseChart = null;
let accountsList = [];
let activeAccounts = []; 		 	
let currentUserRole = "viewer";

//////////////////////////////////////////////////
// CHECK PERMISSION
//////////////////////////////////////////////////

function checkPermission(action){

  if(action === "delete" && currentUserRole !== "admin"){
    showToast("You are not authorized to delete ❌","error");
    return false;
  }

  if(action === "write" && !["admin","user"].includes(currentUserRole)){
    showToast("You are not authorized to add/modify ❌","error");
    return false;
  }

  if(action === "admin" && currentUserRole !== "admin"){
    showToast("Admin access only ❌","error");
    return false;
  }

  return true;
}


	
//////////////////////////////////////////////////
// LOAD USER
//////////////////////////////////////////////////
	
async function loadUserRole(){

  let user = auth.currentUser;

  if(!user) return;

  let doc = await db.collection("users").doc(user.email).get();

  if(doc.exists){
    currentUserRole = doc.data().role;
  }else{
    currentUserRole = "viewer"; // safety fallback
  }

  console.log("User Role:", currentUserRole); // for testing

}
	

//////////////////////////////////////////////////
// LOAD ACCOUNTS FROM FIREBASE 	
//////////////////////////////////////////////////

function loadAccounts() {

  db.collection("accounts").onSnapshot(snapshot => {

    accountsList = [];
    activeAccounts = [];

    if (snapshot.empty) {
      console.log("❌ No accounts found in Firebase");
      return;
    }

    snapshot.forEach(doc => {

      let data = doc.data();

      console.log("Account Doc:", data);

      if (data.name) {
        accountsList.push(data.name);
      }

      if (data.active !== false && data.name) {
        activeAccounts.push(data.name);
      }

    });

    console.log("✅ Accounts Loaded:", accountsList);

    // ✅ ONLY PLACE where dashboard should run
    setTimeout(() => {
      calculateDashboard();
    }, 100);

  });

}	

//////////////////////////////////////////////////
// MANAGE ACCOUNTS
//////////////////////////////////////////////////

function manageAccounts(){

  if(!checkPermission("admin")) return;

  showAccountManager();
}
	


//////////////////////////////////////////////////
// ACCOUNT MANAGER UI
//////////////////////////////////////////////////	

function showAccountManager(){

let html = `<h3>Manage Accounts</h3>`;

accountsList.forEach(acc=>{

let isActive = activeAccounts.includes(acc);

html += `
<div style="display:flex;justify-content:space-between;margin-bottom:10px;">
  <span>${acc}</span>

  <button onclick="toggleAccount('${acc}', ${isActive})">
    ${isActive ? "Deactivate" : "Activate"}
  </button>
</div>
`;

});

html += `
<hr>

<label>Add New Account</label>
<input type="text" id="newAccount" placeholder="Enter account name">

<button onclick="addAccount()">Add Account</button>
`;

openPopup(html);

}
	

//////////////////////////////////////////////////
// ADD ACCOUNT FUNCTION
//////////////////////////////////////////////////

async function addAccount(){

	if(!checkPermission("admin")) return;

let name = document.getElementById("newAccount").value.trim();

if(!name){
  showToast("Enter account name","error");
  return;
}

showLoader();

await db.collection("accounts").add({
  name: name,
  active: true
});

hideLoader();
showToast("Account Added ✅");

closePopup();
}	


//////////////////////////////////////////////////////////
// ACTIVATE / DEACTIVATE
//////////////////////////////////////////////////////////

	
async function toggleAccount(name, isActive){

	if(!checkPermission("admin")) return;

showLoader();

let snapshot = await db.collection("accounts")
.where("name","==",name).get();

let updates = [];

snapshot.forEach(doc=>{
  updates.push(
    db.collection("accounts").doc(doc.id).update({
      active: !isActive
    })
  );
});

await Promise.all(updates);

hideLoader();
showToast("Account Updated ✅");

showAccountManager();
}
	
	
	
//////////////////////////////////////////////////////////
// AUTO FORMAT AMOUNTS (INDIAN + DECIMAL + RIGHT ALIGN)
//////////////////////////////////////////////////////////

function formatAllAmounts(){

document.querySelectorAll("td").forEach((cell,index)=>{

let column = cell.cellIndex;

let value = cell.innerText.replace(/,/g,"").trim();

/* Skip Serial Number column */
if(column === 0) return;

if(value === "0"){
cell.innerText = "-";
cell.style.textAlign = "right";
return;
}

if(!isNaN(value) && value !== ""){

let formatted = Number(value).toLocaleString("en-IN",{
minimumFractionDigits:2,
maximumFractionDigits:2
});

if(cell.querySelector("b")){
cell.querySelector("b").innerText = formatted;
}else{
cell.innerText = formatted;
}

cell.style.textAlign = "right";

}

});

}

  ];
  return months[monthIndex];
}

  showLoader();

  let email = document.getElementById("username").value;
  let password = document.getElementById("password").value;

  try{

	  // ✅ CLEAR OLD SESSION (IMPORTANT)
    sessionStorage.clear();

    setTimeout(()=>{

}

  document.getElementById("popupContent").innerHTML = content;
  document.getElementById("popupModal").style.display = "block";

	lucide.createIcons(); // ✅ IMPORTANT
}

function closePopup() {
  document.getElementById("popupModal").style.display = "none";
}

//////////////////////////////////////////////////
// LOAD DATA
//////////////////////////////////////////////////


function loadTransactions() {

  let firstLoad = true; // ✅ ADD HERE

  db.collection("transactions")
    .onSnapshot(snapshot => {

      if(firstLoad){
        showLoader(); // ✅ only first time
      }

      transactionsCache = [];

      snapshot.forEach(doc => {
        transactionsCache.push({ id: doc.id, ...doc.data() });
      });

      if(firstLoad){
        hideLoader(); // ✅ only first time
        firstLoad = false;
      }

      // ✅ ALWAYS refresh dashboard
      calculateDashboard();

      // ✅ Refresh current summary
      let activeSummary = sessionStorage.getItem("activeSummary");

      if (activeSummary === "currentMonth") showCurrentMonth();
      else if (activeSummary === "lastMonth") showLastMonth();
      else if (activeSummary === "fullYear") showFullYear();
      else if (activeSummary === "customSummary") {
        let fromDate = sessionStorage.getItem("summaryFromDate");
        let toDate = sessionStorage.getItem("summaryToDate");

        let balanceTitle = `Balance as on ${toDate}`;
        let expenseTitle = `From ${fromDate} till ${toDate}`;

        calculateSummary(fromDate, toDate, expenseTitle, balanceTitle);
      }

      // ✅ Refresh current report
      let currentReport = sessionStorage.getItem("currentReport");

      if (currentReport === "receipts") {
        refreshReceiptsReport();
      }

      if (currentReport === "payments") {
        refreshPaymentReport();
      }

      if (currentReport === "contra") {
        refreshContraReport();
      }

    });
}

//////////////////////////////////////////////////
// SAVE OPENING BALANCE
//////////////////////////////////////////////////

async function saveOpening(){

  if(!checkPermission("admin")) return;						

  showLoader();

  let data = {
    openingDate: document.getElementById("openingDate").value
  };

  //////////////////////////////////////////////////
  // CASH / BANK (AS IS)
  //////////////////////////////////////////////////

  accountsList.forEach(acc=>{
    data[acc] = Number(document.getElementById(acc).value) || 0;
  });

  //////////////////////////////////////////////////
  // BALANCE SHEET ITEMS WITH CORRECT SIGN
  //////////////////////////////////////////////////

  let bsItems = [
    "Capital",
    "Home",
    "Qardan Given",
    "Qardan Taken",
    "Office Reimbursement"
  ];

  bsItems.forEach(item=>{

    let value = Number(document.getElementById(item).value) || 0;

    //////////////////////////////////////////////////
    // LIABILITY → STORE AS NEGATIVE
    //////////////////////////////////////////////////

    if(item === "Capital" || item === "Qardan Taken"){
      data[item] = -Math.abs(value);   // ✅ Credit nature
    }

    //////////////////////////////////////////////////
    // ASSET / DRAWINGS → STORE AS POSITIVE
    //////////////////////////////////////////////////

    else{
      data[item] = Math.abs(value);    // ✅ Debit nature
    }

  });

  //////////////////////////////////////////////////
  // SAVE
  //////////////////////////////////////////////////

  await db.collection("settings").doc("openingBalance").set(data);

  hideLoader();
  showToast("Opening Balance Saved ✅");

  closePopup();
}

function runCustomSummary(){

  let fromDate = document.getElementById("summaryFrom").value;
  let toDate = document.getElementById("summaryTo").value;

  // ❗ Empty check
  if(!fromDate || !toDate){
    showToast("Please select both From Date and To Date","error");
    document.getElementById("summaryFrom").focus();
    return;
  }

  // ❗ Date logic check
  if(fromDate > toDate){
    showToast("From Date cannot be after To Date ❌","error");
    document.getElementById("summaryFrom").focus();
    return;
  }

  sessionStorage.setItem("activeSummary","customSummary");
  sessionStorage.setItem("summaryFromDate",fromDate);
  sessionStorage.setItem("summaryToDate",toDate);

  closePopup();

  let balanceTitle = `Balance as on ${toDate}`;
  let expenseTitle = `From ${fromDate} till ${toDate}`;

  calculateSummary(fromDate,toDate,expenseTitle,balanceTitle);

}

//////////////////////////////////////////////////
// Summary Calculation Engine
//////////////////////////////////////////////////

function calculateSummary(fromDate,toDate,expenseTitle,balanceTitle){

  let balances = {};

accountsList.forEach(acc=>{
  balances[acc] = Number(openingBalances[acc] || 0);
});

  let expenses = {
    Personal:0,
    Home:0,
    "Office Reimbursement":0,
  	"Qardan Given":0
  };



  transactionsCache.forEach(t=>{

    // Closing Balance calculation (till TO date)
    if(t.date <= toDate){

      if (t.type === "receipt" || t.type === "inflow")
        balances[t.account] += Number(t.amount);

      if (t.type === "payment" || t.type === "outflow")
        balances[t.account] -= Number(t.amount);

      if (t.type === "contra"){
        balances[t.from] -= Number(t.amount);
        balances[t.to] += Number(t.amount);
      }
    }

    // Expense summary (within selected range)
    if(t.date >= fromDate && t.date <= toDate){

      if (t.type === "payment" || t.type === "outflow"){
        if(!expenses[t.category]){
  expenses[t.category] = 0;
}

expenses[t.category] += Number(t.amount);
      }

    }

  });

let totalBalance = 0;

accountsList.forEach(acc=>{
  totalBalance += balances[acc];
});

let totalExpense = 
  expenses.Personal + 
  expenses.Home + 
  expenses["Office Reimbursement"] +
  expenses["Qardan Given"];

let rows = "";

accountsList.forEach(acc => {

  let isActive = activeAccounts.includes(acc);

let dot = isActive
  ? '<span style="color:green;font-size:18px;">●</span>'
  : '<span style="color:red;font-size:18px;">●</span>';

rows += `
<tr>
  <td>${dot} ${acc}</td>
  <td>${balances[acc] || 0}</td>
</tr>
`;

});
	
  document.getElementById("closingSummary").innerHTML = `

<div class="summary-title">${balanceTitle}</div>
    <table>
      <tr><th>Account</th><th>Balance</th></tr>
      ${rows}
<tr><td><b>Total</b></td><td><b> ${totalBalance}</b></td></tr>
    </table>
  `;

  document.getElementById("expenseSummary").innerHTML = `
 <div class="summary-title">${expenseTitle}</div>
    <table>
      <tr><th>Category</th><th>Total</th></tr>
      <tr><td>Personal</td><td> ${expenses.Personal}</td></tr>
      <tr><td>Home</td><td> ${expenses.Home}</td></tr>
      <tr><td>Office Reimbursement</td><td> ${expenses["Office Reimbursement"]}</td></tr>
	  <tr><td>Qardan Given</td><td> ${expenses["Qardan Given"]}</td></tr>
<tr><td><b>Total</b></td><td><b> ${totalExpense}</b></td></tr>
    </table>
  `;

renderExpenseChart(
  expenses.Personal,
  expenses.Home,
  expenses["Office Reimbursement"],
  expenses["Qardan Given"]
);

renderPersonalMonthlySummary();

renderPersonalExpenseChart();

formatAllAmounts();
	
lucide.createIcons();
	
}

//////////////////////////////////////////////////
// DASHBOARD CALCULATION
//////////////////////////////////////////////////

function calculateDashboard() {

  let balances = {};

accountsList.forEach(acc=>{
  balances[acc] = Number(openingBalances[acc] || 0);
});

  let expenses = {
    Personal: 0,
    Home: 0,
    "Office Reimbursement": 0
  };

  transactionsCache.forEach(t => {

    // RECEIPTS
    if (t.type === "receipt" || t.type === "inflow") {
      balances[t.account] += Number(t.amount);
    }

    // PAYMENTS
    if (t.type === "payment" || t.type === "outflow") {
      balances[t.account] -= Number(t.amount);
      if(!expenses[t.category]){
  expenses[t.category] = 0;
}

expenses[t.category] += Number(t.amount);
    }

    // CONTRA
    if (t.type === "contra") {
      balances[t.from] -= Number(t.amount);
      balances[t.to] += Number(t.amount);
    }

  });

  //////////////////////////////////////////////
  // DISPLAY CLOSING BALANCE
  //////////////////////////////////////////////


let rows = "";

accountsList.forEach(acc => {

  rows += `
    <tr>
      <td>${acc}</td>
      <td>${balances[acc] || 0}</td>
    </tr>
  `;

});
	
  document.getElementById("closingSummary").innerHTML = `
    <table>
      <tr><th>Account</th><th>Balance</th></tr>
      ${rows}
    </table>
  `;

  //////////////////////////////////////////////
  // EXPENSE SUMMARY
  //////////////////////////////////////////////

  document.getElementById("expenseSummary").innerHTML = `
    <table>
      <tr><th>Category</th><th>Total</th></tr>
      <tr><td>Personal</td><td> ${expenses.Personal}</td></tr>
      <tr><td>Home</td><td> ${expenses.Home}</td></tr>
      <tr><td>Office Reimbursement</td><td> ${expenses["Office Reimbursement"]}</td></tr>
    </table>
  `;
lucide.createIcons(); // ✅ HERE
	
}

//////////////////////////////////////////////////
// Balance Checker Function
//////////////////////////////////////////////////


function getCurrentBalance(account) {

  let balances = {};

accountsList.forEach(acc=>{
  balances[acc] = Number(openingBalances[acc] || 0);
});

  transactionsCache.forEach(t => {

    if (t.type === "receipt" || t.type === "inflow")
      balances[t.account] += Number(t.amount);

    if (t.type === "payment" || t.type === "outflow")
      balances[t.account] -= Number(t.amount);

    if (t.type === "contra") {
      balances[t.from] -= Number(t.amount);
      balances[t.to] += Number(t.amount);
    }

  });

  return balances[account];
}

//////////////////////////////////////////////////
// Personal Expense Chart Function
//////////////////////////////////////////////////

function renderPersonalExpenseChart(){

  let currentYear = new Date().getFullYear();

  let months = [
    "Jan","Feb","Mar","Apr","May","Jun",
    "Jul","Aug","Sep","Oct","Nov","Dec"
  ];

  let personal = new Array(12).fill(0);

  transactionsCache.forEach(t => {

    if(t.type === "payment" && t.category === "Personal"){

      let d = new Date(t.date);

      if(d.getFullYear() === currentYear){

        personal[d.getMonth()] += Number(t.amount);

      }

    }

  });

  const ctx = document.getElementById("personalExpenseChart");

  if(personalExpenseChart){
    personalExpenseChart.destroy();
  }

  personalExpenseChart = new Chart(ctx, {

type: "bar",

data: {

labels: months,

datasets: [

{
label: "Personal Expense",
data: personal,
backgroundColor: "#001d4c"
},

type: "line",

}

]

},

options:{

responsive:true,

plugins:{

position:"bottom"
}
},

scales:{

}

}


//////////////////////////////////////////////////
// Monthly Personal Expense Summary
//////////////////////////////////////////////////

function renderPersonalMonthlySummary(){

  let currentYear = new Date().getFullYear();

  let months = [
    "Jan","Feb","Mar","Apr","May","Jun",
    "Jul","Aug","Sep","Oct","Nov","Dec"
  ];

  let monthly = new Array(12).fill(0);

  transactionsCache.forEach(t => {

    if(t.type === "payment" && t.category === "Personal"){

      let d = new Date(t.date);

      if(d.getFullYear() === currentYear){

        monthly[d.getMonth()] += Number(t.amount);

      }

    }

  });

  let html = `
  <div style="height:200px; overflow-y:auto;">
  <table style="margin-top:0;">
  <tr>
    <th>Month</th>
    <th>FY ${currentYear}</th>
  </tr>
  `;

  months.forEach((m,i)=>{

    let val = monthly[i] === 0 ? "-" : " "+monthly[i];

    html += `
    <tr>
      <td>${m} ${currentYear}</td>
      <td>${val}</td>
    </tr>`;

  });

  html += "</table></div>";

  document.getElementById("personalMonthlySummary").innerHTML = html;

}

//////////////////////////////////////////////////
// SAVE RECEIPT
//////////////////////////////////////////////////

async function saveReceipt() {

  if(!checkPermission("write")) return;

  let account = document.getElementById("account").value;
  let category = document.getElementById("category").value; // ✅ NEW
  let date = document.getElementById("date").value;
  let narration = document.getElementById("narration").value.trim();
  let amount = Number(document.getElementById("amount").value);

  if(!date){
    showToast("Please select Date ❌","error");
    return;
  }

  if (!account || !category || !date || !narration || isNaN(amount)) {
    showToast("All fields are mandatory","error");
    return;
  }

  if (amount <= 0) {
    showToast("Amount must be greater than 0","error");
    return;
  }

  showLoader();

  await db.collection("transactions").add({
    type: "receipt",
    account: account,
    category: category, // ✅ NEW
    amount: amount,
    date: date,
    narration: narration
  });

  hideLoader();
  showToast("Receipt Saved ✅");
  closePopup();
}

//////////////////////////////////////////////////
// GET BALANCE EXCLUDING CURRENT TRANSACTION
//////////////////////////////////////////////////

function getBalanceExcludingTransaction(account, transactionId) {

  let balances = {};

accountsList.forEach(acc=>{
  balances[acc] = Number(openingBalances[acc] || 0);
});

  transactionsCache.forEach(t => {

    if (t.id === transactionId) return;

    if (t.type === "receipt" || t.type === "inflow")
      balances[t.account] += Number(t.amount);

    if (t.type === "payment" || t.type === "outflow")
      balances[t.account] -= Number(t.amount);

    if (t.type === "contra") {
      balances[t.from] -= Number(t.amount);
      balances[t.to] += Number(t.amount);
    }

  });

  return balances[account];
}

let isCategory = true;

if(category){

}

return isPayment && isCategory && t.date >= fromDate && t.date <= toDate;

})
.sort((a,b)=>{

if(a.date === b.date){
return a.id.localeCompare(b.id);
}

return new Date(a.date) - new Date(b.date);

});

payments.forEach((p,i)=>{

total += Number(p.amount);

rows.push([
  i+1,
  p.date,
  p.account,
  p.category || "-", 
  p.narration,
  Number(p.amount)
]);

});

}

//////////////////////////////////////////////////

if(reportType === "contra"){

title = "Contra_Report";

rows.push(["Serial No","Date","From Account","To Account","Particular","Amount"]);

let contra = transactionsCache
.filter(t=>{

.sort((a,b)=>{

return new Date(a.date) - new Date(b.date);

});

contra.forEach((c,i)=>{

total += Number(c.amount);

i+1,
c.date,
c.from,
c.to,
c.narration,
Number(c.amount)
]);

});

}

//////////////////////////////////////////////////
// ADD TOTAL ROW
//////////////////////////////////////////////////

rows.push([]);
rows.push(["","","","Total Amount",total]);

let worksheet = XLSX.utils.aoa_to_sheet(rows);

{wch:15}
];

//////////////////////////////////////////////////

let headerRange = XLSX.utils.decode_range(worksheet["!ref"]);

for(let C = headerRange.s.c; C <= headerRange.e.c; ++C){

};

}

//////////////////////////////////////////////////

};

for(let c=0;c<5;c++){

};

//////////////////////////////////////////////////

//////////////////////////////////////////////////
// FUNCTION TO CREATE ACCOUNT STATEMENT
//////////////////////////////////////////////////

function createAccountSheet(name){

let sheet = workbook.addWorksheet(name);

sheet.addRow(["Serial No","Date","Type","Category","Particular","Amount","Balance"]);

//////////////////////////////////////////////////
// CALCULATE OPENING BALANCE AS ON FROM DATE
//////////////////////////////////////////////////

let runningBalance = Number(openingBalances[name] || 0);

transactionsCache.forEach(t=>{

if(t.date < fromDate){

if(t.type === "receipt" && t.account === name){
runningBalance += Number(t.amount);
}

if(t.type === "payment" && t.account === name){
runningBalance -= Number(t.amount);
}

if(t.type === "contra"){

if(t.from === name){
runningBalance -= Number(t.amount);
}

if(t.to === name){
runningBalance += Number(t.amount);
}

}

}

});

sheet.addRow(["","", "", "", "Opening Balance","",runningBalance]);

let serial = 1;

transactionsCache
.filter(t=>t.date>=fromDate && t.date<=toDate)
.sort((a,b)=> new Date(a.date) - new Date(b.date))
.forEach(t=>{

let type="";
let category="";
let amount=0;

if(t.type==="receipt" && t.account===name){

type="Inflow";
category = t.category || "";
amount=Number(t.amount);
runningBalance+=amount;

}

if(t.type==="payment" && t.account===name){

type="Outflow";
category=t.category;
amount=Number(t.amount);
runningBalance-=amount;

}

if(t.type==="contra"){

if(t.from===name){
type="Contra";
amount=Number(t.amount);
runningBalance-=amount;
}

if(t.to===name){
type="Contra";
amount=Number(t.amount);
runningBalance+=amount;
}

}

if(type!==""){

let row = sheet.addRow([
serial,
t.date,
type,
category,
t.narration,
amount,
runningBalance
]);

// Format Amount & Balance Columns

row.getCell(6).numFmt = '#,##0.00';
row.getCell(7).numFmt = '#,##0.00';

row.getCell(6).alignment = { horizontal: "right" };
row.getCell(7).alignment = { horizontal: "right" };

//////////////////////////////////////////////////
// COLOR TEXT
//////////////////////////////////////////////////

if(type==="Inflow"){
row.getCell(6).font={color:{argb:"FF008000"}};
}

if(type==="Outflow"){
row.getCell(6).font={color:{argb:"FFFF0000"}};
}

if(type==="Contra"){
row.getCell(6).font={color:{argb:"FF000000"}};
}

serial++;

}

});

sheet.addRow(["","","","","Closing Balance","",runningBalance]);

}

//////////////////////////////////////////////////
// CREATE SHEETS FOR ALL ACCOUNTS

accountsList.forEach(acc=>{

saveAs(new Blob([buffer]),fileName);

hideLoader(); // ADD
showToast("Report Exported 📊");	

}

//////////////////////////////////////////////////
// AUTO LOGOUT AFTER INACTIVITY
//////////////////////////////////////////////////

	
let inactivityTimer;

function resetInactivityTimer() {

  clearTimeout(inactivityTimer);

  inactivityTimer = setTimeout(() => {
    
    showToast("Session expired due to inactivity ⏳","error");

setTimeout(()=>{
    logout();
  },1000);
    

  }, 2 * 60 * 1000); // 2 minutes
	
}	

//////////////////////////////////////////////////
// START INACTIVITY TRACKING
//////////////////////////////////////////////////

function startInactivityTracking() {

  ["click","mousemove","keydown","scroll","touchstart"].forEach(event => {
    document.addEventListener(event, resetInactivityTimer);
  });

  resetInactivityTimer(); // start timer immediately

}

function stopInactivityTracking() {
  ["click","mousemove","keydown","scroll","touchstart"].forEach(event => {
    document.removeEventListener(event, resetInactivityTimer);
  });
}

//////////////////////////////////////////////////
// DATE LOCAL
//////////////////////////////////////////////////

function formatDateLocal(date){
  let d = new Date(date);
  let month = String(d.getMonth()+1).padStart(2,"0");
  let day = String(d.getDate()).padStart(2,"0");
  return `${d.getFullYear()}-${month}-${day}`;
}


//////////////////////////////////////////////////
// DATE RANGE VALIDATION (GLOBAL)
//////////////////////////////////////////////////

function validateDateRange(fromDate, toDate){

  if(!fromDate || !toDate){
    showToast("Please select both From Date and To Date","error");
    return false;
  }

  if(fromDate > toDate){
    showToast("From Date cannot be after To Date ❌","error");
    return false;
  }

  return true;
}

openPopup(`

<label>From Date</label>

<label>To Date</label>
<input type="date" id="tbTo">

<button onclick="runTrialBalance()">Run</button>
`);

//////////////////////////////////////////////////
// RUN TRIALBALANCE
//////////////////////////////////////////////////

function runTrialBalance(){

let fromDate = document.getElementById("tbFrom").value;
let toDate = document.getElementById("tbTo").value;

if(!validateDateRange(fromDate,toDate)) return;

closePopup();

//////////////////////////////////////////////////
// LEDGER STRUCTURE
//////////////////////////////////////////////////

let ledger = {
  Cash:0,
  Bank:0,

  Personal:0,
  Home:0,
  "Office Reimbursement":0,
  "Qardan Given":0,

  Capital:0,
  Income:0,
  "Qardan Taken":0
};


	
//////////////////////////////////////////////////
// OPENING BALANCE
//////////////////////////////////////////////////

// Cash/Bank
accountsList.forEach(acc=>{
  ledger[acc] = Number(openingBalances[acc] || 0);
});

// Balance Sheet Items
let bsItems = [
  "Capital",
  "Home",
  "Qardan Given",
  "Qardan Taken",
  "Office Reimbursement"
];

bsItems.forEach(item=>{
  ledger[item] = Number(openingBalances[item] || 0);
});

//////////////////////////////////////////////////
// PROCESS TRANSACTIONS (CORRECT LOGIC)
//////////////////////////////////////////////////

transactionsCache.forEach(t=>{

// ❌ skip only beyond To Date
if(t.date > toDate) return;

//////////////////////////////////////////////////
// RECEIPTS
//////////////////////////////////////////////////

if(t.type === "receipt"){

// ✅ ALWAYS update account (BS)
ledger[t.account] += Number(t.amount);

// ensure category exists
if(!ledger[t.category]) ledger[t.category] = 0;

// ✅ CAPITAL / LIABILITY → FULL
if(
  t.category === "Capital" ||
  t.category === "Qardan Taken"
){
  ledger[t.category] -= Number(t.amount);
}

// ✅ INCOME → ONLY PERIOD
else if(t.category === "Income"){
  if(t.date >= fromDate){
    ledger[t.category] -= Number(t.amount);
  }
}

}

//////////////////////////////////////////////////
// PAYMENTS
//////////////////////////////////////////////////

if(t.type === "payment"){

// ✅ ALWAYS update account
ledger[t.account] -= Number(t.amount);

// ensure category exists
if(!ledger[t.category]) ledger[t.category] = 0;

// ✅ BALANCE SHEET → FULL
if(
  t.category === "Home" ||
  t.category === "Qardan Given" ||
  t.category === "Office Reimbursement"
){
  ledger[t.category] += Number(t.amount);
}

// ✅ PERSONAL EXPENSE → PERIOD ONLY
else if(t.category === "Personal"){
  if(t.date >= fromDate){
    ledger[t.category] += Number(t.amount);
  }
}

}

});

//////////////////////////////////////////////////
// RETAINED EARNINGS (BEFORE FROM DATE)
//////////////////////////////////////////////////

let retained = 0;

transactionsCache.forEach(t=>{

if(t.date >= fromDate) return;

// Income increases profit
if(t.type === "receipt" && t.category === "Income"){
  retained += Number(t.amount);
}

// Personal expense reduces profit
if(t.type === "payment" && t.category === "Personal"){
  retained -= Number(t.amount);
}

});

// ✅ Add to ledger only if exists
if(retained !== 0){
  ledger["Retained Earnings"] = -retained;
}

	
//////////////////////////////////////////////////
// PREPARE TB
//////////////////////////////////////////////////

let rows = `
<h3>Trial Balance (${fromDate} to ${toDate})</h3>
<table class="report-table">
<tr>
<th>Ledger</th>
<th>Debit</th>
<th>Credit</th>
</tr>
`;

let totalDr = 0;
let totalCr = 0;

Object.keys(ledger).forEach(name=>{

let value = ledger[name];

if(value === 0) return;

// ✅ ONLY DISPLAY CHANGE
let displayName = (name === "Home") ? "Drawings" : name;

let dr = "";
let cr = "";

if(value > 0){
  dr = value;
  totalDr += value;
}else{
  cr = Math.abs(value);
  totalCr += Math.abs(value);
}

rows += `
<tr>
<td>${displayName}</td>
<td>${dr}</td>
<td>${cr}</td>
</tr>
`;

});

//////////////////////////////////////////////////
// TOTAL
//////////////////////////////////////////////////

rows += `
<tr>
<td><b>Total</b></td>
<td><b>${totalDr}</b></td>
<td><b>${totalCr}</b></td>
</tr>
`;

rows += `</table>`;

document.getElementById("reportOutput").innerHTML = rows;

formatAllAmounts();

}
