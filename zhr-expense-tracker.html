//////////////////////////////////////////////////
// CHECK PERMISSION
//////////////////////////////////////////////////

function checkPermission(action){

  if(action === "delete" && currentUserRole !== "admin"){
    showToast("You are not authorized to delete ❌","error");
    return false;
  }

  if(action === "write" && !["admin","user"].includes(currentUserRole)){
    showToast("You are not authorized to add/modify ❌","error");
    return false;
  }

  if(action === "admin" && currentUserRole !== "admin"){
    showToast("Admin access only ❌","error");
    return false;
  }

  return true;
}

//////////////////////////////////////////////////
// LOAD USER
//////////////////////////////////////////////////

async function loadUserRole(){

  let user = auth.currentUser;

  if(!user) return;

  let doc = await db.collection("users").doc(user.email).get();

  if(doc.exists){
    currentUserRole = doc.data().role;
  }else{
    currentUserRole = "viewer";
  }

  console.log("User Role:", currentUserRole);
}

//////////////////////////////////////////////////
// LOAD LEDGERS FROM FIREBASE
//////////////////////////////////////////////////

function loadLedgers() {

  db.collection("ledgers").onSnapshot(snapshot => {

    ledgerList = [];

    if (snapshot.empty) {
      console.log("❌ No ledgers found");
      return;
    }

    snapshot.forEach(doc => {

      let data = doc.data();

      if (data.name) {
        ledgerList.push({
          id: doc.id,
          name: data.name,
          group: data.group,
          openingBalance: data.openingBalance || 0,
          openingDate: data.openingDate || ""
        });
      }

    });

    console.log("✅ Ledgers Loaded:", ledgerList);

    // refresh dashboard
    setTimeout(() => {
      calculateDashboard();
    }, 100);

  });

}

//////////////////////////////////////////////////
// SAVE LEDGER
//////////////////////////////////////////////////

async function saveLedger(){

if(!checkPermission("admin")) return;

let name = document.getElementById("ledgerName").value.trim();
let group = document.getElementById("ledgerGroup").value;
let openingBalance = Number(document.getElementById("openingBalance").value) || 0;
let openingDate = document.getElementById("openingDate").value;

if(!name){
  showToast("Enter ledger name ❌","error");
  return;
}

showLoader();

await db.collection("ledgers").add({
  name,
  group,
  openingBalance,
  openingDate
});

hideLoader();
showToast("Ledger Added ✅");

closePopup();
}

//////////////////////////////////////////////////////////
// AUTO FORMAT AMOUNTS (KEEP SAME)
//////////////////////////////////////////////////////////

function formatAllAmounts(){

document.querySelectorAll("td").forEach((cell,index)=>{

let column = cell.cellIndex;
let value = cell.innerText.replace(/,/g,"").trim();

if(column === 0) return;

if(value === "0"){
cell.innerText = "-";
cell.style.textAlign = "right";
return;
}

if(!isNaN(value) && value !== ""){

let formatted = Number(value).toLocaleString("en-IN",{
minimumFractionDigits:2,
maximumFractionDigits:2
});

if(cell.querySelector("b")){
cell.querySelector("b").innerText = formatted;
}else{
cell.innerText = formatted;
}

cell.style.textAlign = "right";
}

});
}

//////////////////////////////////////////////////
// LOAD DATA
//////////////////////////////////////////////////

function loadTransactions() {

  let firstLoad = true;

  db.collection("transactions")
    .onSnapshot(snapshot => {

      if(firstLoad){
        showLoader();
      }

      transactionsCache = [];

      snapshot.forEach(doc => {
        transactionsCache.push({ id: doc.id, ...doc.data() });
      });

      if(firstLoad){
        hideLoader();
        firstLoad = false;
      }

      //////////////////////////////////////////////////
      // DASHBOARD REFRESH
      //////////////////////////////////////////////////

      calculateDashboard();

      //////////////////////////////////////////////////
      // SUMMARY REFRESH
      //////////////////////////////////////////////////

      let activeSummary = sessionStorage.getItem("activeSummary");

      if (activeSummary === "currentMonth") showCurrentMonth();
      else if (activeSummary === "lastMonth") showLastMonth();
      else if (activeSummary === "fullYear") showFullYear();

//////////////////////////////////////////////////
// Summary Calculation Engine (LEDGER BASED)
//////////////////////////////////////////////////

function calculateSummary(fromDate,toDate,expenseTitle,balanceTitle){

  let balances = {};

  //////////////////////////////////////////////////
  // INITIALIZE BALANCES (LEDGER OPENING)
  //////////////////////////////////////////////////

  ledgerList.forEach(l=>{
    balances[l.name] = Number(l.openingBalance || 0);
  });

  //////////////////////////////////////////////////
  // TRACKING VARIABLES
  //////////////////////////////////////////////////

  let personalExpense = 0;
  let drawings = 0;
  let officeReimbursement = 0;
  let qardanGiven = 0;

  //////////////////////////////////////////////////
  // PROCESS TRANSACTIONS
  //////////////////////////////////////////////////

  transactionsCache.forEach(t=>{

    //////////////////////////////////////////////////
    // CLOSING BALANCE (DOUBLE ENTRY)
    //////////////////////////////////////////////////

    if(t.date <= toDate){

      if(t.debitLedger){
        balances[t.debitLedger] = (balances[t.debitLedger] || 0) + Number(t.amount);
      }

      if(t.creditLedger){
        balances[t.creditLedger] = (balances[t.creditLedger] || 0) - Number(t.amount);
      }

    }

    //////////////////////////////////////////////////
    // PERIOD ANALYSIS
    //////////////////////////////////////////////////

    if(t.date >= fromDate && t.date <= toDate){

      // Expense Ledgers
      let debitLedgerObj = ledgerList.find(l=>l.name === t.debitLedger);

      if(debitLedgerObj){

        if(debitLedgerObj.group === "Expense"){
          personalExpense += Number(t.amount);
        }

        if(debitLedgerObj.name === "Drawing"){
          drawings += Number(t.amount);
        }

        if(debitLedgerObj.name === "Office Reimbursement"){
          officeReimbursement += Number(t.amount);
        }

        if(debitLedgerObj.name === "Qardan Given"){
          qardanGiven += Number(t.amount);
        }

      }

    }

  });

  //////////////////////////////////////////////////
  // TOTAL BALANCE
  //////////////////////////////////////////////////

  let totalBalance = 0;

  ledgerList.forEach(l=>{
    totalBalance += balances[l.name] || 0;
  });

  //////////////////////////////////////////////////
  // RENDER BALANCE TABLE
  //////////////////////////////////////////////////

  let rows = "";

  ledgerList.forEach(l => {

    rows += `
    <tr>
      <td>${l.name}</td>
      <td>${balances[l.name] || 0}</td>
    </tr>
    `;
  });

  document.getElementById("closingSummary").innerHTML = `
  <div class="summary-title">${balanceTitle}</div>
  <table>
    <tr><th>Ledger</th><th>Balance</th></tr>
    ${rows}
    <tr><td><b>Total</b></td><td><b>${totalBalance}</b></td></tr>
  </table>
  `;

  //////////////////////////////////////////////////
  // EXPENSE SUMMARY (NEW STRUCTURE)
  //////////////////////////////////////////////////

  let totalExpense =
    personalExpense +
    drawings +
    officeReimbursement +
    qardanGiven;

  document.getElementById("expenseSummary").innerHTML = `
  <div class="summary-title">${expenseTitle}</div>
  <table>
    <tr><th>Particulars</th><th>Total</th></tr>
    <tr><td>Personal Expense</td><td>${personalExpense}</td></tr>
    <tr><td>Drawings</td><td>${drawings}</td></tr>
    <tr><td>Office Reimbursement</td><td>${officeReimbursement}</td></tr>
    <tr><td>Qardan Given</td><td>${qardanGiven}</td></tr>
    <tr><td><b>Total</b></td><td><b>${totalExpense}</b></td></tr>
  </table>
  `;

  //////////////////////////////////////////////////
  // CHARTS (UPDATED)
  //////////////////////////////////////////////////

  renderExpenseChart(
    personalExpense,
    officeReimbursement,
    qardanGiven
  );

  renderPersonalMonthlySummary();

  renderPersonalExpenseChart();

  formatAllAmounts();

  lucide.createIcons();
}

//////////////////////////////////////////////////
// AUTO TRANSACTION NUMBER GENERATOR
//////////////////////////////////////////////////

async function getNextTransactionNumber(type){

  let prefix = {
    receipt: "R",
    payment: "P",
    journal: "J"
  };

  let snapshot = await db.collection("transactions")
    .where("type","==",type)
    .get();

  let max = 0;

  snapshot.forEach(doc=>{
    let num = doc.data().txnNumber || "";
    let n = Number(num.replace(prefix[type],""));
    if(n > max) max = n;
  });

  return prefix[type] + (max + 1);
}

async function saveReceipt() {

  showLoader();

  await db.collection("transactions").add({

    creditLedger,
    amount,
    date,
    narration
  });

  showToast("Receipt Saved ✅");
  closePopup();
}

async function saveJournal() {

	if(!checkPermission("write")) return;

  let debitLedger = document.getElementById("debitLedger").value;
  let creditLedger = document.getElementById("creditLedger").value;
  let date = document.getElementById("date").value;
  let narration = document.getElementById("narration").value.trim();
  let amount = Number(document.getElementById("amount").value);

  if(!date){
    showToast("Please select Date ❌","error");
    return;
  }

  if (!debitLedger || !creditLedger || !narration || isNaN(amount)) {
    showToast("All fields are mandatory","error");
    return;
  }

  if (debitLedger === creditLedger) {
    showToast("Debit and Credit cannot be same ❌","error");
    return;
  }

  if (amount <= 0) {
    showToast("Amount must be greater than 0","error");
    return;
  }

  showLoader();

  let txnNumber = await getNextTransactionNumber("journal");

  await db.collection("transactions").add({
    type: "journal",
    txnNumber,
    debitLedger,
    creditLedger,
    amount,
    date,
    narration
  });

  hideLoader();
  showToast("Journal Saved ✅");
  closePopup();
}

    date,
    narration,
    amount
  });

  hideLoader();
  showToast("Payment Updated ✏️");

  closePopup();

  setTimeout(refreshPaymentReport,300);
}

//////////////////////////////////////////////////
// GET BALANCE EXCLUDING CURRENT TRANSACTION (LEDGER BASED)
//////////////////////////////////////////////////

function getBalanceExcludingTransaction(ledger, transactionId) {

  let balances = {};

  ledgerList.forEach(l=>{
    balances[l.name] = Number(l.openingBalance || 0);
  });

  transactionsCache.forEach(t => {

    if (t.id === transactionId) return;

    let amount = Number(t.amount);

    if(t.debitLedger){
      balances[t.debitLedger] += amount;
    }

    if(t.creditLedger){
      balances[t.creditLedger] -= amount;
    }

  });

  return balances[ledger] || 0;
}

//////////////////////////////////////////////////
// FUNCTION TO CREATE LEDGER STATEMENT
//////////////////////////////////////////////////

function createAccountSheet(name){

let sheet = workbook.addWorksheet(name);

sheet.addRow([
  "Serial No","Date","Txn No","Type","Particular",
  "Debit","Credit","Balance"
]);

//////////////////////////////////////////////////
// CALCULATE OPENING BALANCE
//////////////////////////////////////////////////

let ledgerObj = ledgerList.find(l=>l.name === name);

let runningBalance = Number(ledgerObj?.openingBalance || 0);

transactionsCache.forEach(t=>{

if(t.date < fromDate){

let amount = Number(t.amount);

// Debit increases
if(t.debitLedger === name){
  runningBalance += amount;
}

// Credit decreases
if(t.creditLedger === name){
  runningBalance -= amount;
}

}

});

sheet.addRow(["","","","","Opening Balance","","",runningBalance]);

//////////////////////////////////////////////////
// TRANSACTIONS
//////////////////////////////////////////////////

let serial = 1;

transactionsCache
.filter(t=>t.date>=fromDate && t.date<=toDate)
.sort((a,b)=> new Date(a.date) - new Date(b.date))
.forEach(t=>{

let debit = "";
let credit = "";
let type = t.type;
let narration = t.narration;
let txnNo = t.txnNumber || "";

let amount = Number(t.amount);

// If ledger is debited
if(t.debitLedger === name){

  debit = amount;
  runningBalance += amount;

}

// If ledger is credited
if(t.creditLedger === name){

  credit = amount;
  runningBalance -= amount;

}

// Only show relevant entries
if(debit || credit){

let counterLedger = 
  t.debitLedger === name ? t.creditLedger : t.debitLedger;

let row = sheet.addRow([
  serial,
  t.date,
  txnNo,
  type,
  counterLedger + " - " + narration,
  debit,
  credit,
  runningBalance
]);

//////////////////////////////////////////////////
// FORMAT
//////////////////////////////////////////////////

row.getCell(6).numFmt = '#,##0.00';
row.getCell(7).numFmt = '#,##0.00';
row.getCell(8).numFmt = '#,##0.00';

row.getCell(6).alignment = { horizontal: "right" };
row.getCell(7).alignment = { horizontal: "right" };
row.getCell(8).alignment = { horizontal: "right" };

//////////////////////////////////////////////////
// COLOR LOGIC
//////////////////////////////////////////////////

if(debit){
  row.getCell(6).font = { color:{argb:"FF008000"} }; // green
}

if(credit){
  row.getCell(7).font = { color:{argb:"FFFF0000"} }; // red
}

serial++;

}

});

//////////////////////////////////////////////////
// CLOSING BALANCE
//////////////////////////////////////////////////

sheet.addRow(["","","","","Closing Balance","","",runningBalance]);

}

//////////////////////////////////////////////////
// CREATE SHEETS FOR ALL LEDGERS
//////////////////////////////////////////////////

ledgerList.forEach(l=>{
  createAccountSheet(l.name);
});

//////////////////////////////////////////////////
// EXPORT FILE
//////////////////////////////////////////////////

let fileName = `Ledger_Statement_${fromDate}_to_${toDate}.xlsx`;

const buffer = await workbook.xlsx.writeBuffer();

saveAs(new Blob([buffer]),fileName);

hideLoader();
showToast("Ledger Report Exported 📊");

}

  ["click","mousemove","keydown","scroll","touchstart"].forEach(event => {
    document.addEventListener(event, resetInactivityTimer);
  });

  resetInactivityTimer();

}

//////////////////////////////////////////////////
// DATE LOCAL FORMAT
//////////////////////////////////////////////////

function formatDateLocal(date){

  let d = new Date(date);

  if(isNaN(d)) return "";

  let month = String(d.getMonth()+1).padStart(2,"0");
  let day = String(d.getDate()).padStart(2,"0");

  return `${d.getFullYear()}-${month}-${day}`;
}

//////////////////////////////////////////////////
// DATE RANGE VALIDATION (GLOBAL)
//////////////////////////////////////////////////

function validateDateRange(fromDate, toDate){

  // Allow empty for reports (as per your requirement)
  if(!fromDate && !toDate){
    return true;
  }

  if(fromDate && !toDate){
    showToast("Please select To Date","error");
    return false;
  }

  if(!fromDate && toDate){
    showToast("Please select From Date","error");
    return false;
  }

  if(fromDate > toDate){
    showToast("From Date cannot be after To Date ❌","error");
    return false;
  }

  return true;
}

  }

  closePopup();

  generateFinancials(start,end,year);

//////////////////////////////////////////////////
// MAIN FINANCIAL ENGINE
//////////////////////////////////////////////////

function generateFinancials(fromDate,toDate,year){

  //////////////////////////////////////////////////
  // P&L CALCULATION
  //////////////////////////////////////////////////

  let incomeMap = {};
  let expenseMap = {};

  let totalIncome = 0;
  let totalExpense = 0;

  transactionsCache.forEach(t=>{

    if(t.date >= fromDate && t.date <= toDate){

      let amount = Number(t.amount);

      let debit = getLedger(t.debitLedger);
      let credit = getLedger(t.creditLedger);

      // Expense (Debit)
      if(debit.group === "Expense"){
        expenseMap[debit.name] = (expenseMap[debit.name] || 0) + amount;
        totalExpense += amount;
      }

      // Income (Credit)
      if(credit.group === "Income"){
        incomeMap[credit.name] = (incomeMap[credit.name] || 0) + amount;
        totalIncome += amount;
      }

    }

  });

  let netProfit = totalIncome - totalExpense;

  //////////////////////////////////////////////////
  // RETAINED EARNINGS (BEFORE PERIOD)
  //////////////////////////////////////////////////

  let retained = 0;

  transactionsCache.forEach(t=>{

    if(t.date < fromDate){

      let amount = Number(t.amount);

      let debit = getLedger(t.debitLedger);
      let credit = getLedger(t.creditLedger);

      if(credit.group === "Income") retained += amount;
      if(debit.group === "Expense") retained -= amount;

    }

  });

  //////////////////////////////////////////////////
  // BALANCE SHEET CALCULATION
  //////////////////////////////////////////////////

  let balances = {};

  ledgerList.forEach(l=>{
    balances[l.name] = Number(l.openingBalance || 0);
  });

  transactionsCache.forEach(t=>{

    if(t.date <= toDate){

      let amt = Number(t.amount);

      balances[t.debitLedger] += amt;
      balances[t.creditLedger] -= amt;

    }

  });

  //////////////////////////////////////////////////
  // DRAWINGS
  //////////////////////////////////////////////////

  let drawings = balances["Drawing"] || 0;

  //////////////////////////////////////////////////
  // HTML BUILD
  //////////////////////////////////////////////////

  let plLeft = "";
  let plRight = "";

  Object.entries(expenseMap).forEach(([k,v])=>{
    plLeft += `<tr><td>${k}</td><td>${v}</td></tr>`;
  });

  Object.entries(incomeMap).forEach(([k,v])=>{
    plRight += `<tr><td>${k}</td><td>${v}</td></tr>`;
  });

  let profitText = netProfit >= 0
    ? `Net Profit ${netProfit}`
    : `Net Loss (${Math.abs(netProfit)})`;

  //////////////////////////////////////////////////
  // BALANCE SHEET
  //////////////////////////////////////////////////

  let capital = balances["Capital"] || 0;

  let liabilityRows = "";
  let assetRows = "";
  let cashRows = "";

  ledgerList.forEach(l=>{

    let val = balances[l.name] || 0;

    if(l.group === "Liability"){
      liabilityRows += `<tr><td>${l.name}</td><td>${val}</td></tr>`;
    }

    if(l.group === "Asset"){
      assetRows += `<tr><td>${l.name}</td><td>${val}</td></tr>`;
    }

    if(l.group === "Cash Bank"){
      cashRows += `<tr><td>${l.name}</td><td>${val}</td></tr>`;
    }

  });

  //////////////////////////////////////////////////
  // OUTPUT
  //////////////////////////////////////////////////

  let html = `

  <h3>Profit & Loss for the year ended ${year}</h3>

  <table class="report-table">
    <tr>
      <th>Particulars</th><th>Amount</th>
      <th>Particulars</th><th>Amount</th>
    </tr>

    <tr>
      <td><b>Expenses</b></td><td></td>
      <td><b>Income</b></td><td></td>
    </tr>

    <tr>
      <td>
        <table>${plLeft}</table>
      </td>
      <td>${totalExpense}</td>

      <td>
        <table>${plRight}</table>
      </td>
      <td>${totalIncome}</td>
    </tr>

    <tr>
      <td><b>${profitText}</b></td>
      <td></td>
      <td></td><td></td>
    </tr>

  </table>

  <br>

  <h3>Balance Sheet as on ${toDate}</h3>

  <table class="report-table">
    <tr>
      <th>Liabilities</th><th>Amount</th>
      <th>Assets</th><th>Amount</th>
    </tr>

    <tr>
      <td>
        <b>Capital</b><br>
        Capital ${capital}<br>
        Retained Earnings ${retained}<br>
        Add: ${profitText}<br>
        Less: Drawings ${drawings}
        <br><br>
        <b>Liabilities</b>
        <table>${liabilityRows}</table>
      </td>

      <td></td>

      <td>
        <b>Assets</b>
        <table>${assetRows}</table>

        <br>
        <b>Cash & Bank</b>
        <table>${cashRows}</table>
      </td>

      <td></td>
    </tr>

  </table>

  `;

  document.getElementById("reportOutput").innerHTML = html;

  formatAllAmounts();
}
