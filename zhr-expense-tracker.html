//////////////////////////////////////////////////
// AUTO FORMAT AMOUNTS (INDIAN + DECIMAL + RIGHT ALIGN)
//////////////////////////////////////////////////

function formatAllAmounts(){

document.querySelectorAll("td").forEach((cell,index)=>{

let column = cell.cellIndex;

let value = cell.innerText.replace(/,/g,"").trim();

/* Skip Serial Number column */
if(column === 0) return;

if(value === "0"){
cell.innerText = "-";
cell.style.textAlign = "right";
return;
}

if(!isNaN(value) && value !== ""){

let formatted = Number(value).toLocaleString("en-IN",{
minimumFractionDigits:2,
maximumFractionDigits:2
});

if(cell.querySelector("b")){
cell.querySelector("b").innerText = formatted;
}else{
cell.innerText = formatted;
}

cell.style.textAlign = "right";

}

});

}

//////////////////////////////////////////////////
// Month Name Function
//////////////////////////////////////////////////

function getMonthName(monthIndex){
  const months = [
    "January","February","March","April","May","June",
    "July","August","September","October","November","December"
  ];
  return months[monthIndex];
}


//////////////////////////////////////////////////
// ADMIN
//////////////////////////////////////////////////

const ADMIN_ID = "admin";
const ADMIN_PASS = "Admin@123";

let openingBalances = {};
let transactionsCache = [];

//////////////////////////////////////////////////
// SESSION LOGIN SYSTEM
//////////////////////////////////////////////////


function login(){

let email = document.getElementById("username").value;
let password = document.getElementById("password").value;

auth.signInWithEmailAndPassword(email,password)
.then(()=>{
// dashboard will open automatically via auth listener
})
.catch(()=>{

alert("Invalid Login");
});

}

function showDashboard() {

  document.getElementById("login").style.display = "none";
  document.getElementById("dashboard").style.display = "block";

  loadOpeningBalance();
  loadTransactions();


//////////////////////////////////////////////////
// ENTER KEY LOGIN
//////////////////////////////////////////////////

document.addEventListener("keydown", function(e){

if(e.key === "Enter"){

let loginVisible = document.getElementById("login").style.display !== "none";

if(loginVisible){
login();
}

}

});



//////////////////////////////////////////////////
// RESTORE LAST SUMMARY
//////////////////////////////////////////////////

  setTimeout(function(){

    if(activeSummary === "currentMonth"){

    }

    else if(activeSummary === "lastMonth"){
      showLastMonth();
    }

    }

      let balanceTitle = `Balance as on ${toDate}`;

    }

  //////////////////////////////////////////////////
  // RESTORE LAST REPORT
  //////////////////////////////////////////////////

//////////////////////////////////////////////////
// POPUP
//////////////////////////////////////////////////

function openPopup(content) {
  document.getElementById("popupContent").innerHTML = content;
  document.getElementById("popupModal").style.display = "block";
}

function closePopup() {
  document.getElementById("popupModal").style.display = "none";
}

//////////////////////////////////////////////////
// LOAD DATA
//////////////////////////////////////////////////


function loadTransactions() {
  db.collection("transactions")
    .onSnapshot(snapshot => {
      transactionsCache = [];
      snapshot.forEach(doc => {
        transactionsCache.push({ id: doc.id, ...doc.data() });
      });
       calculateDashboard();
    });
}


//////////////////////////////////////////////////
// LOAD OPENING BALANCE (REAL TIME)
//////////////////////////////////////////////////

function loadOpeningBalance() {
  db.collection("settings").doc("openingBalance")
    .onSnapshot(doc => {

      if (doc.exists) {
        openingBalances = doc.data();
      } else {
        openingBalances = {};
      }

      calculateDashboard();   // ADD THIS LINE

    });
}

//////////////////////////////////////////////////

  let today = new Date();

  let firstDay = new Date(today.getFullYear(), today.getMonth(), 1);
  let todayDate = today.toISOString().split("T")[0];

  let expenseTitle = `For the month of ${monthName} ${today.getFullYear()}`;

  calculateSummary(firstDay.toISOString().split("T")[0],todayDate,expenseTitle,balanceTitle);

}

// Last Month Button
//////////////////////////////////////////////////

function showLastMonth(){

sessionStorage.setItem("activeSummary","lastMonth");

  let today = new Date();

  let firstDay = new Date(today.getFullYear(), today.getMonth()-1, 1);
  let lastDay = new Date(today.getFullYear(), today.getMonth(), 0);

  let monthName = getMonthName(firstDay.getMonth());

  let balanceTitle = `Balance as on ${lastDay.toISOString().split("T")[0]}`;
  let expenseTitle = `For the month of ${monthName} ${firstDay.getFullYear()}`;

    firstDay.toISOString().split("T")[0],

    expenseTitle,

  );

    return;

//////////////////////////////////////////////////
// Summary Calculation Engine
//////////////////////////////////////////////////

function calculateSummary(fromDate,toDate,expenseTitle,balanceTitle){

  let balances = {
    Cash: Number(openingBalances.Cash || 0),
    BOB5606: Number(openingBalances.BOB5606 || 0),
    BOB9195: Number(openingBalances.BOB9195 || 0),
    IDBI5391: Number(openingBalances.IDBI5391 || 0)
  };

  let expenses = {
    Personal:0,
    Home:0,
    "Office Reimbursement":0
  };



  transactionsCache.forEach(t=>{

    // Closing Balance calculation (till TO date)
    if(t.date <= toDate){

      if (t.type === "receipt" || t.type === "inflow")
        balances[t.account] += Number(t.amount);

      if (t.type === "payment" || t.type === "outflow")
        balances[t.account] -= Number(t.amount);

      if (t.type === "contra"){
        balances[t.from] -= Number(t.amount);
        balances[t.to] += Number(t.amount);
      }
    }

    // Expense summary (within selected range)
    if(t.date >= fromDate && t.date <= toDate){

      if (t.type === "payment" || t.type === "outflow"){
        expenses[t.category] += Number(t.amount);
      }

    }

  });

let totalBalance = balances.Cash + balances.BOB5606 + balances.BOB9195 + balances.IDBI5391;

let totalExpense = expenses.Personal + expenses.Home + expenses["Office Reimbursement"];

  document.getElementById("closingSummary").innerHTML = `

<div class="summary-title">${balanceTitle}</div>
    <table>
      <tr><th>Account</th><th>Balance</th></tr>
      <tr><td>Cash</td><td> ${balances.Cash}</td></tr>
      <tr><td>BOB5606</td><td> ${balances.BOB5606}</td></tr>
      <tr><td>BOB9195</td><td> ${balances.BOB9195}</td></tr>
      <tr><td>IDBI5391</td><td> ${balances.IDBI5391}</td></tr>
<tr><td><b>Total</b></td><td><b> ${totalBalance}</b></td></tr>
    </table>
  `;

  document.getElementById("expenseSummary").innerHTML = `
 <div class="summary-title">${expenseTitle}</div>
    <table>
      <tr><th>Category</th><th>Total</th></tr>
      <tr><td>Personal</td><td> ${expenses.Personal}</td></tr>
      <tr><td>Home</td><td> ${expenses.Home}</td></tr>
      <tr><td>Office Reimbursement</td><td> ${expenses["Office Reimbursement"]}</td></tr>
<tr><td><b>Total</b></td><td><b> ${totalExpense}</b></td></tr>
    </table>
  `;

renderExpenseChart(
  expenses.Personal,
  expenses.Home,
  expenses["Office Reimbursement"]
);

renderPersonalMonthlySummary();

renderPersonalExpenseChart();

formatAllAmounts();

}



//////////////////////////////////////////////////
// Final Export Function
//////////////////////////////////////////////////


async function exportSummaryExcel(){

//////////////////////////////////////////////////
// GET TITLES
//////////////////////////////////////////////////

let balanceTitle = document.querySelector("#closingSummary .summary-title").innerText;
let expenseTitle = document.querySelector("#expenseSummary .summary-title").innerText;

//////////////////////////////////////////////////
// CREATE WORKBOOK
//////////////////////////////////////////////////

const workbook = new ExcelJS.Workbook();
const sheet = workbook.addWorksheet("Dashboard");

//////////////////////////////////////////////////
// BALANCE TABLE
//////////////////////////////////////////////////

sheet.addRow([balanceTitle]);
sheet.addRow([]);

sheet.addRow(["Account","Balance"]);

document.querySelectorAll("#closingSummary table tr").forEach((row,i)=>{
  if(i===0) return;
  let cells = row.querySelectorAll("td");
  sheet.addRow([cells[0].innerText,cells[1].innerText]);
});

sheet.addRow([]);
sheet.addRow([]);

//////////////////////////////////////////////////
// EXPENSE TABLE
//////////////////////////////////////////////////

sheet.addRow([expenseTitle]);
sheet.addRow([]);

sheet.addRow(["Category","Total"]);

document.querySelectorAll("#expenseSummary table tr").forEach((row,i)=>{
  if(i===0) return;
  let cells = row.querySelectorAll("td");
  sheet.addRow([cells[0].innerText,cells[1].innerText]);
});

sheet.addRow([]);
sheet.addRow([]);

//////////////////////////////////////////////////
// MONTHLY PERSONAL EXPENSE TABLE
//////////////////////////////////////////////////

sheet.addRow(["Monthly Personal Expense"]);
sheet.addRow([]);

document.querySelectorAll("#personalMonthlySummary table tr").forEach((row)=>{
  let cells = row.querySelectorAll("th,td");
  let data = [];
  cells.forEach(c=>data.push(c.innerText));
  sheet.addRow(data);
});

//////////////////////////////////////////////////
// CAPTURE CHART IMAGES

//////////////////////////////////////////////////
// DASHBOARD CALCULATION
//////////////////////////////////////////////////

function calculateDashboard() {

  let balances = {
    Cash: Number(openingBalances.Cash || 0),
    BOB5606: Number(openingBalances.BOB5606 || 0),
    BOB9195: Number(openingBalances.BOB9195 || 0),
    IDBI5391: Number(openingBalances.IDBI5391 || 0)
  };

  let expenses = {
    Personal: 0,
    Home: 0,
    "Office Reimbursement": 0
  };

  transactionsCache.forEach(t => {

    // RECEIPTS
    if (t.type === "receipt" || t.type === "inflow") {
      balances[t.account] += Number(t.amount);
    }

    // PAYMENTS
    if (t.type === "payment" || t.type === "outflow") {
      balances[t.account] -= Number(t.amount);
      expenses[t.category] += Number(t.amount);
    }

    // CONTRA
    if (t.type === "contra") {
      balances[t.from] -= Number(t.amount);
      balances[t.to] += Number(t.amount);
    }

  });

  //////////////////////////////////////////////
  // DISPLAY CLOSING BALANCE
  //////////////////////////////////////////////

  document.getElementById("closingSummary").innerHTML = `
    <table>
      <tr><th>Account</th><th>Balance</th></tr>
      <tr><td>Cash</td><td> ${balances.Cash}</td></tr>
      <tr><td>BOB5606</td><td> ${balances.BOB5606}</td></tr>
      <tr><td>BOB9195</td><td> ${balances.BOB9195}</td></tr>
      <tr><td>IDBI5391</td><td> ${balances.IDBI5391}</td></tr>
    </table>
  `;

  //////////////////////////////////////////////
  // EXPENSE SUMMARY
  //////////////////////////////////////////////

  document.getElementById("expenseSummary").innerHTML = `
    <table>
      <tr><th>Category</th><th>Total</th></tr>
      <tr><td>Personal</td><td> ${expenses.Personal}</td></tr>
      <tr><td>Home</td><td> ${expenses.Home}</td></tr>
      <tr><td>Office Reimbursement</td><td> ${expenses["Office Reimbursement"]}</td></tr>
    </table>
  `;
}

//////////////////////////////////////////////////
// Balance Checker Function
//////////////////////////////////////////////////


function getCurrentBalance(account) {

  let balances = {
    Cash: Number(openingBalances.Cash || 0),
    BOB5606: Number(openingBalances.BOB5606 || 0),
    BOB9195: Number(openingBalances.BOB9195 || 0),
    IDBI5391: Number(openingBalances.IDBI5391 || 0)
  };

  transactionsCache.forEach(t => {

    if (t.type === "receipt" || t.type === "inflow")
      balances[t.account] += Number(t.amount);

    if (t.type === "payment" || t.type === "outflow")
      balances[t.account] -= Number(t.amount);

    if (t.type === "contra") {
      balances[t.from] -= Number(t.amount);
      balances[t.to] += Number(t.amount);
    }

  });

  return balances[account];
}

//////////////////////////////////////////////////
// SAVE RECEIPT
//////////////////////////////////////////////////

async function saveReceipt() {

  let account = document.getElementById("account").value;
  let date = document.getElementById("date").value;
  let narration = document.getElementById("narration").value.trim();
  let amount = Number(document.getElementById("amount").value);

  if (!account || !date || !narration || !amount) {
    alert("All fields are mandatory");
    return;
  }

  if (amount <= 0) {
    alert("Amount must be greater than 0");
    return;
  }

  await db.collection("transactions").add({
    type: "receipt",
    account: account,
    amount: amount,
    date: date,
    narration: narration
  });

  closePopup();
}

//////////////////////////////////////////////////
// SAVE PAYMENT
//////////////////////////////////////////////////

async function savePayment() {

  let account = document.getElementById("account").value;
  let category = document.getElementById("category").value;
  let date = document.getElementById("date").value;
  let narration = document.getElementById("narration").value.trim();
  let amount = Number(document.getElementById("amount").value);

  if (!account || !category || !date || !narration || !amount) {
    alert("All fields are mandatory");
    return;
  }

  if (amount <= 0) {
    alert("Amount must be greater than 0");
    return;
  }

  let balance = getCurrentBalance(account);

  if (balance < amount) {
    alert("Insufficient balance in " + account);
    return;
  }

  await db.collection("transactions").add({
    type: "payment",
    account: account,
    category: category,
    date: date,
    narration: narration,
    amount: amount
  });

  closePopup();
}

//////////////////////////////////////////////////

//////////////////////////////////////////////////

async function updateTransaction(id) {

  let amount = Number(document.getElementById("amount").value);

  if (amount <= 0) {
    alert("Amount must be greater than 0");
    return;
  }

  await db.collection("transactions").doc(id).update({
    account: document.getElementById("account").value,
    date: document.getElementById("date").value,
    narration: document.getElementById("narration").value,
    amount: amount
  });

  closePopup();

  // refresh receipts report automatically
  if(sessionStorage.getItem("currentReport") === "receipts"){
    setTimeout(refreshReceiptsReport,300);
  }

}

//////////////////////////////////////////////////
// GET BALANCE EXCLUDING CURRENT TRANSACTION
//////////////////////////////////////////////////

function getBalanceExcludingTransaction(account, transactionId) {

  let balances = {
    Cash: Number(openingBalances.Cash || 0),
    BOB5606: Number(openingBalances.BOB5606 || 0),
    BOB9195: Number(openingBalances.BOB9195 || 0),
    IDBI5391: Number(openingBalances.IDBI5391 || 0)
  };

  transactionsCache.forEach(t => {

    if (t.id === transactionId) return;

    if (t.type === "receipt" || t.type === "inflow")
      balances[t.account] += Number(t.amount);

    if (t.type === "payment" || t.type === "outflow")
      balances[t.account] -= Number(t.amount);

    if (t.type === "contra") {
      balances[t.from] -= Number(t.amount);
      balances[t.to] += Number(t.amount);
    }

  });

  return balances[account];
}

receipts.forEach((r,i)=>{

.filter(t=>{

let isCategory = t.category === category;

.sort((a,b)=>{

});

payments.forEach((p,i)=>{

p.date,
p.account,

]);

.filter(t=>{

contra.forEach((c,i)=>{

c.date,
c.from,

//////////////////////////////////////////////////

rows.push([]);

{wch:30},
{wch:15}
];

//////////////////////////////////////////////////
// BOLD HEADER STYLE
//////////////////////////////////////////////////

let headerRange = XLSX.utils.decode_range(worksheet["!ref"]);

for(let C = headerRange.s.c; C <= headerRange.e.c; ++C){

let cell = worksheet[XLSX.utils.encode_cell({r:0,c:C})];

if(cell){
cell.s = {
font:{bold:true}
};
}

}

//////////////////////////////////////////////////
// CURRENCY FORMAT
//////////////////////////////////////////////////

for(let i=1;i<rows.length;i++){

if(worksheet[cellRef]){

worksheet[cellRef].s = {

//////////////////////////////////////////////////
// FUNCTION TO CREATE ACCOUNT STATEMENT
//////////////////////////////////////////////////

function createAccountSheet(name){

let sheet = workbook.addWorksheet(name);

sheet.addRow(["Serial No","Date","Type","Category","Particular","Amount","Balance"]);

//////////////////////////////////////////////////
// CALCULATE OPENING BALANCE AS ON FROM DATE
//////////////////////////////////////////////////

let runningBalance = Number(openingBalances[name] || 0);

transactionsCache.forEach(t=>{

if(t.date < fromDate){

if(t.type === "receipt" && t.account === name){
runningBalance += Number(t.amount);
}

if(t.type === "payment" && t.account === name){
runningBalance -= Number(t.amount);
}

if(t.type === "contra"){

if(t.from === name){
runningBalance -= Number(t.amount);
}

if(t.to === name){
runningBalance += Number(t.amount);
}

}

}

});

sheet.addRow(["","", "", "", "Opening Balance","",runningBalance]);

let serial = 1;

transactionsCache
.filter(t=>t.date>=fromDate && t.date<=toDate)
.sort((a,b)=> new Date(a.date) - new Date(b.date))
.forEach(t=>{

let type="";
let category="";
let amount=0;

if(t.type==="receipt" && t.account===name){

type="Inflow";
amount=Number(t.amount);
runningBalance+=amount;

}

if(t.type==="payment" && t.account===name){

type="Outflow";
category=t.category;
amount=Number(t.amount);
runningBalance-=amount;

}

if(t.type==="contra"){

if(t.from===name){
type="Contra";
amount=Number(t.amount);
runningBalance-=amount;
}

if(t.to===name){
type="Contra";
amount=Number(t.amount);
runningBalance+=amount;
}

}

if(type!==""){

let row = sheet.addRow([
serial,
t.date,
type,
category,
t.narration,
amount,
runningBalance
]);

// Format Amount & Balance Columns

row.getCell(6).numFmt = '#,##0.00';
row.getCell(7).numFmt = '#,##0.00';

row.getCell(6).alignment = { horizontal: "right" };
row.getCell(7).alignment = { horizontal: "right" };

//////////////////////////////////////////////////
// COLOR TEXT
//////////////////////////////////////////////////

if(type==="Inflow"){
row.getCell(6).font={color:{argb:"FF008000"}};
}

if(type==="Outflow"){
row.getCell(6).font={color:{argb:"FFFF0000"}};
}

if(type==="Contra"){
row.getCell(6).font={color:{argb:"FF000000"}};
}

serial++;

}

});

sheet.addRow(["","","","","Closing Balance","",runningBalance]);

}

createAccountSheet("Cash");

createAccountSheet("BOB9195");

createAccountSheet("IDBI5391");

//////////////////////////////////////////////////

//////////////////////////////////////////////////

let fileName = `Mini_Statement_${fromDate}_to_${toDate}.xlsx`;

const buffer = await workbook.xlsx.writeBuffer();

saveAs(new Blob([buffer]),fileName);

}
