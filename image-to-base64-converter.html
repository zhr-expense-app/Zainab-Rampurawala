<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Image ↔ Base64 Converter | ZHR Tools</title>

<link rel="icon" href="/favicon.png">
<link rel="stylesheet" href="layout.css">

<script src="https://unpkg.com/lucide@latest"></script>

<style>

body{
background:white;
margin:0;
font-family:'Segoe UI',sans-serif;
}

/* TITLE */

.page-title{
text-align:center;
font-size:30px;
color:#001d4c;
margin-top:50px;
font-weight:700;
}

/* CONTAINER */

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

/* CARD */

.card{
background:#f8f9fb;
padding:30px;
border-radius:12px;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
}

/* TABS */

.tabs{
display:flex;
gap:10px;
justify-content:center;
margin-bottom:20px;
flex-wrap:wrap;
}

.tabs button{
background:#001d4c;
color:white;
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
}

.tabs button.active{
background:#003080;
}

/* TAB CONTENT */

.tab{
display:none;
}

.tab.active{
display:block;
}

/* DROP AREA */

.drop-area{
border:2px dashed #001d4c;
padding:40px;
text-align:center;
border-radius:12px;
cursor:pointer;
background:white;
}

.drop-area:hover{
background:#eef3ff;
}

/* TEXTAREA */

textarea{
width:100%;
height:180px;
padding:12px;
border-radius:8px;
border:1px solid #ccc;
resize:vertical;
}

/* BUTTON */

button.action{
background:#001d4c;
color:white;
border:none;
padding:12px;
margin-top:15px;
border-radius:6px;
cursor:pointer;
width:100%;
}

button.action:hover{
background:#003080;
}

/* PREVIEW */

.preview{
margin-top:20px;
text-align:center;
}

.preview img{
max-width:100%;
border-radius:10px;
}

/* MOBILE */

@media(max-width:768px){
.page-title{
font-size:26px;
}
}

</style>

</head>

<body>

<div id="header"></div>
<div id="sidebar-container"></div>

<h1 class="page-title">Image ↔ Base64 Converter</h1>

<div class="container">

<div class="card">

<!-- TABS -->

<div class="tabs">
<button class="active" onclick="switchTab('imgToBase64', this)">Image → Base64</button>
<button onclick="switchTab('base64ToImg', this)">Base64 → Image</button>
</div>

<!-- IMAGE TO BASE64 -->

<div id="imgToBase64" class="tab active">

<div class="drop-area" id="dropArea">
<p>Click or Drag Image</p>
<input type="file" id="fileInput" hidden>
</div>

<textarea id="base64Output" placeholder="Base64 output will appear here..."></textarea>

<button class="action" onclick="copyBase64()">Copy Base64</button>

</div>

<!-- BASE64 TO IMAGE -->

<div id="base64ToImg" class="tab">

<textarea id="base64Input" placeholder="Paste Base64 string here..."></textarea>

<button class="action" onclick="convertToImage()">Convert to Image</button>

<div class="preview">
<img id="outputImage">
</div>

<button class="action" onclick="downloadImage()">Download Image</button>

</div>

</div>

</div>

<script>

/* TAB SWITCH */

function switchTab(id,btn){

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));

document.getElementById(id).classList.add("active");
btn.classList.add("active");

}

/* IMAGE → BASE64 */

const dropArea = document.getElementById("dropArea");
const fileInput = document.getElementById("fileInput");

dropArea.onclick = ()=>fileInput.click();

fileInput.onchange = e => convertImage(e.target.files[0]);

dropArea.ondrop = e=>{
e.preventDefault();
convertImage(e.dataTransfer.files[0]);
};

dropArea.ondragover = e=>e.preventDefault();

function convertImage(file){

let reader = new FileReader();

reader.onload = function(e){
document.getElementById("base64Output").value = e.target.result;
};

reader.readAsDataURL(file);

}

/* COPY */

function copyBase64(){

let text = document.getElementById("base64Output");

text.select();
document.execCommand("copy");

alert("Copied to clipboard");

}

/* BASE64 → IMAGE */

function convertToImage(){

let base64 = document.getElementById("base64Input").value.trim();

if(!base64.startsWith("data:image")){
alert("Invalid Base64 format");
return;
}

document.getElementById("outputImage").src = base64;

}

/* DOWNLOAD */

function downloadImage(){

let img = document.getElementById("outputImage");

if(!img.src){
alert("No image to download");
return;
}

let link = document.createElement("a");
link.href = img.src;
link.download = "image.png";
link.click();

}

</script>

<script src="layout.js"></script>

</body>
</html>
