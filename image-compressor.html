<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Image Compressor | ZHR Tools</title>

<link rel="icon" href="/favicon.png">
<link rel="stylesheet" href="layout.css">

<script src="https://unpkg.com/lucide@latest"></script>

<style>

body{
font-family:'Segoe UI',sans-serif;

margin:0;
}

/* TITLE */

.page-title{
text-align:center;
font-size:30px;
color:#001d4c;
margin-top:50px;
font-weight:700;
}

/* CONTAINER */

.container{
max-width:900px;
margin:auto;
padding:20px;
}

/* CARD */

.card{
background:#f8f9fb;
padding:30px;
border-radius:10px;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
}

/* DROP AREA */

.drop-area{
border:2px dashed #001d4c;
padding:40px;
text-align:center;
border-radius:10px;
cursor:pointer;
}

.drop-area:hover{
background:#eef3ff;
}

/* IMAGE PREVIEW */

.preview{
margin-top:20px;
text-align:center;
}

.preview img{
max-width:100%;
border-radius:10px;
}

/* OPTIONS */

.options{
margin-top:20px;
}

.options label{
font-weight:600;
}

/* STATS */

.stats{
display:flex;
justify-content:space-between;
margin-top:15px;
font-weight:600;
}

/* BUTTON */

button{
background:#001d4c;
color:white;
border:none;
padding:12px;
width:100%;
margin-top:20px;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<div id="header"></div>
<div id="sidebar-container"></div>

<h1 class="page-title">Image Compressor</h1>

<div class="container">

<div class="card">

<div class="drop-area" id="dropArea">
<p>Drag & Drop Image OR Click to Upload</p>
<input type="file" id="fileInput" hidden>
</div>

<div class="preview">
<img id="previewImage">
</div>

<div class="options">

<label>Compression Quality</label>
<input type="range" id="quality" min="10" max="100" value="70">

<label>Output Format</label>
<select id="format">
<option value="webp">WebP (Best Compression)</option>
<option value="jpeg">JPG (Compatible)</option>
<option value="png">PNG</option>
</select>

</div>

<div class="stats">
<span>Original: <span id="originalSize">0 KB</span></span>
<span>Compressed: <span id="compressedSize">0 KB</span></span>
</div>

<button onclick="compressImage()">Compress & Download</button>

</div>

</div>

<script>

let originalFile;
let compressedData;

/* Upload */

const dropArea = document.getElementById("dropArea");
const fileInput = document.getElementById("fileInput");

dropArea.onclick = () => fileInput.click();

fileInput.onchange = e => loadImage(e.target.files[0]);

dropArea.ondrop = e => {
e.preventDefault();
loadImage(e.dataTransfer.files[0]);
};

dropArea.ondragover = e => e.preventDefault();

/* Load */

function loadImage(file){

originalFile = file;

let reader = new FileReader();

reader.onload = function(e){

document.getElementById("previewImage").src = e.target.result;

document.getElementById("originalSize").innerText =
(file.size/1024).toFixed(1) + " KB";

};

reader.readAsDataURL(file);

}

/* Compress */

function compressImage(){

if(!originalFile){
alert("Upload image first");
return;
}

let quality = document.getElementById("quality").value / 100;
let format = document.getElementById("format").value;

let img = new Image();

img.src = document.getElementById("previewImage").src;

img.onload = function(){

let canvas = document.createElement("canvas");
let ctx = canvas.getContext("2d");

canvas.width = img.width;
canvas.height = img.height;

ctx.drawImage(img,0,0);

let mime = "image/" + format;

compressedData = canvas.toDataURL(mime, quality);

/* Size calc */

let sizeKB = (compressedData.length * 0.75) / 1024;

document.getElementById("compressedSize").innerText =
sizeKB.toFixed(1) + " KB";

/* Download */

let link = document.createElement("a");
link.href = compressedData;
link.download = "compressed." + format;
link.click();

};

}

</script>

<script src="layout.js"></script>

</body>
</html>
