<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Color Picker from Image | ZHR Tools</title>

<link rel="icon" href="/favicon.png">
<link rel="stylesheet" href="layout.css">

<script src="https://unpkg.com/lucide@latest"></script>

<style>

body{
font-family:'Segoe UI',sans-serif;

margin:0;
}

/* TITLE */

.page-title{
text-align:center;
font-size:30px;
color:#001d4c;
margin-top:50px;
font-weight:700;
}

/* CONTAINER */

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

/* CARD */

.card{
background:#f8f9fb;
padding:25px;
border-radius:10px;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
display:flex;
flex-direction:column;
gap:15px;
}

/* DROP AREA */

.drop-area{
border:2px dashed #001d4c;
padding:30px;
text-align:center;
border-radius:10px;
cursor:pointer;
}

/* IMAGE */

.canvas-container{
text-align:center;
position:relative;
}

canvas{
max-width:100%;
border-radius:10px;
cursor:crosshair;
}

/* COLOR PREVIEW */

.color-box{
height:60px;
border-radius:8px;
border:1px solid #ccc;
}

/* INFO */

.color-info{
display:grid;
grid-template-columns:repeat(3, 1fr);
gap:12px; /* spacing between boxes */
margin-top:10px;
}

/* FIX INPUT BOXES */

.color-info input{
width:100%;
padding:10px 14px;
border-radius:8px;
border:1px solid #ccc;
box-sizing:border-box; /* CRITICAL FIX */
font-size:14px;
}

/* BUTTON */

button{
background:#001d4c;
color:white;
border:none;
padding:10px;
border-radius:6px;
cursor:pointer;
}

/* PALETTE */

.palette{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-top:10px;
}

.color-swatch{
width:60px;
height:60px;
border-radius:8px;
cursor:pointer;
border:1px solid #ccc;
}

/* MOBILE */

@media(max-width:768px){
.color-info{
grid-template-columns:1fr;
}
}

</style>

</head>

<body>

<div id="header"></div>
<div id="sidebar-container"></div>

<h1 class="page-title">Color Picker from Image</h1>

<div class="container">

<div class="card">

<!-- UPLOAD -->

<div class="drop-area" onclick="fileInput.click()">
Click or Drag Image Here
<input type="file" id="fileInput" accept="image/*" hidden>
</div>

<!-- CANVAS -->

<div class="canvas-container">
<canvas id="canvas"></canvas>
</div>

<!-- COLOR PREVIEW -->

<div class="color-box" id="colorBox"></div>

<div class="color-info">
<input id="hex" placeholder="HEX">
<input id="rgb" placeholder="RGB">
<input id="hsl" placeholder="HSL">
</div>

<button onclick="copyColor()">Copy HEX</button>

<!-- PALETTE -->

<h3>Color Palette</h3>
<div class="palette" id="palette"></div>

<button onclick="downloadPalette()">Download Palette</button>

</div>

</div>

<script>

let canvas=document.getElementById("canvas");
let ctx=canvas.getContext("2d");

let img=new Image();

fileInput.onchange=e=>{
let file=e.target.files[0];
let reader=new FileReader();

reader.onload=function(ev){
img.onload=function(){
canvas.width=img.width;
canvas.height=img.height;
ctx.drawImage(img,0,0);
generatePalette();
};
img.src=ev.target.result;
};

reader.readAsDataURL(file);
};

/* CLICK PICK */

canvas.addEventListener("click",function(e){

let rect=canvas.getBoundingClientRect();

let x=e.clientX-rect.left;
let y=e.clientY-rect.top;

let pixel=ctx.getImageData(x,y,1,1).data;

let r=pixel[0], g=pixel[1], b=pixel[2];

let hex="#"+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);

let hsl=rgbToHsl(r,g,b);

document.getElementById("colorBox").style.background=hex;
document.getElementById("hex").value=hex;
document.getElementById("rgb").value=`rgb(${r}, ${g}, ${b})`;
document.getElementById("hsl").value=hsl;

});

/* RGB → HSL */

function rgbToHsl(r,g,b){

r/=255; g/=255; b/=255;

let max=Math.max(r,g,b), min=Math.min(r,g,b);
let h,s,l=(max+min)/2;

if(max==min){
h=s=0;
}else{
let d=max-min;
s=l>0.5?d/(2-max-min):d/(max+min);

switch(max){
case r: h=(g-b)/d+(g<b?6:0); break;
case g: h=(b-r)/d+2; break;
case b: h=(r-g)/d+4; break;
}

h/=6;
}

return `hsl(${Math.round(h*360)}, ${Math.round(s*100)}%, ${Math.round(l*100)}%)`;
}

/* COPY */

function copyColor(){
navigator.clipboard.writeText(hex.value);
alert("Copied HEX!");
}

/* PALETTE */

function generatePalette(){

let colors={};

for(let i=0;i<canvas.width;i+=10){
for(let j=0;j<canvas.height;j+=10){

let data=ctx.getImageData(i,j,1,1).data;
let key=`rgb(${data[0]},${data[1]},${data[2]})`;

colors[key]=(colors[key]||0)+1;

}
}

let sorted=Object.entries(colors).sort((a,b)=>b[1]-a[1]).slice(0,8);

let paletteDiv=document.getElementById("palette");
paletteDiv.innerHTML="";

sorted.forEach(c=>{
let div=document.createElement("div");
div.className="color-swatch";
div.style.background=c[0];
div.onclick=()=>navigator.clipboard.writeText(c[0]);
paletteDiv.appendChild(div);
});
}

/* DOWNLOAD */

function downloadPalette(){

let colors=[...document.querySelectorAll(".color-swatch")].map(c=>c.style.background);

let blob=new Blob([colors.join("\n")],{type:"text/plain"});
let link=document.createElement("a");

link.href=URL.createObjectURL(blob);
link.download="palette.txt";
link.click();

}

</script>

<script src="layout.js"></script>

</body>
</html>
