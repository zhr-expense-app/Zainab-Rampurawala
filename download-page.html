<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Download File | ZHR Tools</title>

<link rel="stylesheet" href="layout.css">

<style>

body{
font-family:'Segoe UI',sans-serif;
margin:0;
background:#f4f6fa;
}

/* TITLE */
.page-title{
text-align:center;
font-size:28px;
color:#001d4c;
margin-top:40px;
font-weight:700;
}

/* CONTAINER */
.container{
max-width:600px;
margin:auto;
padding:20px;
}

/* CARD */
.card{
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 8px 25px rgba(0,0,0,0.08);
text-align:center;
}

/* FILE INFO */
.file-name{
font-size:18px;
font-weight:600;
margin-top:10px;
}

.timer{
margin-top:10px;
color:#dc3545;
font-weight:600;
}

/* BUTTON */
button{
background:#001d4c;
color:white;
border:none;
padding:14px;
width:100%;
margin-top:20px;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

/* STATUS */
.status{
margin-top:15px;
font-size:14px;
color:#666;
}

</style>

</head>

<body>

<h1 class="page-title">Secure File Download</h1>

<div class="container">
<div class="card">

<p><b>File Ready to Download</b></p>

<div class="file-name" id="fileName">🔄 Fetching file details...</div>

<div class="timer" id="timer"></div>

<button id="downloadBtn" onclick="downloadFile()">
Download File
</button>

<p class="status">
✔ This file can be downloaded only once<br>
✔ Link expires in 30 minutes
</p>

</div>
</div>

<script>

// GET FILE ID FROM URL
const params = new URLSearchParams(window.location.search);
const fileId = params.get("id");

if (!fileId) {
  document.getElementById("fileName").innerText = "Invalid link";
  document.getElementById("downloadBtn").style.display = "none";
} else {
  loadFile(); // only run if valid
}

// API BASE (CHANGE IF NEEDED)
const API_BASE = "https://zhrconsultants.cahatimrampura.workers.dev";

// LOAD FILE INFO
async function loadFile(){

  try{

    const res = await fetch(`${API_BASE}/file/${fileId}`);

    if(!res.ok){
      document.getElementById("fileName").innerText = "Link expired";
      document.getElementById("downloadBtn").style.display = "none";
      return;
    }

    const data = await res.json();

    const sizeMB = (data.size / (1024 * 1024)).toFixed(2);

document.getElementById("fileName").innerText =
  `${data.fileName} (${sizeMB} MB)`;

    startTimer(data.createdAt);

  }catch(err){
    document.getElementById("fileName").innerText = "Error loading file";
  }
}

// TIMER FUNCTION
function startTimer(createdAt){

  const expiryTime = createdAt + (30 * 60 * 1000);

  const interval = setInterval(() => {

    const now = Date.now();
    const remaining = expiryTime - now;

    if(remaining <= 0){
      clearInterval(interval);
      document.getElementById("timer").innerText = "Link expired";
      document.getElementById("downloadBtn").style.display = "none";
      return;
    }

    const minutes = Math.floor(remaining / 60000);
    const seconds = Math.floor((remaining % 60000) / 1000);

    document.getElementById("timer").innerText =
      `Expires in: ${minutes}:${seconds.toString().padStart(2,'0')}`;

  }, 1000);
}

// DOWNLOAD FUNCTION
function downloadFile(){
  const btn = document.getElementById("downloadBtn");
  btn.innerText = "Downloading...";
  btn.disabled = true;

  window.location.href = `${API_BASE}/download/${fileId}`;
}



</script>

</body>
</html>
