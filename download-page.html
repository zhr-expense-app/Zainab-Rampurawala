<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Download File | ZHR Tools</title>

  <link rel="icon" href="/favicon.png" type="image/png"> 

<link rel="stylesheet" href="layout.css">
  <script src="https://unpkg.com/lucide@latest"></script>

<style>

body{
font-family:'Segoe UI',sans-serif;
margin:0;
}

/* TITLE */
.page-title{
text-align:center;
font-size:30px;
color:#001d4c;
margin-top:50px;
font-weight:700;
}

/* CONTAINER */
.container{
max-width:800px;
margin:auto;
padding:20px;
}

/* CARD */
.card{
background:#f8f9fb;
padding:30px;
border-radius:12px;
box-shadow:0 8px 25px rgba(0,0,0,0.08);
  text-align:center;
}

/* FILE INFO */
.file-name{
  font-size:18px;
  font-weight:600;
  margin-top:10px;
  text-align:center;
  word-break:break-word;
  overflow-wrap:anywhere;
  white-space:normal;
  max-width:100%;
  line-height:1.4;
}

.timer{
margin-top:10px;
color:#dc3545;
font-weight:600;
}

.timer-box{
  margin-top:15px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  background:#fff3f3;
  border:1px solid #ffd6d6;
  color:#dc3545;
  padding:12px 18px;
  border-radius:10px;
  width:fit-content;
  margin-left:auto;
  margin-right:auto;
  font-weight:600;
  font-size:15px;
}

.timer-clock{
  width:18px;
  height:18px;
}
  

/* BUTTON */
button{
background:#001d4c;
color:white;
border:none;
padding:14px;
width:auto;
margin-top:20px;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

/* STATUS */
.status{
margin-top:15px;
font-size:14px;
color:#666;
}

  

</style>

</head>

<body>

<div id="header"></div>
<div id="sidebar-container"></div>

<h1 class="page-title">Secure File Download</h1>

<div class="container">
<div class="card">

<p style="text-align:center; color:#666; font-size:14px;">
  🔐 End-to-end encrypted file transfer
</p>

<!-- FILE ICON -->
<div style="text-align:center; margin:20px 0;">
  <i
    id="fileIcon"
    data-lucide="file"
    style="width:48px;height:48px;color:#001d4c;"
  ></i>
</div>

<!-- FILE NAME -->
<div class="file-name" id="fileName">
  Fetching file details...
</div>

<!-- TIMER -->
<div class="timer-box">
  <i data-lucide="clock-3" class="timer-clock"></i>
  <span id="timer">30:00</span>
</div>
<!-- DOWNLOAD BUTTON -->
<div style="display:flex; justify-content:center;">

<button
  id="downloadBtn"
  onclick="downloadFile()"
  style="
    width:220px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
  "
>

<i data-lucide="download"></i>
Download File

</button>

</div>

<p class="status">
✔ This file can be downloaded only once<br>
✔ Link expires automatically after 30 minutes
</p>

<p style="
margin-top:20px;
font-size:13px;
color:#888;
text-align:center;
">
  Powered by <b>ZHR Consultants</b>
</p>

</div>
</div>

<!-- LAYOUT -->
<script src="layout.js"></script>

<script>

document.addEventListener("DOMContentLoaded", function(){

  // LOAD SIDEBAR + HEADER
  if(typeof loadLayout === "function"){
    loadLayout();
  }

  // LOAD LUCIDE ICONS
  lucide.createIcons();

  // GET FILE ID
  const params = new URLSearchParams(window.location.search);
  const fileId = params.get("id");

  // INVALID LINK
  if(!fileId){

    document.getElementById("fileName").innerText =
      "Invalid link";

    document.getElementById("downloadBtn").style.display =
      "none";

    return;
  }

  // API BASE
  const API_BASE =
    "https://zhrconsultants.cahatimrampura.workers.dev";

  // LOAD FILE DETAILS
  async function loadFile(){

    try{

      const res =
        await fetch(`${API_BASE}/file/${fileId}`);

      // LINK EXPIRED
      if(!res.ok){

        document.getElementById("fileName").innerText =
          "Link expired";

        document.getElementById("downloadBtn").style.display =
          "none";

        return;
      }

      const data = await res.json();

      // FILE NAME
      const name = data.fileName || "File";

      // FILE EXTENSION
const extension =
  name.split(".").pop().toLowerCase();

// ICON MAP
const iconMap = {

  // DOCUMENTS
  pdf: "file-text",
  doc: "file-text",
  docx: "file-text",
  txt: "file-text",
  rtf: "file-text",
  csv: "file-spreadsheet",

  // EXCEL
  xls: "file-spreadsheet",
  xlsx: "file-spreadsheet",
  ods: "file-spreadsheet",

  // PRESENTATION
  ppt: "presentation",
  pptx: "presentation",
  odp: "presentation",

  // IMAGES
  jpg: "image",
  jpeg: "image",
  png: "image",
  gif: "image",
  webp: "image",
  svg: "image",
  bmp: "image",
  heic: "image",

  // VIDEO
  mp4: "film",
  mov: "film",
  avi: "film",
  mkv: "film",
  webm: "film",

  // AUDIO
  mp3: "music",
  wav: "music",
  aac: "music",
  m4a: "music",
  ogg: "music",

  // ARCHIVES
  zip: "archive",
  rar: "archive",
  "7z": "archive",
  tar: "archive",
  gz: "archive",

  // DESIGN
  psd: "palette",
  ai: "palette",
  fig: "figma",
  xd: "pen-tool",
  sketch: "pen-tool"
};

// DEFAULT ICON
const iconName =
  iconMap[extension] || "file";

// UPDATE ICON
document
  .getElementById("fileIcon")
  .setAttribute("data-lucide", iconName);

// REFRESH ICON
lucide.createIcons();

      // FILE SIZE
      const size = data.size
        ? (data.size / (1024 * 1024)).toFixed(2)
        : null;

      // SHOW NAME + SIZE
      document.getElementById("fileName").innerText =
        size
          ? `${name} (${size} MB)`
          : name;

      // START TIMER
      startTimer(data.createdAt);

    }catch(err){

      console.error(err);

      document.getElementById("fileName").innerText =
        "Unable to load file";

      document.getElementById("downloadBtn").style.display =
        "none";
    }
  }

  // TIMER FUNCTION
  function startTimer(createdAt){

  // 30 mins expiry
  const expiryTime =
    Number(createdAt) + (30 * 60 * 1000);

  const timerEl =
    document.getElementById("timer");

  const downloadBtn =
    document.getElementById("downloadBtn");

  function updateTimer(){

    const now = Date.now();

    const remaining =
      expiryTime - now;

    // EXPIRED
    if(remaining <= 0){

      timerEl.innerText = "Expired";

      downloadBtn.disabled = true;

      downloadBtn.innerHTML = `
        Link Expired
      `;

      return;
    }

    // MINUTES
    const minutes =
      Math.floor(remaining / 60000);

    // SECONDS
    const seconds =
      Math.floor((remaining % 60000) / 1000);

    // FORMAT
    timerEl.innerText =
      `${minutes}:${seconds
        .toString()
        .padStart(2, '0')}`;

  }

  // RUN IMMEDIATELY
  updateTimer();

  // UPDATE EVERY SECOND
  setInterval(updateTimer, 1000);
}

  // DOWNLOAD FUNCTION
  window.downloadFile = function(){

    const btn =
      document.getElementById("downloadBtn");

    btn.innerHTML = `
      <i data-lucide="loader" class="spin"></i>
      Downloading...
    `;

    btn.disabled = true;

    lucide.createIcons();

    window.location.href =
      `${API_BASE}/download/${fileId}`;
  }

  // LOAD FILE
  loadFile();

});

</script>

</body>
</html>
