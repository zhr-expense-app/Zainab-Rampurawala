<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BMI Weight Range Calculator | ZHR Tools</title>

<link rel="icon" href="/favicon.png" type="image/png">  
<link rel="stylesheet" href="layout.css">

<script src="https://unpkg.com/lucide@latest"></script>
<style>

body{
font-family:'Segoe UI',sans-serif;
background:white;
margin:0;
}



/* TITLE */

.page-title{
text-align:center;
font-size:30px;
color:#001d4c;
margin:30px 0;
font-weight:700;
}

/* CONTAINER */

.container{
max-width:700px;
margin:auto;
padding:20px;
}

/* CARD */

.card{
background:#f8f9fb;
padding:30px;
border-radius:10px;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
}

/* ROW LAYOUT */

.form-row{
display:flex;
align-items:center;
margin-top:18px;
gap:15px;
}

/* LABEL */

.form-row label{
width:160px;
font-weight:500;
}

/* INPUT GROUP */

.input-group{
display:flex;
gap:10px;
flex:1;
}

/* INPUT */

input,select{
padding:10px;
font-size:16px;
border-radius:6px;
border:1px solid #ccc;
}

/* AGE INPUT */

.age-input{
width:120px;
}

/* HEIGHT INPUTS */

.height-input{
width:100px;
}

/* WEIGHT INPUT */

.weight-input{
width:150px;
}

/* SELECT */

select{
width:160px;
}

/* BUTTON */

button{
background:#001d4c;
color:white;
border:none;
padding:14px;
width:100%;
margin-top:25px;
font-size:18px;
border-radius:6px;
cursor:pointer;
}

/* RESULT */

.result{
margin-top:25px;
background:white;
padding:20px;
border-left:5px solid #001d4c;
border-radius:6px;
}

/* RANGE BAR */

.range-bar{
margin-top:20px;
height:25px;
background:linear-gradient(
to right,
#4da3ff 0%,
#4da3ff 25%,
#4caf50 25%,
#4caf50 50%,
#ffc107 50%,
#ffc107 75%,
#f44336 75%
);
border-radius:10px;
position:relative;
}

.marker{
position:absolute;
top:-5px;
width:4px;
height:35px;
background:black;
}

/* MOBILE */

@media(max-width:768px){

.form-row{
flex-direction:column;
align-items:flex-start;
}

.form-row label{
width:auto;
}

.input-group{
width:100%;
}

}

</style>

</head>

<body>

  <div id="header"></div>

<div id="sidebar-container"></div>

<div class="logo-header">
<img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEg-FrquxVNT6X8mePEZk64LLCgRVikX9PnuPOSqK4CKoL9-r2wGHbx1zt7_q-6dlITZ4wfQSnuXLkJDvq8DxSnruDo6wE-kEBY86sLYgJTe8WMxIQN3y4ah6Ffc2As2_z4rGs3cxyBAr3ik-S-GYA6MIm4F4p74-43WT3s573TJoXgdDRPBT1UEP1Q1EFY/s1920/1736676952-picsayjdndnndnd.jpg">
</div>

<h1 class="page-title">BMI Healthy Weight Range Calculator</h1>

<div class="container">

<div class="card">

<!-- AGE -->

<div class="form-row">
<label>Age</label>
<input type="number" id="age" class="age-input" value="28">
</div>

<!-- HEIGHT -->

<div class="form-row">
<label>Height</label>

<div class="input-group">
<input type="number" id="feet" class="height-input" placeholder="Feet">
<input type="number" id="inches" class="height-input" placeholder="Inches">
</div>

</div>

<!-- WEIGHT -->

<div class="form-row">
<label>Current Weight</label>

<div class="input-group">
<input type="number" id="weight" class="weight-input">
<select id="unit">
<option value="kg">Kilograms (kg)</option>
<option value="lbs">Pounds (lbs)</option>
</select>
</div>

</div>

<button onclick="calculateBMI()">Calculate</button>

<div class="result" id="result" style="display:none">

<h3>Healthy Weight Range</h3>

<p id="kgRange"></p>
<p id="lbRange"></p>

<h3>Your Status</h3>

<p id="status"></p>

<div class="range-bar">
<div class="marker" id="marker"></div>
</div>

</div>

</div>

</div>

<script>

function calculateBMI(){

let feet=parseFloat(document.getElementById("feet").value);
let inches=parseFloat(document.getElementById("inches").value)||0;

let weight=parseFloat(document.getElementById("weight").value);
let unit=document.getElementById("unit").value;

if(!feet || !weight){
alert("Please enter height and weight");
return;
}

/* height convert */

let totalInches=(feet*12)+inches;
let heightMeters=totalInches*0.0254;

/* weight convert */

let weightKg=weight;

if(unit==="lbs"){
weightKg=weight*0.453592;
}

/* bmi */

let bmi=weightKg/(heightMeters*heightMeters);

/* healthy range */

let minWeight=18.5*(heightMeters*heightMeters);
let maxWeight=24.9*(heightMeters*heightMeters);

/* pounds */

let minLb=minWeight*2.20462;
let maxLb=maxWeight*2.20462;

/* status */

let status="";

if(weightKg<minWeight){
status="Underweight";
}
else if(weightKg<=maxWeight){
status="Healthy Weight";
}
else{
status="Overweight";
}

/* display */

document.getElementById("kgRange").innerHTML=
"Healthy Range: "+minWeight.toFixed(1)+" kg – "+maxWeight.toFixed(1)+" kg";

document.getElementById("lbRange").innerHTML=
"Healthy Range: "+minLb.toFixed(1)+" lbs – "+maxLb.toFixed(1)+" lbs";

document.getElementById("status").innerHTML=status;

/* marker */

let position=(weightKg/(maxWeight*1.5))*100;

if(position>100)position=100;

document.getElementById("marker").style.left=position+"%";

document.getElementById("result").style.display="block";

}

</script>
<script src="layout.js"></script>
  
</body>
</html>
