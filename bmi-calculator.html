<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BMI Weight Range Calculator | ZHR Tools</title>

<style>

body{
font-family:'Segoe UI',sans-serif;
background:white;
margin:0;
}

/* HEADER */

.logo-header{
position:sticky;
top:0;
z-index:1000;
background:white;
text-align:center;
padding:15px 5px 10px;
}

.logo-header img{
max-width:400px;
height:50px;
}

/* TITLE */

.page-title{
text-align:center;
font-size:30px;
color:#001d4c;
margin:30px 0;
font-weight:700;
}

/* CONTAINER */

.container{
max-width:900px;
margin:auto;
padding:20px;
}

/* CARD */

.card{
background:#f8f9fb;
padding:30px;
border-radius:10px;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
}

/* LABEL */

label{
display:block;
margin-top:18px;
margin-bottom:6px;
font-weight:500;
}

/* INPUT */

input,select{
width:100%;
padding:12px;
font-size:16px;
border-radius:6px;
border:1px solid #ccc;
}

/* HEIGHT GRID */

.height-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

/* WEIGHT GRID */

.weight-grid{
display:grid;
grid-template-columns:2fr 1fr;
gap:15px;
}

/* BUTTON */

button{
background:#001d4c;
color:white;
border:none;
padding:14px;
width:100%;
margin-top:20px;
font-size:18px;
border-radius:6px;
cursor:pointer;
}

/* RESULT */

.result{
margin-top:25px;
background:white;
padding:20px;
border-left:5px solid #001d4c;
border-radius:6px;
}

.result h3{
margin-top:0;
color:#001d4c;
}

/* BMI RANGE BAR */

.range-bar{
margin-top:20px;
height:25px;
background:linear-gradient(
to right,
#4da3ff 0%,
#4da3ff 25%,
#4caf50 25%,
#4caf50 50%,
#ffc107 50%,
#ffc107 75%,
#f44336 75%
);
border-radius:10px;
position:relative;
}

/* MARKER */

.marker{
position:absolute;
top:-5px;
width:4px;
height:35px;
background:black;
}

/* MOBILE */

@media(max-width:768px){

.height-grid{
grid-template-columns:1fr;
}

.weight-grid{
grid-template-columns:1fr;
}

.page-title{
font-size:26px;
}

}

</style>

</head>

<body>

<div class="logo-header">
<img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEg-FrquxVNT6X8mePEZk64LLCgRVikX9PnuPOSqK4CKoL9-r2wGHbx1zt7_q-6dlITZ4wfQSnuXLkJDvq8DxSnruDo6wE-kEBY86sLYgJTe8WMxIQN3y4ah6Ffc2As2_z4rGs3cxyBAr3ik-S-GYA6MIm4F4p74-43WT3s573TJoXgdDRPBT1UEP1Q1EFY/s1920/1736676952-picsayjdndnndnd.jpg">
</div>

<h1 class="page-title">BMI Healthy Weight Range Calculator</h1>

<div class="container">

<div class="card">

<label>Age</label>
<input type="number" id="age" placeholder="Enter Age">

<label>Height</label>

<div class="height-grid">
<input type="number" id="feet" placeholder="Feet">
<input type="number" id="inches" placeholder="Inches">
</div>

<label>Current Weight</label>

<div class="weight-grid">
<input type="number" id="weight" placeholder="Enter Weight">
<select id="unit">
<option value="kg">Kilograms (kg)</option>
<option value="lbs">Pounds (lbs)</option>
</select>
</div>

<button onclick="calculateBMI()">Calculate</button>

<div class="result" id="result" style="display:none">

<h3>Healthy Weight Range</h3>
<p id="kgRange"></p>
<p id="lbRange"></p>

<h3>Your Status</h3>
<p id="status"></p>

<div class="range-bar">
<div class="marker" id="marker"></div>
</div>

</div>

</div>

</div>

<script>

function calculateBMI(){

let feet=parseFloat(document.getElementById("feet").value);
let inches=parseFloat(document.getElementById("inches").value)||0;

let weight=parseFloat(document.getElementById("weight").value);
let unit=document.getElementById("unit").value;

if(!feet || !weight){
alert("Please enter height and weight");
return;
}

/* Convert height */

let totalInches=(feet*12)+inches;
let heightMeters=totalInches*0.0254;

/* Convert weight */

let weightKg=weight;

if(unit==="lbs"){
weightKg=weight*0.453592;
}

/* BMI */

let bmi=weightKg/(heightMeters*heightMeters);

/* Healthy range */

let minWeight=18.5*(heightMeters*heightMeters);
let maxWeight=24.9*(heightMeters*heightMeters);

/* Convert to pounds */

let minLb=minWeight*2.20462;
let maxLb=maxWeight*2.20462;

/* Status */

let status="";

if(weightKg<minWeight){
status="Underweight";
}
else if(weightKg<=maxWeight){
status="Healthy Weight";
}
else{
status="Overweight";
}

/* Display ranges */

document.getElementById("kgRange").innerHTML=
"Healthy Range: "+minWeight.toFixed(1)+" kg – "+maxWeight.toFixed(1)+" kg";

document.getElementById("lbRange").innerHTML=
"Healthy Range: "+minLb.toFixed(1)+" lbs – "+maxLb.toFixed(1)+" lbs";

document.getElementById("status").innerHTML=status;

/* Marker position */

let position=(weightKg/(maxWeight*1.5))*100;

if(position>100)position=100;

document.getElementById("marker").style.left=position+"%";

document.getElementById("result").style.display="block";

}

</script>

</body>
</html>
