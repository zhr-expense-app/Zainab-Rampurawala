<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>QR Code Generator | ZHR Tools</title>

<link rel="icon" href="/favicon.png">
<link rel="stylesheet" href="layout.css">

<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{background:white;}

.page-title{
text-align:center;
font-size:30px;
color:#001d4c;
margin-top:50px;
font-weight:700;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.tabs{
display:flex;
flex-wrap:wrap;
gap:10px;
justify-content:center;
margin-bottom:20px;
}

.tabs button{
background:#001d4c;
color:white;
border:none;
padding:10px 15px;
border-radius:5px;
cursor:pointer;
}

.tab-content{
display:none;
background:#f8f9fb;
padding:25px;
border-radius:8px;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
}

.tab-content.active{display:block;}

input, textarea, select{
width:100%;
padding:10px;
margin-top:10px;
border-radius:5px;
border:1px solid #ccc;
}

.generate-btn{
background:#001d4c;
color:white;
border:none;
padding:12px;
margin-top:15px;
border-radius:6px;
cursor:pointer;
width:100%;
}

.output{text-align:center;margin-top:25px;}

.download-buttons{
margin-top:15px;
display:flex;
gap:10px;
justify-content:center;
}

.download-buttons button{
background:#001d4c;
color:white;
border:none;
padding:10px;
border-radius:5px;
cursor:pointer;
}

</style>
</head>

<body>

<div id="header"></div>
<div id="sidebar-container"></div>

<h1 class="page-title">QR Code Generator</h1>

<div class="container">

<div class="tabs">
<button onclick="switchTab('text')">Text</button>
<button onclick="switchTab('url')">URL</button>
<button onclick="switchTab('vcard')">vCard</button>
<button onclick="switchTab('social')">Social</button>
<button onclick="switchTab('email')">Email</button>
<button onclick="switchTab('maps')">Maps</button>
</div>

<!-- TEXT -->
<div id="text" class="tab-content active">
<textarea id="textInput" placeholder="Enter text"></textarea>
<button class="generate-btn" onclick="generateQR(textInput.value)">Generate QR</button>
</div>

<!-- URL -->
<div id="url" class="tab-content">
<input id="urlInput" placeholder="Enter URL">
<button class="generate-btn" onclick="generateQR(urlInput.value)">Generate QR</button>
</div>

<!-- VCARD -->
<div id="vcard" class="tab-content">
<input id="vc_name" placeholder="Full Name">
<input id="vc_phone" placeholder="Phone">
<input id="vc_email" placeholder="Email">
<input id="vc_company" placeholder="Company">
<input id="vc_website" placeholder="Website">
<button class="generate-btn" onclick="generateVCard()">Generate QR</button>
</div>

<!-- SOCIAL -->
<div id="social" class="tab-content">
<select id="socialType">
<option value="instagram">Instagram</option>
<option value="whatsapp">WhatsApp</option>
<option value="linkedin">LinkedIn</option>
</select>

<input id="socialInput" placeholder="Enter username / number / URL">

<button class="generate-btn" onclick="generateSocial()">Generate QR</button>
</div>

<!-- EMAIL -->
<div id="email" class="tab-content">
<input id="emailTo" placeholder="Email Address">
<input id="subject" placeholder="Subject">
<textarea id="bodyMail" placeholder="Email Body"></textarea>
<button class="generate-btn" onclick="generateEmail()">Generate QR</button>
</div>

<!-- MAP -->
<div id="maps" class="tab-content">
<input id="location" placeholder="Enter location or paste Google Maps link">
<button class="generate-btn" onclick="generateMap()">Generate QR</button>
</div>

<div class="output">
<div id="qrcode"></div>

<div class="download-buttons">
<button onclick="downloadPNG()">Download PNG</button>
<button onclick="downloadPDF()">Download PDF</button>
</div>

</div>

</div>

<script>

/* SWITCH TAB + RESET QR */

function switchTab(tab){
document.querySelectorAll(".tab-content").forEach(el=>el.classList.remove("active"))
document.getElementById(tab).classList.add("active")
document.getElementById("qrcode").innerHTML=""
}

/* GENERATE QR */

function generateQR(data){
document.getElementById("qrcode").innerHTML=""
new QRCode(document.getElementById("qrcode"),{
text:data,
width:220,
height:220
})
}

/* VCARD */

function generateVCard(){

let name=document.getElementById("vc_name").value;
let phone=document.getElementById("vc_phone").value;
let email=document.getElementById("vc_email").value;
let company=document.getElementById("vc_company").value;
let website=document.getElementById("vc_website").value;

let data=`BEGIN:VCARD
VERSION:3.0
FN:${name}
TEL:${phone}
EMAIL:${email}
ORG:${company}
URL:${website}
END:VCARD`;

generateQR(data);
}

/* SOCIAL */

function generateSocial(){

let type=document.getElementById("socialType").value;
let input=document.getElementById("socialInput").value;

let url="";

if(type==="instagram"){
url="https://instagram.com/"+input;
}
else if(type==="whatsapp"){
url="https://wa.me/"+input;
}
else if(type==="linkedin"){
url=input;
}

generateQR(url);
}

/* EMAIL */

function generateEmail(){

let data=`mailto:${emailTo.value}?subject=${subject.value}&body=${bodyMail.value}`;
generateQR(data);
}

/* MAP */

function generateMap(){

let loc=document.getElementById("location").value;

let url = loc.includes("http") 
? loc 
: "https://www.google.com/maps/search/?api=1&query="+encodeURIComponent(loc);

generateQR(url);
}

/* DOWNLOAD PNG */

function downloadPNG(){

let canvas=document.querySelector("#qrcode canvas");

if(!canvas){ alert("Generate QR first"); return; }

let link=document.createElement("a");
link.download="qr-code.png";
link.href=canvas.toDataURL("image/png");
link.click();
}

/* DOWNLOAD PDF */

function downloadPDF(){

const { jsPDF } = window.jspdf;

let canvas=document.querySelector("#qrcode canvas");

if(!canvas){ alert("Generate QR first"); return; }

let img=canvas.toDataURL("image/png");

let pdf=new jsPDF();
pdf.addImage(img,'PNG',50,40,100,100);
pdf.save("qr-code.pdf");
}

</script>

<script src="layout.js"></script>

</body>
</html>
