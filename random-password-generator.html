<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Password Generator | ZHR Tools</title>

<link rel="icon" href="/favicon.png">
<link rel="stylesheet" href="layout.css">

<script src="https://unpkg.com/lucide@latest"></script>

<style>

body{
font-family:'Segoe UI',sans-serif;

margin:0;
}

/* TITLE */

.page-title{
text-align:center;
font-size:30px;
color:#001d4c;
margin-top:50px;
font-weight:700;
}

/* CONTAINER */

.container{
max-width:900px;
margin:auto;
padding:20px;
}

/* CARD */

.card{
background:#f8f9fb;
padding:30px;
border-radius:10px;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
display:flex;
flex-direction:column;
gap:15px;
}

/* INPUT */

input, select{
padding:10px;
border-radius:6px;
border:1px solid #ccc;
width:100%;
}

/* CHECKBOX */

.options{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}

.options label{
display:flex;
gap:8px;
align-items:center;
}

/* BUTTON */

button{
background:#001d4c;
color:white;
border:none;
padding:12px;
border-radius:6px;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

/* OUTPUT */

.output{
background:white;
padding:15px;
border-left:5px solid #001d4c;
border-radius:6px;
word-break:break-all;
}

/* STRENGTH */

.strength{
font-weight:600;
}

/* MULTI LIST */

.password-list{
margin-top:10px;
}

.password-item{
background:white;
padding:10px;
margin-top:5px;
border-radius:6px;
border-left:4px solid #001d4c;
font-family:monospace;
}

/* MOBILE */

@media(max-width:768px){
.options{
grid-template-columns:1fr;
}
}

</style>

</head>

<body>

<div id="header"></div>
<div id="sidebar-container"></div>

<h1 class="page-title">Random Password Generator</h1>

<div class="container">

<div class="card">

<label>Password Length: <b id="lengthVal">12</b></label>
<input type="range" min="4" max="50" value="12" id="lengthSlider">

<div class="options">

<label><input type="checkbox" id="uppercase" checked> Uppercase (A-Z)</label>
<label><input type="checkbox" id="lowercase" checked> Lowercase (a-z)</label>
<label><input type="checkbox" id="numbers" checked> Numbers (0-9)</label>
<label><input type="checkbox" id="symbols"> Symbols (!@#)</label>
<label><input type="checkbox" id="avoidSimilar"> Avoid Similar Characters</label>

</div>

<label>Exclude Characters (optional)</label>
<input type="text" id="excludeChars" placeholder="e.g. abc123">

<button onclick="generatePassword()">Generate Password</button>

<div class="output" id="passwordOutput">Your password will appear here</div>

<div class="strength" id="strength"></div>

<button onclick="copyPassword()">Copy Password</button>

<hr>

<label>Generate Multiple Passwords</label>
<input type="number" id="multiCount" value="5" min="1" max="20">

<button onclick="generateMultiple()">Generate List</button>

<div class="password-list" id="passwordList"></div>

</div>

</div>

<script>

const upper="ABCDEFGHIJKLMNOPQRSTUVWXYZ";
const lower="abcdefghijklmnopqrstuvwxyz";
const nums="0123456789";
const symbols="!@#$%^&*()_+[]{}<>?/";

const similar="il1Lo0O";

document.getElementById("lengthSlider").oninput=function(){
document.getElementById("lengthVal").innerText=this.value;
};

function getCharset(){

let charset="";

if(uppercase.checked) charset+=upper;
if(lowercase.checked) charset+=lower;
if(numbers.checked) charset+=nums;
if(symbols.checked) charset+=symbols;

if(avoidSimilar.checked){
charset=charset.split('').filter(c=>!similar.includes(c)).join('');
}

let exclude=document.getElementById("excludeChars").value;

if(exclude){
charset=charset.split('').filter(c=>!exclude.includes(c)).join('');
}

return charset;
}

function generatePassword(){

let length=parseInt(lengthSlider.value);
let charset=getCharset();

if(!charset){
alert("Select at least one option");
return;
}

let password="";

for(let i=0;i<length;i++){
password+=charset[Math.floor(Math.random()*charset.length)];
}

passwordOutput.innerText=password;

checkStrength(password);
}

function checkStrength(pw){

let strengthText="Weak";

if(pw.length>10 && /[A-Z]/.test(pw) && /[0-9]/.test(pw) && /[^A-Za-z0-9]/.test(pw)){
strengthText="Strong";
}
else if(pw.length>=8){
strengthText="Medium";
}

strength.innerText="Strength: "+strengthText;
}

function copyPassword(){

let text=passwordOutput.innerText;

navigator.clipboard.writeText(text);

alert("Copied!");
}

function generateMultiple(){

let count=parseInt(document.getElementById("multiCount").value);
let container=document.getElementById("passwordList");

container.innerHTML="";

for(let i=0;i<count;i++){

generatePassword();

let pw=passwordOutput.innerText;

let div=document.createElement("div");
div.className="password-item";
div.innerText=pw;

container.appendChild(div);
}
}

</script>

<script src="layout.js"></script>

</body>
</html>
