<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Image Compressor | ZHR Tools</title>

<link rel="icon" href="/favicon.png" type="image/png">

<style>

body{
font-family:'Segoe UI',sans-serif;
background:white;
margin:0;
}

/* HEADER */

.logo-header{
position:sticky;
top:0;
z-index:1000;
background:white;
text-align:center;
padding:15px 5px 10px;
}

.logo-header img{
max-width:400px;
height:50px;
}

/* TITLE */

.page-title{
text-align:center;
font-size:30px;
color:#001d4c;
margin:30px 0;
font-weight:700;
}

/* CONTAINER */

.container{
max-width:900px;
margin:auto;
padding:20px;
}

/* CARD */

.card{
background:#f8f9fb;
padding:30px;
border-radius:12px;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
text-align:center;
}

/* DROP AREA */

.drop-area{
border:2px dashed #001d4c;
padding:40px;
border-radius:10px;
background:white;
cursor:pointer;
}

.drop-area:hover{
background:#f0f3ff;
}

/* PREVIEW */

.preview{
margin-top:20px;
}

.preview img{
max-width:100%;
border-radius:8px;
}

/* SLIDER */

.slider{
margin-top:20px;
}

input[type=range]{
width:100%;
}

/* BUTTON */

button{
background:#001d4c;
color:white;
border:none;
padding:14px 20px;
font-size:16px;
border-radius:6px;
cursor:pointer;
margin-top:15px;
}

/* STATS */

.stats{
margin-top:20px;
font-weight:500;
color:#001d4c;
}

@media(max-width:768px){

.page-title{
font-size:26px;
}

}

</style>

</head>

<body>

<div class="logo-header">
<img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEg-FrquxVNT6X8mePEZk64LLCgRVikX9PnuPOSqK4CKoL9-r2wGHbx1zt7_q-6dlITZ4wfQSnuXLkJDvq8DxSnruDo6wE-kEBY86sLYgJTe8WMxIQN3y4ah6Ffc2As2_z4rGs3cxyBAr3ik-S-GYA6MIm4F4p74-43WT3s573TJoXgdDRPBT1UEP1Q1EFY/s1920/1736676952-picsayjdndnndnd.jpg">
</div>

<h1 class="page-title">Image Compressor</h1>

<div class="container">

<div class="card">

<div class="drop-area" id="dropArea">

<p>Drag & Drop Image Here</p>
<p>or Click to Upload</p>

<input type="file" id="imageInput" accept="image/*" hidden>

</div>

<div class="preview" id="preview"></div>

<div class="slider">

<label>Compression Quality</label>

<input type="range" id="quality" min="0.1" max="1" step="0.1" value="0.7">

</div>

<button onclick="compressImage()">Compress Image</button>

<div class="stats" id="stats"></div>

<button id="downloadBtn" style="display:none">Download Image</button>

</div>

</div>

<script>

let imageInput=document.getElementById("imageInput")
let dropArea=document.getElementById("dropArea")
let preview=document.getElementById("preview")
let stats=document.getElementById("stats")
let downloadBtn=document.getElementById("downloadBtn")

let originalFile
let compressedBlob

dropArea.onclick=()=>imageInput.click()

imageInput.onchange=e=>{
handleFile(e.target.files[0])
}

dropArea.addEventListener("dragover",e=>{
e.preventDefault()
})

dropArea.addEventListener("drop",e=>{
e.preventDefault()
handleFile(e.dataTransfer.files[0])
})

function handleFile(file){

if(!file.type.startsWith("image"))return

originalFile=file

let img=document.createElement("img")

img.src=URL.createObjectURL(file)

preview.innerHTML=""
preview.appendChild(img)

stats.innerHTML="Original Size: "+(file.size/1024).toFixed(2)+" KB"

}

function compressImage(){

if(!originalFile)return

let quality=document.getElementById("quality").value

let img=new Image()

img.src=URL.createObjectURL(originalFile)

img.onload=function(){

let canvas=document.createElement("canvas")
let ctx=canvas.getContext("2d")

canvas.width=img.width
canvas.height=img.height

ctx.drawImage(img,0,0)

canvas.toBlob(function(blob){

compressedBlob=blob

let compressedSize=(blob.size/1024).toFixed(2)

let originalSize=(originalFile.size/1024).toFixed(2)

stats.innerHTML=

"Original Size: "+originalSize+" KB <br> "+
"Compressed Size: "+compressedSize+" KB"

downloadBtn.style.display="inline-block"

downloadBtn.onclick=function(){

let link=document.createElement("a")

link.href=URL.createObjectURL(blob)

link.download="compressed-image.jpg"

link.click()

}

},"image/jpeg",quality)

}

}

</script>

</body>
</html>
