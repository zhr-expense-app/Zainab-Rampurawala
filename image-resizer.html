<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Image Resizer | ZHR Tools</title>

<link rel="icon" href="/favicon.png">
<link rel="stylesheet" href="layout.css">

<script src="https://unpkg.com/lucide@latest"></script>

<style>

body{
background:white;
margin:0;
}

/* TITLE */

.page-title{
text-align:center;
font-size:30px;
color:#001d4c;
margin-top:50px;
font-weight:700;
}

/* CONTAINER */

.container{
max-width:900px;
margin:auto;
padding:20px;
}

/* CARD */

.card{
background:#f8f9fb;
padding:30px;
border-radius:12px;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
}

/* DROP AREA */

.drop-area{
border:2px dashed #001d4c;
padding:40px;
text-align:center;
border-radius:12px;
cursor:pointer;
background:white;
}

.drop-area:hover{
background:#eef3ff;
}

/* PREVIEW */

.preview{
margin-top:20px;
text-align:center;
}

.preview img{
max-width:100%;
border-radius:10px;
}

/* OPTIONS */

.options{
margin-top:20px;
display:flex;
flex-wrap:wrap;
gap:20px;
}

.option-group{
flex:1;
min-width:200px;
display:flex;
flex-direction:column;
}

.option-group label{
font-weight:600;
margin-bottom:5px;
color:#001d4c;
}

input, select{
padding:10px;
border-radius:6px;
border:1px solid #ccc;
}

/* CHECKBOX */

.checkbox{
margin-top:10px;
display:flex;
align-items:center;
gap:8px;
}

/* BUTTON */

button{
background:#001d4c;
color:white;
border:none;
padding:14px;
width:100%;
margin-top:20px;
border-radius:8px;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#003080;
}

/* INFO */

.info{
margin-top:15px;
font-weight:600;
color:#001d4c;
}

/* MOBILE */

@media(max-width:768px){

.options{
flex-direction:column;
}

.page-title{
font-size:26px;
}

}

</style>

</head>

<body>

<div id="header"></div>
<div id="sidebar-container"></div>

<h1 class="page-title">Image Resizer</h1>

<div class="container">

<div class="card">

<!-- DROP AREA -->

<div class="drop-area" id="dropArea">
<p>Drag & Drop Image OR Click to Upload</p>
<input type="file" id="fileInput" hidden>
</div>

<!-- PREVIEW -->

<div class="preview">
<img id="previewImage">
</div>

<!-- OPTIONS -->

<div class="options">

<div class="option-group">
<label>Width (px)</label>
<input type="number" id="width">
</div>

<div class="option-group">
<label>Height (px)</label>
<input type="number" id="height">
</div>

<div class="option-group">
<label>Resize %</label>
<input type="number" id="percent" value="100">
</div>

<div class="option-group">
<label>Format</label>
<select id="format">
<option value="jpeg">JPG</option>
<option value="png">PNG</option>
<option value="webp">WebP</option>
</select>
</div>

</div>

<div class="checkbox">
<input type="checkbox" id="lockRatio" checked>
<label>Maintain Aspect Ratio</label>
</div>

<div class="info" id="info"></div>

<button onclick="resizeImage()">Resize & Download</button>

</div>

</div>

<script>

let originalWidth, originalHeight, originalImage;

/* UPLOAD */

const dropArea = document.getElementById("dropArea");
const fileInput = document.getElementById("fileInput");

dropArea.onclick = () => fileInput.click();

fileInput.onchange = e => loadImage(e.target.files[0]);

dropArea.ondrop = e => {
e.preventDefault();
loadImage(e.dataTransfer.files[0]);
};

dropArea.ondragover = e => e.preventDefault();

/* LOAD IMAGE */

function loadImage(file){

let reader = new FileReader();

reader.onload = function(e){

let img = new Image();
img.src = e.target.result;

img.onload = function(){

originalWidth = img.width;
originalHeight = img.height;
originalImage = img;

document.getElementById("previewImage").src = img.src;

document.getElementById("width").value = originalWidth;
document.getElementById("height").value = originalHeight;

document.getElementById("info").innerText =
`Original: ${originalWidth} x ${originalHeight}px`;

};

};

reader.readAsDataURL(file);

}

/* AUTO RATIO */

document.getElementById("width").addEventListener("input", function(){

if(document.getElementById("lockRatio").checked){

let ratio = originalHeight / originalWidth;
document.getElementById("height").value = Math.round(this.value * ratio);

}

});

document.getElementById("height").addEventListener("input", function(){

if(document.getElementById("lockRatio").checked){

let ratio = originalWidth / originalHeight;
document.getElementById("width").value = Math.round(this.value * ratio);

}

});

/* RESIZE */

function resizeImage(){

if(!originalImage){
alert("Upload image first");
return;
}

let width = parseInt(document.getElementById("width").value);
let height = parseInt(document.getElementById("height").value);
let percent = parseInt(document.getElementById("percent").value);
let format = document.getElementById("format").value;

/* percentage override */

if(percent && percent !== 100){
width = originalWidth * percent / 100;
height = originalHeight * percent / 100;
}

let canvas = document.createElement("canvas");
let ctx = canvas.getContext("2d");

canvas.width = width;
canvas.height = height;

ctx.drawImage(originalImage, 0, 0, width, height);

let mime = "image/" + format;

let data = canvas.toDataURL(mime, 0.9);

/* download */

let link = document.createElement("a");
link.href = data;
link.download = "resized." + format;
link.click();

}

</script>

<script src="layout.js"></script>

</body>
</html>
