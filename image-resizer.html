<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Image Toolkit | ZHR Tools</title>

<link rel="icon" href="/favicon.png">
<link rel="stylesheet" href="layout.css">

<script src="https://unpkg.com/lucide@latest"></script>

<style>

body{background:white;margin:0;}

/* TITLE */
.page-title{
text-align:center;
font-size:30px;
color:#001d4c;
margin-top:50px;
font-weight:700;
}

/* CONTAINER */
.container{
max-width:1000px;
margin:auto;
padding:20px;
}

/* CARD */
.card{
background:#f8f9fb;
padding:30px;
border-radius:12px;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
}

/* DROP */
.drop-area{
border:2px dashed #001d4c;
padding:40px;
text-align:center;
border-radius:12px;
cursor:pointer;
background:white;
}

.drop-area:hover{background:#eef3ff;}

/* PREVIEW */
.preview{
display:flex;
flex-wrap:wrap;
gap:15px;
margin-top:20px;
}

.preview img{
width:120px;
border-radius:8px;
}

/* OPTIONS */
.options{
margin-top:20px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
}

label{font-weight:600;color:#001d4c;}

input,select{
padding:10px;
border-radius:6px;
border:1px solid #ccc;
width:100%;
}

/* BUTTON */
button{
background:#001d4c;
color:white;
border:none;
padding:14px;
width:100%;
margin-top:20px;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

button:hover{background:#003080;}

@media(max-width:768px){
.options{grid-template-columns:1fr;}
}

</style>

</head>

<body>

<div id="header"></div>
<div id="sidebar-container"></div>

<h1 class="page-title">Image Toolkit (Resize, Crop & Compress)</h1>

<div class="container">
<div class="card">

<div class="drop-area" id="dropArea">
<p>Upload / Drag Multiple Images</p>
<input type="file" id="fileInput" multiple hidden>
</div>

<div class="preview" id="preview"></div>

<div class="options">

<div>
<label>Width (px)</label>
<input type="number" id="width">
</div>

<div>
<label>Height (px)</label>
<input type="number" id="height">
</div>

<div>
<label>Resize %</label>
<input type="number" id="percent" value="100">
</div>

<div>
<label>Target Size (KB)</label>
<input type="number" id="targetSize">
</div>

<div>
<label>Format</label>
<select id="format">
<option value="jpeg">JPG</option>
<option value="png">PNG</option>
<option value="webp">WebP</option>
</select>
</div>

<div>
<label>Preset</label>
<select id="preset" onchange="applyPreset()">
<option value="">Custom</option>
<option value="instagram">Instagram (1080x1080)</option>
<option value="linkedin">LinkedIn (1200x627)</option>
<option value="youtube">YouTube Thumbnail</option>
</select>
</div>

</div>

<h3 style="margin-top:20px;color:#001d4c;">Crop (Optional)</h3>

<div class="options">
<input type="number" id="cropX" placeholder="Start X">
<input type="number" id="cropY" placeholder="Start Y">
<input type="number" id="cropW" placeholder="Crop Width">
<input type="number" id="cropH" placeholder="Crop Height">
</div>

<button onclick="processImages()">Process & Download</button>

</div>
</div>

<script>

let images=[];

/* UPLOAD */

const dropArea=document.getElementById("dropArea");
const fileInput=document.getElementById("fileInput");

dropArea.onclick=()=>fileInput.click();

fileInput.onchange=e=>handleFiles(e.target.files);

dropArea.ondrop=e=>{
e.preventDefault();
handleFiles(e.dataTransfer.files);
};

dropArea.ondragover=e=>e.preventDefault();

function handleFiles(files){

images=[];
document.getElementById("preview").innerHTML="";

Array.from(files).forEach(file=>{

let reader=new FileReader();

reader.onload=function(e){

let img=new Image();
img.src=e.target.result;

img.onload=function(){

images.push(img);

let previewImg=document.createElement("img");
previewImg.src=img.src;
document.getElementById("preview").appendChild(previewImg);

};

};

reader.readAsDataURL(file);

});

}

/* PRESETS */

function applyPreset(){

let val=document.getElementById("preset").value;

if(val==="instagram"){
width.value=1080;height.value=1080;
}
if(val==="linkedin"){
width.value=1200;height.value=627;
}
if(val==="youtube"){
width.value=1280;height.value=720;
}

}

/* PROCESS */

function processImages(){

if(images.length===0){
alert("Upload images first");
return;
}

let width=parseInt(document.getElementById("width").value);
let height=parseInt(document.getElementById("height").value);
let percent=parseInt(document.getElementById("percent").value);
let format=document.getElementById("format").value;
let targetKB=parseInt(document.getElementById("targetSize").value);

/* crop */

let cropX=parseInt(document.getElementById("cropX").value)||0;
let cropY=parseInt(document.getElementById("cropY").value)||0;
let cropW=parseInt(document.getElementById("cropW").value);
let cropH=parseInt(document.getElementById("cropH").value);

images.forEach((img,index)=>{

let canvas=document.createElement("canvas");
let ctx=canvas.getContext("2d");

/* crop or full */

let sx=cropX||0;
let sy=cropY||0;
let sw=cropW||img.width;
let sh=cropH||img.height;

/* resize */

if(percent && percent!==100){
width=sw*percent/100;
height=sh*percent/100;
}else{
width=width||sw;
height=height||sh;
}

canvas.width=width;
canvas.height=height;

ctx.drawImage(img,sx,sy,sw,sh,0,0,width,height);

/* compression */

let quality=0.9;
let data;

if(targetKB){

do{
data=canvas.toDataURL("image/"+format,quality);
let size=(data.length*0.75)/1024;
quality-=0.05;
}while(size>targetKB && quality>0.1);

}else{
data=canvas.toDataURL("image/"+format,quality);
}

/* download */

let link=document.createElement("a");
link.href=data;
link.download="image_"+(index+1)+"."+format;
link.click();

});

}

</script>

<script src="layout.js"></script>

</body>
</html>
